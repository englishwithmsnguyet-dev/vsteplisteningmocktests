<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LISTENING MOCK TESTS - ENGLISHWITHMISSNGUYET</title>
    <!-- Confetti Library -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <!-- Console Error Interceptor -->
    <script>
        window.errorLogQueue = [];
        window.originalConsoleError = console.error;
        console.error = function() {
            var args = Array.prototype.slice.call(arguments);
            window.originalConsoleError.apply(console, args);
            var msg = args.map(function(arg) {
                return typeof arg === 'object' ? (arg.message || JSON.stringify(arg)) : String(arg);
            }).join(' ');
            window.errorLogQueue.push(msg);
            
            var diag = document.getElementById('diagnostic-log');
            if (diag) {
                diag.style.display = 'block';
                diag.innerHTML += '<div><strong>[CONSOLE ERROR]</strong> ' + msg + '</div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
            }
        };
    </script>
    
    <!-- React & ReactDOM -->
    <script crossorigin="anonymous" src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin="anonymous" src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel compiler for inline JSX execution -->
    <script crossorigin="anonymous" src="https://unpkg.com/@babel/standalone@7.21.4/babel.min.js"></script>
    
    <!-- Font Awesome for premium icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Roboto Serif Light -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Serif:opsz,wght@8..144,300;8..144,400;8..144,500;8..144,700&display=swap" rel="stylesheet">
    
    <!-- Custom Style Sheet -->
    <link rel="stylesheet" href="style.css">
    
    <!-- Extracted Test Data -->
    <script src="data.js"></script>
</head>
<body>
    
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // --- FORMAT HELPERS ---
        const formatTimeStr = (seconds) => {
            if (isNaN(seconds) || seconds === null) return "0:00";
            const m = Math.floor(seconds / 60).toString().padStart(2, '0');
            const s = Math.floor(seconds % 60).toString().padStart(2, '0');
            return `${m}:${s}`;
        };

        const convertVstepScore = (correctCount) => {
            if (correctCount <= 1) return 0.0;
            if (correctCount === 2) return 0.5;
            if (correctCount === 3) return 1.0;
            if (correctCount === 4) return 1.5;
            if (correctCount <= 6) return 2.0;
            if (correctCount === 7) return 2.5;
            if (correctCount <= 9) return 3.0;
            if (correctCount <= 11) return 3.5;
            if (correctCount <= 13) return 4.0;
            if (correctCount <= 15) return 4.5;
            if (correctCount <= 17) return 5.0;
            if (correctCount <= 19) return 5.5;
            if (correctCount <= 21) return 6.0;
            if (correctCount === 22) return 6.5;
            if (correctCount <= 24) return 7.0;
            if (correctCount === 25) return 7.5;
            if (correctCount <= 27) return 8.0;
            if (correctCount <= 29) return 8.5;
            if (correctCount <= 31) return 9.0;
            if (correctCount <= 33) return 9.5;
            if (correctCount <= 35) return 10.0;
            return 0.0;
        };

        const shuffleArray = (array) => {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        };

        // TTS Pronunciation function
        const playTts = (word) => {
            const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`;
            const audio = new Audio(audioUrl);
            audio.play().catch(() => {
                if ('speechSynthesis' in window) {
                    window.speechSynthesis.cancel();
                    const utterance = new SpeechSynthesisUtterance(word);
                    utterance.lang = 'en-US';
                    utterance.rate = 0.9;
                    window.speechSynthesis.speak(utterance);
                }
            });
        };

        // --- DASHBOARD COMPONENT ---
        function Dashboard({ tests, onStartTest, onOpenVocab, history, onClearHistory }) {
            const completedCount = history.length;
            const avgScore = completedCount > 0 
                ? (history.reduce((sum, h) => sum + h.correctCount, 0) / completedCount).toFixed(1) 
                : 0;
            const avgVstep = completedCount > 0 
                ? (history.reduce((sum, h) => sum + convertVstepScore(h.correctCount), 0) / completedCount).toFixed(1) 
                : "0.0";
            
            const allVocabCount = tests.reduce((sum, t) => sum + t.vocab.length, 0);

            return (
                <div className="animate-fade-in">
                    <div className="dashboard-hero">
                        <div className="hero-content">
                            <h2>LUYỆN NGHE CÙNG MISS NGUYET</h2>
                            <p>Hệ thống thi thử Listening VSTEP chuẩn hóa. Cung cấp 7 đề luyện nghe hoàn chỉnh với audio chất lượng cao, giải thích từ vựng chi tiết, bản dịch đề thi và minigame ôn tập tương tác sinh động.</p>
                        </div>
                        <button className="btn btn-primary" onClick={onOpenVocab}>
                            <i className="fa-solid fa-book-open"></i> Kho Từ Vựng ({allVocabCount} Từ)
                        </button>
                    </div>

                    <div className="stats-grid">
                        <div className="stat-card">
                            <div className="stat-icon"><i className="fa-solid fa-headphones"></i></div>
                            <div className="stat-info">
                                <div className="stat-val">{completedCount}</div>
                                <div className="stat-lbl">Lượt Thi Đã Làm</div>
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon"><i className="fa-solid fa-award"></i></div>
                            <div className="stat-info">
                                <div className="stat-val">{avgVstep} <span style={{fontSize: '0.85rem', color: 'var(--text-muted)', fontWeight: 500}}>/10</span></div>
                                <div className="stat-lbl">Điểm VSTEP Trung Bình</div>
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon"><i className="fa-solid fa-circle-check"></i></div>
                            <div className="stat-info">
                                <div className="stat-val">{avgScore} <span style={{fontSize: '0.85rem', color: 'var(--text-muted)', fontWeight: 500}}>/35</span></div>
                                <div className="stat-lbl">Số Câu Đúng Trung Bình</div>
                            </div>
                        </div>
                        <div className="stat-card">
                            <div className="stat-icon"><i className="fa-solid fa-fire"></i></div>
                            <div className="stat-info">
                                <div className="stat-val">{allVocabCount}</div>
                                <div className="stat-lbl">Cụm Từ Vựng Cốt Lõi</div>
                            </div>
                        </div>
                    </div>

                    <h3 className="section-title" style={{textTransform: 'uppercase'}}><i className="fa-solid fa-calendar-days"></i> DANH SÁCH ĐỀ THI THỬ</h3>
                    <div className="test-grid">
                        {tests.map(t => {
                            const isDone = history.some(h => h.testId === t.id);
                            const bestAttempt = history.filter(h => h.testId === t.id).sort((a,b) => b.correctCount - a.correctCount)[0];
                            const questionCount = t.test.parts.reduce((sum, p) => sum + p.questions.length, 0);

                            return (
                                <div className="test-card" key={t.id}>
                                    <div className="test-card-body">
                                        <div className="test-meta">
                                            <span className="test-meta-badge">VSTEP B1-B2-C1</span>
                                            <span>3 Parts</span>
                                        </div>
                                        <h4 className="test-title" style={{textTransform: 'uppercase'}}>{t.title}</h4>
                                        <div className="test-details">
                                            <div className="test-detail-item">
                                                <i className="fa-solid fa-clock"></i>
                                                <span>Thời gian: {Math.floor(t.test.duration / 60)} phút</span>
                                            </div>
                                            <div className="test-detail-item">
                                                <i className="fa-solid fa-file-invoice"></i>
                                                <span>Số câu hỏi: {questionCount} câu</span>
                                            </div>
                                            <div className="test-detail-item">
                                                <i className="fa-solid fa-book"></i>
                                                <span>Từ vựng trọng tâm: {t.vocab.length} cụm từ</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="test-card-footer">
                                        {isDone ? (
                                            <div style={{display: 'flex', width: '100%', justifyContent: 'space-between', alignItems: 'center', gap: '1rem'}}>
                                                <span className="test-history-score">Đúng tốt nhất: {bestAttempt.correctCount}/35 ({convertVstepScore(bestAttempt.correctCount)}đ)</span>
                                                <button className="btn btn-secondary-outline btn-sm" onClick={() => onStartTest(t)}>
                                                    Làm lại
                                                </button>
                                            </div>
                                        ) : (
                                            <button className="btn btn-primary btn-full" onClick={() => onStartTest(t)}>
                                                Vào Thi Thử
                                            </button>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    {history.length > 0 && (
                        <div className="history-section animate-fade-in">
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', borderBottom: '1px solid var(--border-color)', paddingBottom: '10px'}}>
                                <h3 style={{fontSize: '1.2rem', display: 'flex', alignItems: 'center', gap: '8px'}}><i className="fa-solid fa-user-check" style={{color:'var(--color-violet)'}}></i> Lịch Sử Luyện Tập</h3>
                                <button className="btn btn-secondary-outline btn-sm" onClick={onClearHistory} style={{color: 'var(--color-red)'}}>Xóa Lịch Sử</button>
                            </div>
                            <div className="history-list">
                                {history.map((item, idx) => (
                                    <div className="history-item" key={idx}>
                                        <div className="history-left">
                                            <span className="history-test-title">Đề thi {item.testId} - {item.testTitle}</span>
                                            <span className="history-date">Ngày làm: {item.date}</span>
                                        </div>
                                        <div className="history-right">
                                            <span className="history-score-tag">Đúng: {item.correctCount}/35 câu ({item.vstepScore}đ)</span>
                                            <button className="btn btn-primary btn-sm" onClick={() => onStartTest(tests.find(t => t.id === item.testId), item.answers)}>
                                                Xem lại bài làm
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- TEST PLAYER COMPONENT ---
        function TestPlayer({ test, allTests, onStartTest, answers, setAnswers, onSubmit, onBackToDashboard, isReview = false, onSubmitDirectly }) {
            const [selectedPart, setSelectedPart] = useState(() => test && test.test && test.test.parts && test.test.parts[0] ? test.test.parts[0].id : null);
            const [playbackSpeed, setPlaybackSpeed] = useState(1);
            const [timeLeft, setTimeLeft] = useState(() => test && test.test ? test.test.duration : 0);
            const [showConfirmModal, setShowConfirmModal] = useState(false);
            const [isMenuVisible, setIsMenuVisible] = useState(false);
            
            // Audio state variables for the custom player
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            const [duration, setDuration] = useState(0);
            const [progress, setProgress] = useState(0);
            
            const [audioPlayedState, setAudioPlayedState] = useState({});
            const [subAudioIndexes, setSubAudioIndexes] = useState({});

            const audioRefs = useRef({});
            const questionRefs = useRef({});
            const timerRef = useRef(null);

            // Sync audio state when changing selected part
            useEffect(() => {
                const audio = audioRefs.current[selectedPart];
                if (audio) {
                    setIsPlaying(!audio.paused);
                    setCurrentTime(audio.currentTime);
                    setDuration(audio.duration || 0);
                    setProgress(audio.duration ? (audio.currentTime / audio.duration) * 100 : 0);
                } else {
                    setIsPlaying(false);
                    setCurrentTime(0);
                    setProgress(0);
                    setDuration(0);
                }

                if (isReview) {
                    Object.values(audioRefs.current).forEach(a => {
                        if (a && a !== audio) {
                            a.pause();
                        }
                    });
                }
            }, [selectedPart]);

            // Auto-play next sub-audio in the array
            useEffect(() => {
                if (isPlaying && audioRefs.current[selectedPart]) {
                    const audio = audioRefs.current[selectedPart];
                    audio.play().catch(e => console.error("Auto-play next audio failed:", e));
                }
            }, [subAudioIndexes]);

            // Handle speed adjustment
            const handleSpeedChange = (speed) => {
                setPlaybackSpeed(speed);
                Object.values(audioRefs.current).forEach(audio => {
                    if (audio) audio.playbackRate = speed;
                });
            };

            // Custom Player Controls
            const handleTogglePlay = () => {
                const audio = audioRefs.current[selectedPart];
                if (audio) {
                    if (audio.paused) {
                        if (!isReview && audioPlayedState[selectedPart]) {
                             alert("Bài nghe này đã được phát. Trong chế độ thi thử, mỗi bài chỉ được nghe 1 lần duy nhất!");
                             return;
                        }
                        audio.playbackRate = playbackSpeed;
                        audio.play().catch(e => console.log("Play failed:", e));
                        setIsPlaying(true);
                        setAudioPlayedState(prev => ({...prev, [selectedPart]: true}));
                    } else {
                        if (!isReview) {
                             alert("Trong chế độ thi thử, bạn không thể tạm dừng Audio!");
                             return;
                        }
                        audio.pause();
                        setIsPlaying(false);
                    }
                }
            };

            const handleTimelineClick = (e) => {
                if (!isReview) {
                    alert("Trong chế độ thi thử, bạn không thể tua Audio!");
                    return;
                }
                const audio = audioRefs.current[selectedPart];
                if (audio && duration > 0) {
                    const rect = e.currentTarget.getBoundingClientRect();
                    const clickOffset = (e.clientX - rect.left) / rect.width;
                    audio.currentTime = clickOffset * duration;
                    setCurrentTime(clickOffset * duration);
                    setProgress(clickOffset * 100);
                }
            };

            const jumpToAudio = (partId, seconds) => {
                if (!isReview) return;
                setSelectedPart(partId);
                setTimeout(() => {
                    const audio = audioRefs.current[partId];
                    if (audio) {
                        audio.currentTime = seconds;
                        audio.playbackRate = playbackSpeed;
                        audio.play().catch(e => console.log("Seek play failed:", e));
                        setIsPlaying(true);
                    }
                }, 150);
            };

            // Timers for exam taking
            useEffect(() => {
                if (isReview) return;
                if (!test || !test.test) return;
                
                setTimeLeft(test.test.duration);
                timerRef.current = setInterval(() => {
                    setTimeLeft(prev => {
                        if (prev <= 1) {
                            clearInterval(timerRef.current);
                            onSubmitDirectly();
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);

                return () => {
                    if (timerRef.current) clearInterval(timerRef.current);
                };
            }, [test, isReview]);

            // Scroll to question
            const scrollToQuestion = (partId, qId) => {
                setSelectedPart(partId);
                setTimeout(() => {
                    const el = questionRefs.current[qId];
                    if (el) {
                        el.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        el.style.border = '2px solid var(--color-violet)';
                        setTimeout(() => {
                            el.style.border = '1px solid var(--border-color)';
                        }, 2000);
                    }
                }, 200);
            };

            const totalQuestionsCount = test && test.test ? test.test.parts.reduce((sum, p) => sum + p.questions.length, 0) : 0;
            const answeredCount = Object.keys(answers).length;

            const handleContinue = () => {
                if (!test || !test.test) return;
                const currentIndex = test.test.parts.findIndex(p => p.id === selectedPart);
                if (currentIndex + 1 < test.test.parts.length) {
                    setSelectedPart(test.test.parts[currentIndex + 1].id);
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                } else {
                    setShowConfirmModal(true);
                }
            };

            if (!test || !test.test) return null;

            return (
                <>
                <div className="animate-fade-in">
                    {/* Upper Action Bar */}
                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px', flexWrap: 'wrap', gap: '12px', borderBottom: '1px solid var(--border-color)', paddingBottom: '12px'}}>
                        <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                            <button className="btn btn-secondary-outline btn-sm" onClick={onBackToDashboard}>
                                <i className="fa-solid fa-arrow-left"></i> Thoát
                            </button>
                            <h2 style={{fontSize: '1.25rem', fontWeight: 800, color: 'var(--text-dark)', textTransform: 'uppercase'}}>{test.title}</h2>
                        </div>
                        
                        {!isReview && (
                            <div style={{display: 'flex', alignItems: 'center', gap: '16px'}}>
                                <div className={`timer-hud ${timeLeft < 300 ? (timeLeft < 60 ? 'danger' : 'warning') : ''}`}>
                                    <i className="fa-solid fa-clock"></i>
                                    <span>{formatTimeStr(timeLeft)}</span>
                                </div>
                                <button className="btn btn-primary" onClick={() => setShowConfirmModal(true)}>
                                    Nộp Bài ({answeredCount}/{totalQuestionsCount})
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="test-workspace" style={{ gridTemplateColumns: isMenuVisible ? '340px 1fr' : '1fr' }}>
                        {/* Sidebar: Audio controls, navigation maps */}
                        <div className="left-panel" style={{ display: isMenuVisible ? 'flex' : 'none' }}>
                            {/* Test Info Card */}
                            <div className="panel-card" style={{ background: 'linear-gradient(135deg, var(--color-violet), var(--color-pink))', color: 'white', border: 'none', padding: '16px 20px' }}>
                                <div style={{ fontSize: '0.75rem', textTransform: 'uppercase', letterSpacing: '1.5px', opacity: 0.9, marginBottom: '6px', fontWeight: 700, display: 'flex', alignItems: 'center', gap: '6px' }}>
                                    <i className="fa-solid fa-headphones"></i> VSTEP LISTENING
                                </div>
                                <div style={{ fontSize: '1.25rem', fontWeight: 800, lineHeight: 1.3, textTransform: 'uppercase' }}>{test.title}</div>
                            </div>


                            {/* Bookmark items */}
                            {test.test.parts.map(part => {
                                const isCurrentPart = selectedPart === part.id;
                                if (!isCurrentPart || !part.audioTimestamps || part.audioTimestamps.length === 0) return null;

                                return (
                                    <div className="panel-card" key={part.id}>
                                        <div className="panel-card-title">
                                            <i className="fa-solid fa-clock"></i>
                                            <span>Mốc Thời Gian Audio</span>
                                        </div>
                                        <div className="timestamp-list">
                                            {part.audioTimestamps.map((ts, idx) => (
                                                <div 
                                                    className="timestamp-item" 
                                                    key={idx} 
                                                    onClick={() => jumpToAudio(part.id, ts.time)}
                                                >
                                                    <span>{ts.label}</span>
                                                    <span className="timestamp-play"><i className="fa-solid fa-play"></i> {formatTimeStr(ts.time)}</span>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}

                            {/* Question matrix progress map */}
                            <div className="panel-card">
                                <div className="panel-card-title">
                                    <i className="fa-solid fa-list-check"></i>
                                    <span>Bản Đồ Câu Hỏi</span>
                                </div>
                                <div className="nav-grid">
                                    {test.test.parts.flatMap(p => p.questions.map(q => ({ partId: p.id, q }))).map(({ partId, q }) => {
                                        const ans = answers[q.id];
                                        const isAnswered = ans !== undefined && ans !== "";
                                        
                                        let cellClass = "nav-cell";
                                        if (isReview) {
                                            if (ans === q.correct) cellClass += " correct";
                                            else cellClass += " wrong";
                                        } else if (isAnswered) {
                                            cellClass += " answered";
                                        }

                                        return (
                                            <div 
                                                key={q.id} 
                                                className={cellClass}
                                                onClick={() => scrollToQuestion(partId, q.id)}
                                            >
                                                {q.id}
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>

                            {/* Section navigation links (Moved to Bottom) */}
                            <div className="panel-card" style={{ padding: '20px', borderRadius: '16px', border: '1px solid var(--border-light)', boxShadow: 'var(--shadow-sm)' }}>
                                <div className="panel-card-title" style={{ color: 'var(--color-violet)', fontSize: '1.05rem', fontWeight: '800', borderBottom: '1px solid var(--border-light)', paddingBottom: '12px', marginBottom: '16px', textTransform: 'uppercase' }}>
                                    <i className="fa-solid fa-book-open"></i>
                                    <span>Chọn Phần Thi</span>
                                </div>
                                <div style={{display: 'flex', flexDirection: 'column', gap: '12px'}}>
                                    {test.test.parts.map(part => {
                                        const isSelected = selectedPart === part.id;
                                        return (
                                            <button 
                                                key={part.id}
                                                className={`btn ${isSelected ? 'btn-primary' : 'btn-secondary-outline'}`}
                                                onClick={() => setSelectedPart(part.id)}
                                                style={{
                                                    justifyContent: 'flex-start', 
                                                    padding: '14px 20px', 
                                                    borderRadius: '12px', 
                                                    fontWeight: '700', 
                                                    fontSize: '1rem',
                                                    border: isSelected ? 'none' : '2px solid var(--border-light)',
                                                    backgroundColor: isSelected ? 'var(--color-violet)' : '#fff',
                                                    color: isSelected ? '#fff' : 'var(--text-dark)',
                                                    boxShadow: isSelected ? '0 4px 12px rgba(139, 92, 246, 0.25)' : 'none'
                                                }}
                                            >
                                                {part.title.split(':')[0].toUpperCase()}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        </div>

                        {/* Questions list pane */}
                        <div className="right-panel">
                            {test.test.parts.map(part => {
                                const isCurrentPart = selectedPart === part.id;

                                return (
                                    <div className={`test-part-card ${isCurrentPart ? 'animate-fade-in' : ''}`} key={part.id} style={{ display: isCurrentPart ? 'block' : 'none' }}>
                                        <h3 className="part-title">{part.title}</h3>
                                        <p className="part-instructions">{part.instructions}</p>

                                        {/* HTML Hidden Audio Element */}
                                        <audio 
                                            ref={el => audioRefs.current[part.id] = el}
                                            src={Array.isArray(part.audioSrc) ? encodeURI(part.audioSrc[subAudioIndexes[part.id] || 0]) : encodeURI(part.audioSrc || '')}
                                            onPlay={() => setIsPlaying(true)}
                                            onPause={() => setIsPlaying(false)}
                                            onTimeUpdate={(e) => {
                                                if (selectedPart === part.id) {
                                                    setCurrentTime(e.target.currentTime);
                                                    setProgress(e.target.duration ? (e.target.currentTime / e.target.duration) * 100 : 0);
                                                }
                                            }}
                                            onLoadedMetadata={(e) => {
                                                if (selectedPart === part.id) {
                                                    setDuration(e.target.duration);
                                                }
                                            }}
                                            onEnded={() => {
                                                if (Array.isArray(part.audioSrc)) {
                                                    const currentIndex = subAudioIndexes[part.id] || 0;
                                                    if (currentIndex < part.audioSrc.length - 1) {
                                                        setSubAudioIndexes(prev => ({...prev, [part.id]: currentIndex + 1}));
                                                    } else {
                                                        setIsPlaying(false);
                                                    }
                                                } else {
                                                    setIsPlaying(false);
                                                }
                                            }}
                                            style={{ display: 'none' }}
                                        />

                                        {/* Custom Compliance Audio Player */}
                                        <div style={{ background: '#fff', borderRadius: '12px', padding: '16px 20px', marginBottom: '24px', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--border-light)' }}>
                                            <div className="listening-player-card" style={{ background: 'transparent', padding: '0', border: 'none', boxShadow: 'none', marginBottom: '12px' }}>
                                                <button onClick={handleTogglePlay} className="listening-play-btn ripple" style={{ width: '42px', height: '42px', background: 'var(--color-violet)', borderRadius: '8px' }}>
                                                    <i className={isPlaying ? "fa-solid fa-pause" : "fa-solid fa-play"} style={{ fontSize: '16px' }}></i>
                                                </button>
                                                <div className="listening-player-info" style={{ marginLeft: '12px' }}>
                                                    <div className="listening-player-title" style={{ fontWeight: 'bold', fontSize: '0.8rem', color: 'var(--text-dark)' }}>
                                                        PART {part.id.toString().padStart(2, '0')} 
                                                        {Array.isArray(part.audioSrc) ? ` (${(subAudioIndexes[part.id] || 0) + 1}/${part.audioSrc.length})` : ''} 
                                                        - TEST {test.id.toString().padStart(2, '0')}.MP3
                                                    </div>
                                                    <div className="listening-player-timeline" onClick={handleTimelineClick} style={{ height: '6px', marginTop: '6px', background: 'var(--bg-slate)', borderRadius: '3px' }}>
                                                        <div className="listening-progress-bar" style={{ width: `${progress}%`, background: 'var(--color-violet)' }}></div>
                                                    </div>
                                                </div>
                                                <span className="listening-player-time" style={{ fontSize: '0.85rem', fontWeight: 'bold', color: 'var(--text-dark)', marginLeft: '16px' }}>
                                                    {formatTimeStr(currentTime)}
                                                </span>
                                            </div>
                                            
                                            {!isReview && (
                                                <div className="listening-compliance-warning" style={{ color: 'var(--color-violet)', fontSize: '0.75rem', fontWeight: '600', display: 'flex', alignItems: 'center', gap: '8px', marginTop: '12px' }}>
                                                    <i className="fa-solid fa-triangle-exclamation"></i>
                                                    <span>* Nhấn Play để bắt đầu bài nghe. Khi đã bắt đầu, không thể tạm dừng. Thí sinh chỉ được nghe một lần.</span>
                                                </div>
                                            )}

                                            {isReview && (
                                                <div className="speed-control" style={{ marginTop: '12px', paddingTop: '12px', borderTop: '1px solid var(--border-light)' }}>
                                                    <span className="speed-lbl" style={{ fontSize: '0.8rem' }}>Tốc độ nghe:</span>
                                                    <div className="speed-options">
                                                        {[0.8, 1.0, 1.25, 1.5].map(sp => (
                                                            <button 
                                                                key={sp} 
                                                                className={`speed-btn ${playbackSpeed === sp ? 'active' : ''}`}
                                                                onClick={() => handleSpeedChange(sp)}
                                                                style={{ fontSize: '0.8rem', padding: '4px 8px' }}
                                                            >
                                                                {sp}x
                                                            </button>
                                                        ))}
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        <div>
                                            {part.questions.map(q => {
                                                const selectedOption = answers[q.id];
                                                
                                                let groupHeader = null;
                                                if (part.id === 2) {
                                                    if (q.id === 9) groupHeader = "CONVERSATION 1: QUESTIONS 09-12";
                                                    if (q.id === 13) groupHeader = "CONVERSATION 2: QUESTIONS 13-16";
                                                    if (q.id === 17) groupHeader = "CONVERSATION 3: QUESTIONS 17-20";
                                                } else if (part.id === 3) {
                                                    if (q.id === 21) groupHeader = "TALK 1: QUESTIONS 21-25";
                                                    if (q.id === 26) groupHeader = "TALK 2: QUESTIONS 26-30";
                                                    if (q.id === 31) groupHeader = "TALK 3: QUESTIONS 31-35";
                                                }
                                                
                                                return (
                                                    <div key={q.id}>
                                                        {groupHeader && (
                                                            <div className="question-group-header" style={{
                                                                background: 'linear-gradient(90deg, var(--color-violet), #8b5cf6)',
                                                                color: '#fff',
                                                                padding: '10px 16px',
                                                                borderRadius: '8px',
                                                                fontWeight: '700',
                                                                marginBottom: '16px',
                                                                marginTop: (q.id !== 9 && q.id !== 21) ? '32px' : '0',
                                                                display: 'flex',
                                                                alignItems: 'center',
                                                                gap: '8px',
                                                                boxShadow: '0 4px 6px rgba(124, 58, 237, 0.2)'
                                                            }}>
                                                                <i className="fa-solid fa-headphones"></i>
                                                                {groupHeader}
                                                            </div>
                                                        )}
                                                        <div 
                                                            className="question-item-box" 
                                                            ref={el => questionRefs.current[q.id] = el}
                                                    >
                                                        <p className="question-header-row">Câu {q.id}. {q.text}</p>
                                                        
                                                        <div className="question-options-list">
                                                            {Object.entries(q.options).map(([key, val]) => {
                                                                const isOptSelected = selectedOption === key;
                                                                
                                                                let optClass = "option-choice-item";
                                                                if (isReview) {
                                                                    if (key === q.correct) {
                                                                        optClass += " correct-ans"; 
                                                                    } else if (isOptSelected && selectedOption !== q.correct) {
                                                                        optClass += " wrong-ans"; 
                                                                    } else {
                                                                        optClass += " muted-ans";
                                                                    }
                                                                } else if (isOptSelected) {
                                                                    optClass += " selected";
                                                                }

                                                                return (
                                                                    <div 
                                                                        key={key} 
                                                                        className={optClass}
                                                                        onClick={() => {
                                                                            if (isReview) return;
                                                                            setAnswers(prev => ({ ...prev, [q.id]: key }));
                                                                        }}
                                                                    >
                                                                        <input 
                                                                            type="radio" 
                                                                            className="option-radio" 
                                                                            checked={isOptSelected}
                                                                            readOnly
                                                                            disabled={isReview}
                                                                        />
                                                                        <span>{key}. {val}</span>
                                                                    </div>
                                                                );
                                                            })}
                                                        </div>

                                                        {/* Solution detail block */}
                                                        {isReview && (
                                                            <div className="review-detail">
                                                                {q.translation && (
                                                                    <div className="translation-block">
                                                                        <div className="review-tag">Bản Dịch Câu Hỏi</div>
                                                                        <p style={{fontWeight: 700}}>Câu {q.id}. {q.translation.question}</p>
                                                                        <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '4px 16px', marginTop: '6px', fontSize: '0.82rem'}}>
                                                                            {Object.entries(q.translation.options).map(([k, v]) => (
                                                                                <span key={k} style={{color: k === q.correct ? 'var(--color-emerald)' : 'inherit', fontWeight: k === q.correct ? 700 : 'normal'}}>{k}. {v}</span>
                                                                            ))}
                                                                        </div>
                                                                    </div>
                                                                )}
                                                                {q.transcriptSnippet && (
                                                                    <div className="snippet-block">
                                                                        <div className="review-tag" style={{marginBottom: '4px'}}>Dẫn chứng từ audio:</div>
                                                                        <p dangerouslySetInnerHTML={{__html: q.transcriptSnippet}} />
                                                                        
                                                                        <button 
                                                                            className="btn btn-secondary-outline btn-sm audio-seek-btn" 
                                                                            style={{marginTop: '8px'}}
                                                                            onClick={() => {
                                                                                const getBound = (lbl) => {
                                                                                    const match = lbl.match(/\d+/);
                                                                                    const num = match ? parseInt(match[0]) : 0;
                                                                                    if (lbl.includes('Hội thoại')) return 8 + (num * 4);
                                                                                    if (lbl.includes('Bài nói')) return 20 + (num * 5);
                                                                                    return num; // For Bài 1 -> 1, Bài 8 -> 8
                                                                                };
                                                                                const tStamp = part.audioTimestamps && part.audioTimestamps.find(ts => q.id <= getBound(ts.label));
                                                                                jumpToAudio(part.id, tStamp ? tStamp.time : 0);
                                                                            }}
                                                                        >
                                                                            <i className="fa-solid fa-volume-high"></i> Nghe lại đoạn này
                                                                        </button>
                                                                    </div>
                                                                )}
                                                                {q.explanations && (
                                                                    <div className="explanation-block">
                                                                        <div className="review-tag">Giải thích đáp án:</div>
                                                                        <p style={{fontWeight: 700, color: 'var(--color-emerald)', marginTop: '4px'}}>Đáp án đúng: {q.correct}</p>
                                                                        <ul style={{paddingLeft: '16px', marginTop: '6px', display: 'flex', flexDirection: 'column', gap: '4px', listStyleType: 'circle'}}>
                                                                            {Object.entries(q.explanations).map(([k, v]) => (
                                                                                <li key={k} style={{color: k === q.correct ? 'var(--text-dark)' : 'var(--text-muted)'}}><strong style={{color: k === q.correct ? 'var(--color-emerald)' : 'var(--text-primary)'}}>{k}:</strong> {v}</li>
                                                                            ))}
                                                                        </ul>
                                                                    </div>
                                                                )}
                                                            </div>
                                                        )}
                                                    </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                </div>

                {/* Submit Confirmation Dialog */}
                {showConfirmModal && (
                    <div className="modal-overlay">
                        <div className="modal-box">
                            <div className="modal-icon">
                                <i className="fa-solid fa-circle-exclamation"></i>
                            </div>
                            <h3 className="modal-title">Nộp Bài Thi Thử</h3>
                            <p className="modal-text">Bạn đã trả lời {answeredCount} trên tổng số {totalQuestionsCount} câu hỏi. Bạn có chắc chắn muốn nộp bài thi ngay bây giờ để xem kết quả?</p>
                            <div className="modal-buttons">
                                <button className="btn btn-secondary-outline" onClick={() => setShowConfirmModal(false)}>Hủy</button>
                                <button className="btn btn-primary" onClick={() => {
                                    setShowConfirmModal(false);
                                    onSubmit();
                                }}>Nộp Bài</button>
                            </div>
                        </div>
                    </div>
                )}

                {/* VSTEP Sticky Bottom Navigation Bar */}
                <div className="vstep-bottom-bar">
                    <div className="vstep-nav-blocks">
                        <div className="vstep-nav-block">
                            <div className="vstep-nav-header">LISTENING (47')</div>
                            <div className="vstep-nav-buttons">
                                {test && test.test && test.test.parts.map(part => (
                                    <button 
                                        key={part.id} 
                                        className={`vstep-nav-btn ${selectedPart === part.id ? 'active' : ''}`}
                                        onClick={() => setSelectedPart(part.id)}
                                    >
                                        PART {part.title.split(':')[0].replace(/Part /i, '')}
                                    </button>
                                ))}
                            </div>
                        </div>
                    </div>

                    <div className="vstep-action-buttons">
                        <button className="vstep-action-btn btn-hide-menu" onClick={() => setIsMenuVisible(!isMenuVisible)}>
                            <i className={isMenuVisible ? "fa-solid fa-eye" : "fa-solid fa-eye-slash"}></i> 
                            {isMenuVisible ? "ẨN MENU" : "HIỆN MENU"}
                        </button>
                        {isReview ? (
                            <button className="vstep-action-btn btn-save" onClick={onBackToDashboard}>
                                <i className="fa-solid fa-door-open"></i> THOÁT
                            </button>
                        ) : (
                            <>
                                <button className="vstep-action-btn btn-save" onClick={() => {
                                    localStorage.setItem('vstep_saved_progress_' + test.id, JSON.stringify(answers));
                                    alert('Tiến trình làm bài của bạn đã được lưu tạm thành công!');
                                }} style={{backgroundColor: '#eab308'}}>
                                    <i className="fa-solid fa-floppy-disk"></i> LƯU TẠM
                                </button>
                                <button className="vstep-action-btn btn-continue" onClick={handleContinue}>
                                    TIẾP TỤC <i className="fa-solid fa-arrow-right"></i>
                                </button>
                                <button className="vstep-action-btn btn-save" onClick={() => setShowConfirmModal(true)}>
                                    <i className="fa-solid fa-paper-plane"></i> NỘP BÀI
                                </button>
                            </>
                        )}
                    </div>
                </div>
            </>
        );
        }

        // --- RESULTS & REVIEW COMPONENT ---
        function Results({ test, answers, onBackToDashboard }) {
            const [activeTab, setActiveTab] = useState('review'); // 'review', 'transcript', 'vocab', 'game'
            const [gamePhase, setGamePhase] = useState('learn'); // 'learn', 'play', 'finish'
            const [playList, setPlayList] = useState(() => test ? test.vocab : []); 
            const [currentIndex, setCurrentIndex] = useState(0);
            const [gameOptions, setGameOptions] = useState([]);
            const [selectedGameOption, setSelectedGameOption] = useState(null);
            const [gameScore, setGameScore] = useState(0);
            const [playingWord, setPlayingWord] = useState(null);
            const [wrongVocabs, setWrongVocabs] = useState([]);

            // Calculate correct score
            let correctCount = 0;
            if (test && test.test) {
                test.test.parts.forEach(part => {
                    part.questions.forEach(q => {
                        if (answers[q.id] === q.correct) correctCount++;
                    });
                });
            }

            const vstepScore = test ? convertVstepScore(correctCount) : 0;

            // Circular progress variables
            const strokeMax = 2 * Math.PI * 60; // radius = 60
            const strokeOffset = strokeMax - (correctCount / 35) * strokeMax;

            // Load minigame question
            const loadGameQuestion = () => {
                if (!test || !test.vocab) return;
                if (currentIndex >= playList.length) {
                    setGamePhase('finish');
                    return;
                }
                const currentVocab = playList[currentIndex];
                
                const incorrectOptions = test.vocab
                    .filter(v => v.word !== currentVocab.word)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3)
                    .map(v => v.meaning);
                
                while (incorrectOptions.length < 3) {
                    incorrectOptions.push("Cụm từ ngẫu nhiên " + (incorrectOptions.length + 1));
                }
                
                const allOptions = shuffleArray([currentVocab.meaning, ...incorrectOptions]);
                setGameOptions(allOptions);
                setSelectedGameOption(null);
                
                setTimeout(() => {
                    setPlayingWord(currentVocab.word);
                    playTts(currentVocab.word);
                    setTimeout(() => setPlayingWord(null), 1200);
                }, 300);
            };

            useEffect(() => {
                if (activeTab === 'game' && gamePhase === 'play') {
                    loadGameQuestion();
                }
            }, [currentIndex, gamePhase, playList, activeTab]);

            const handleSelectGameOption = (opt) => {
                if (selectedGameOption !== null) return; 
                setSelectedGameOption(opt);
                
                const currentVocab = playList[currentIndex];
                if (opt === currentVocab.meaning) {
                    setGameScore(prev => prev + 1);
                } else {
                    if (!wrongVocabs.find(w => w.word === currentVocab.word)) {
                        setWrongVocabs(prev => [...prev, currentVocab]);
                    }
                }
            };

            const handleNextGameWord = () => {
                if (currentIndex + 1 >= playList.length) {
                    setGamePhase('finish');
                } else {
                    setCurrentIndex(prev => prev + 1);
                }
            };

            const handleRestartAllGame = () => {
                setPlayList(test.vocab);
                setWrongVocabs([]);
                setCurrentIndex(0);
                setGameScore(0);
                setGamePhase('play'); 
            };

            const handleReplayWrongGame = () => {
                setPlayList(wrongVocabs);
                setWrongVocabs([]);
                setCurrentIndex(0);
                setGameScore(0);
                setGamePhase('play');
            };

            const playWordSpeech = (word) => {
                setPlayingWord(word);
                playTts(word);
                setTimeout(() => setPlayingWord(null), 1000);
            };

            if (!test || !test.test) return null;

            return (
                <div className="animate-scale-in">
                    <div className="results-header-card">
                        <h2 style={{fontSize: '1.6rem', fontWeight: 800}}>Kết Quả Bài Luyện Nghe</h2>
                        <p style={{color: 'var(--text-muted)', fontSize: '0.9rem'}}>{test.title}</p>
                        
                        <div className="results-score-display">
                            <div className="score-circle-wrapper">
                                <svg className="score-circle-svg">
                                    <circle className="score-circle-bg" cx="65" cy="65" r="60" />
                                    <circle 
                                        className="score-circle-fill" 
                                        cx="65" 
                                        cy="65" 
                                        r="60" 
                                        strokeDasharray={strokeMax}
                                        strokeDashoffset={strokeOffset}
                                    />
                                </svg>
                                <div className="score-circle-text">
                                    <span className="score-circle-val">{correctCount} <span style={{fontSize: '0.9rem', color: 'var(--text-muted)', fontWeight: 500}}>/35</span></span>
                                    <span className="score-circle-lbl">Đúng</span>
                                </div>
                            </div>
                            
                            <div className="score-vstep-box">
                                <span className="score-vstep-val">{vstepScore.toFixed(1)}</span>
                                <span className="score-vstep-lbl">Điểm Quy Đổi VSTEP</span>
                            </div>
                        </div>

                        <p style={{fontWeight: 600, maxWidth: '500px', margin: '0 auto 16px', fontSize: '0.95rem'}}>
                            {vstepScore >= 8.5 ? "Xuất sắc! Trình độ kỹ năng Nghe của bạn tương đương C1 trở lên." :
                             vstepScore >= 6.0 ? "Khá tốt! Bạn đang đạt mốc trình độ B2 bền vững." :
                             vstepScore >= 4.0 ? "Đạt trình độ B1. Tiếp tục luyện nghe để bứt phá lên B2 nhé!" :
                             "Mục tiêu dưới B1. Hãy xem lại giải thích đáp án và ôn tập từ vựng."}
                        </p>

                        <button className="btn btn-secondary-outline" onClick={onBackToDashboard}>
                            <i className="fa-solid fa-arrow-left"></i> Quay Về Trang Chủ
                        </button>
                    </div>

                    {/* Section tabs header */}
                    <div className="tabs-header">
                        <button className={`tab-btn ${activeTab === 'review' ? 'active' : ''}`} onClick={() => setActiveTab('review')}>
                            Xem Đáp Án Chi Tiết
                        </button>
                        <button className={`tab-btn ${activeTab === 'transcript' ? 'active' : ''}`} onClick={() => setActiveTab('transcript')}>
                            Bản Script Nghe
                        </button>
                        <button className={`tab-btn ${activeTab === 'vocab' ? 'active' : ''}`} onClick={() => setActiveTab('vocab')}>
                            Từ Vựng Trọng Tâm ({test.vocab.length})
                        </button>
                        <button className={`tab-btn ${activeTab === 'game' ? 'active' : ''}`} onClick={() => { setActiveTab('game'); setGamePhase('learn'); }}>
                            Minigame Ôn Tập
                        </button>
                    </div>

                    <div style={{minHeight: '380px'}}>
                        {/* Tab 1: Detailed solutions */}
                        {activeTab === 'review' && (
                            <div className="animate-fade-in">
                                <TestPlayer test={test} answers={answers} setAnswers={() => {}} onBackToDashboard={onBackToDashboard} isReview={true} />
                            </div>
                        )}

                        {/* Tab 2: Full transcript script */}
                        {activeTab === 'transcript' && (
                            <div className="animate-fade-in" style={{display: 'flex', flexDirection: 'column', gap: '16px'}}>
                                {test.test.parts.map(p => (
                                    <div key={p.id} className="panel-card">
                                        <h4 style={{color: 'var(--color-violet)', marginBottom: '10px', fontSize: '1.05rem', fontWeight: 800}}>{p.title}</h4>
                                        <div className="transcript-card">
                                            {p.transcript}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}

                        {/* Tab 3: Vocabulary lists */}
                        {activeTab === 'vocab' && (
                            <div className="animate-fade-in">
                                <div className="flashcards-grid">
                                    {test.vocab.map((item, idx) => (
                                        <div className="flashcard-container" key={idx}>
                                            <div className="flashcard">
                                                <div className="card-front">
                                                    <span className="flashcard-word">{item.word}</span>
                                                    <button 
                                                        className={`btn btn-round btn-outline ${playingWord === item.word ? 'animate-pulse-glow' : ''}`} 
                                                        style={{width: '32px', height: '32px'}}
                                                        onClick={(e) => {
                                                            e.stopPropagation();
                                                            playWordSpeech(item.word);
                                                        }}
                                                    >
                                                        <i className="fa-solid fa-volume-high" style={{fontSize: '13px'}}></i>
                                                    </button>
                                                    <span className="card-hint">Lướt qua hoặc nhấp để lật</span>
                                                </div>
                                                <div className="card-back">
                                                    <span className="flashcard-meaning">{item.meaning}</span>
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Tab 4: Interactive game */}
                        {activeTab === 'game' && (
                            <div className="animate-fade-in">
                                {gamePhase === 'learn' && (
                                    <div className="game-box" style={{maxWidth: '800px'}}>
                                        <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', flexWrap: 'wrap', gap: '16px', marginBottom: '24px'}}>
                                            <div style={{flex: 1, minWidth: '280px'}}>
                                                <h3 style={{fontSize: '1.35rem', color: 'var(--color-violet)', marginBottom: '8px'}}>Học từ vựng trước khi chơi</h3>
                                                <p style={{color: 'var(--text-muted)', fontSize: '0.85rem'}}>Nhấp vào biểu tượng loa để nghe phát âm chính xác của từng cụm từ trước khi bắt đầu thử thách Đấu Trường Từ Vựng.</p>
                                            </div>
                                            <button className="btn btn-primary" onClick={() => setGamePhase('play')} style={{padding: '12px 24px', fontSize: '1.1rem'}}>
                                                <i className="fa-solid fa-gamepad"></i> Bắt đầu Minigame
                                            </button>
                                        </div>
                                        
                                        <div style={{display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: '10px', textAlign: 'left', marginBottom: '24px'}}>
                                            {test.vocab.map((item, idx) => (
                                                <div key={idx} style={{display: 'flex', alignItems: 'center', gap: '8px', padding: '8px 12px', background: 'var(--input-bg)', borderRadius: 'var(--radius-sm)', border: '1px solid var(--border-color)'}}>
                                                    <button 
                                                        className="btn btn-secondary-outline btn-sm" 
                                                        style={{padding: '0', width: '28px', height: '28px', borderRadius: '50%'}} 
                                                        onClick={() => playWordSpeech(item.word)}
                                                    >
                                                        <i className="fa-solid fa-volume-high" style={{fontSize: '12px'}}></i>
                                                    </button>
                                                    <div>
                                                        <div style={{fontWeight: 700, fontSize: '0.88rem', color: 'var(--text-dark)'}}>{item.word}</div>
                                                        <div style={{fontSize: '0.75rem', color: 'var(--text-muted)'}}>{item.meaning}</div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
