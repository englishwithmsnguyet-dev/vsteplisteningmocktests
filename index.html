        function VocabGame({ vocabList, onExit }) {
            const [questions, setQuestions] = useState([]);
            const [currentIndex, setCurrentIndex] = useState(0);
            const [score, setScore] = useState(0);
            const [isGameOver, setIsGameOver] = useState(false);
            const [selectedAnswer, setSelectedAnswer] = useState(null);
            const [isChecking, setIsChecking] = useState(false);
            
            // New state for rounds
            const [roundIndex, setRoundIndex] = useState(0);
            const [shuffledChunks, setShuffledChunks] = useState([]);
            const [totalRounds, setTotalRounds] = useState(0);

            useEffect(() => {
                // Initialize game chunks
                if (!vocabList || vocabList.length < 4) {
                    alert("Cần ít nhất 4 từ vựng để tạo mini-game!");
                    onExit();
                    return;
                }
                const shuffledVocab = [...vocabList].sort(() => 0.5 - Math.random());
                const chunks = [];
                for (let i = 0; i < shuffledVocab.length; i += 10) {
                    chunks.push(shuffledVocab.slice(i, i + 10));
                }
                setShuffledChunks(chunks);
                setTotalRounds(chunks.length);
                setRoundIndex(0);
            }, [vocabList]);

            useEffect(() => {
                if (shuffledChunks.length === 0) return;
                const currentChunk = shuffledChunks[roundIndex];
                const generatedQuestions = currentChunk.map(v => {
                    const distractors = [];
                    const availableDistractors = vocabList.filter(item => item.word !== v.word);
                    const shuffledDistractors = availableDistractors.sort(() => 0.5 - Math.random());
                    for (let i = 0; i < Math.min(3, shuffledDistractors.length); i++) {
                        distractors.push(shuffledDistractors[i].meaning);
                    }
                    const options = [...distractors, v.meaning].sort(() => 0.5 - Math.random());
                    return { word: v.word, correctMeaning: v.meaning, options: options };
                });
                setQuestions(generatedQuestions);
                setCurrentIndex(0);
                setScore(0);
                setIsGameOver(false);
            }, [roundIndex, shuffledChunks]);

            const playCorrectSound = () => {
                try {
                    const audio = new Audio(B64_SOUND_CORRECT);
                    audio.play();
                } catch(e) {}
                
                // Bắn pháo hoa Confetti
                if (window.confetti) {
                    window.confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                }
            };

            const playIncorrectSound = () => {
                try {
                    const audio = new Audio(B64_SOUND_INCORRECT);
                    audio.play();
                } catch(e) {}
            };

            const handleAnswer = (option) => {
                if (isChecking) return;
                
                setSelectedAnswer(option);
                setIsChecking(true);
                
                if (option === questions[currentIndex].correctMeaning) {
                    setScore(prev => prev + 1);
                    playCorrectSound();
                } else {
                    playIncorrectSound();
                }

                setTimeout(() => {
                    if (currentIndex + 1 < questions.length) {
                        setCurrentIndex(prev => prev + 1);
                        setSelectedAnswer(null);
                        setIsChecking(false);
                    } else {
                        setIsGameOver(true);
                    }
                }, 1200);
            };

            if (questions.length === 0) return <div>Đang tải game...</div>;

            if (isGameOver) {
                const hasNextRound = roundIndex + 1 < totalRounds;
                return (
                    <div className="vocab-game-container animate-fade-in">
                        <div className="vocab-game-final">
                            Kết Quả Round {roundIndex + 1}: {score} / {questions.length}
                        </div>
                        <p style={{marginBottom: '32px', color: 'var(--text-muted)'}}>
                            {score === questions.length ? 'Tuyệt vời! Bạn đã hoàn thành xuất sắc round này!' : 'Cố gắng ôn tập thêm nhé, bạn làm rất tốt!'}
                        </p>
                        <div style={{display: 'flex', gap: '16px', justifyContent: 'center', flexWrap: 'wrap'}}>
                            <button className="btn btn-secondary-outline" onClick={onExit} style={{padding: '16px 32px', fontSize: '1.2rem', backgroundColor: '#f0f0f0', border: 'none', color: '#555', borderRadius: '12px'}}>
                                <i className="fa-solid fa-arrow-left"></i> Dừng lại
                            </button>
                            {hasNextRound ? (
                                <button className="btn btn-primary" onClick={() => setRoundIndex(prev => prev + 1)} style={{padding: '16px 32px', fontSize: '1.2rem', borderRadius: '12px'}}>
                                    Chinh phục Round {roundIndex + 2} <i className="fa-solid fa-arrow-right"></i>
                                </button>
                            ) : (
                                <button className="btn btn-primary" onClick={onExit} style={{padding: '16px 32px', fontSize: '1.2rem', borderRadius: '12px'}}>
                                    <i className="fa-solid fa-flag-checkered"></i> Hoàn Thành Tất Cả
                                </button>
                            )}
                        </div>
                    </div>
                );
            }

            const currentQ = questions[currentIndex];

            return (
                <div className="vocab-game-container animate-fade-in">
                    <div className="vocab-game-header">
                        <div><i className="fa-solid fa-trophy" style={{color: 'gold', marginRight: '8px'}}></i> Điểm: {score}</div>
                        <div>Round {roundIndex + 1}/{totalRounds} • Câu {currentIndex + 1}/{questions.length}</div>
                    </div>
                    
                    <div className="vocab-game-question">
                        {currentQ.word}
                    </div>

                    <div className="vocab-game-options">
                        {currentQ.options.map((opt, idx) => {
                            let btnClass = "vocab-game-btn";
                            if (isChecking) {
                                if (opt === currentQ.correctMeaning) {
                                    btnClass += " correct";
                                } else if (opt === selectedAnswer) {
                                    btnClass += " incorrect";
                                }
                            }
                            
                            return (
                                <button 
                                    key={idx} 
                                    className={btnClass}
                                    onClick={() => handleAnswer(opt)}
                                    disabled={isChecking}
                                >
                                    {opt}
                                </button>
                            );
                        })}
                    </div>

                    {isChecking && (
                        <div className={`vocab-game-result ${selectedAnswer === currentQ.correctMeaning ? 'success' : 'error'} animate-fade-in`}>
                            {selectedAnswer === currentQ.correctMeaning ? (
                                <><i className="fa-solid fa-circle-check"></i> Chính xác!</>
                            ) : (
                                <><i className="fa-solid fa-circle-xmark"></i> Sai rồi!</>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        // --- VOCAB HUB COMPONENT ---
        function VocabHub({ tests, onBackToDashboard }) {
            const [selectedVocabTest, setSelectedVocabTest] = useState(0); // 0 = all
            const [playingWord, setPlayingWord] = useState(null);
            const [isGameMode, setIsGameMode] = useState(false);

            const getFilteredVocab = () => {
                if (selectedVocabTest === 0) {
                    const combined = [];
                    const seen = new Set();
                    tests.forEach(t => {
                        t.vocab.forEach(v => {
                            if (!seen.has(v.word.toLowerCase())) {
                                seen.add(v.word.toLowerCase());
                                combined.push({ ...v, origin: t.title.split(' ')[3] });
                            }
                        });
                    });
                    return combined;
                }
                return tests.find(t => t.id === selectedVocabTest).vocab;
            };

            const filteredVocab = getFilteredVocab();

            const playWordSpeech = (word) => {
                setPlayingWord(word);
                playTts(word);
                setTimeout(() => setPlayingWord(null), 1000);
            };

            const [flippedCards, setFlippedCards] = useState({});
            
            const toggleFlip = (idx) => {
                setFlippedCards(prev => ({...prev, [idx]: !prev[idx]}));
            };

            return (
                <div className="animate-fade-in">
                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '24px', flexWrap: 'wrap', gap: '12px', borderBottom: '1px solid var(--border-color)', paddingBottom: '12px'}}>
                        <div style={{display: 'flex', alignItems: 'center', gap: '12px'}}>
                            <button className="btn btn-secondary-outline btn-sm" onClick={onBackToDashboard}>
                                <i className="fa-solid fa-arrow-left"></i> Quay Lại
                            </button>
                            <h2 style={{fontSize: '1.25rem', fontWeight: 800, color: 'var(--text-dark)'}}>Kho Từ Vựng Trọng Tâm VSTEP Listening</h2>
                        </div>
                        <button 
                            className="btn btn-primary" 
                            style={{padding: '8px 16px', fontWeight: 'bold'}}
                            onClick={() => setIsGameMode(true)}
                        >
                            <i className="fa-solid fa-gamepad"></i> 🎮 Chơi Game Ôn Tập
                        </button>
                    </div>

                    <div className="panel-card" style={{marginBottom: '24px', display: 'flex', alignItems: 'center', gap: '12px', flexWrap: 'wrap'}}>
                        <span style={{fontWeight: 700, fontSize: '0.9rem'}}>Lọc theo đề thi:</span>
                        <div style={{display: 'flex', gap: '6px', flexWrap: 'wrap'}}>
                            <button 
                                className={`btn btn-sm ${selectedVocabTest === 0 ? 'btn-primary' : 'btn-secondary-outline'}`}
                                onClick={() => setSelectedVocabTest(0)}
                            >
                                Tất Cả Đề ({tests.reduce((sum,t)=>sum+t.vocab.length, 0)})
                            </button>
                            {tests.map(t => (
                                <button 
                                    key={t.id}
                                    className={`btn btn-sm ${selectedVocabTest === t.id ? 'btn-primary' : 'btn-secondary-outline'}`}
                                    onClick={() => setSelectedVocabTest(t.id)}
                                >
                                    Đề {t.id} ({t.vocab.length})
                                </button>
                            ))}
                        </div>
                    </div>

                    {isGameMode ? (
                        <VocabGame vocabList={filteredVocab} onExit={() => setIsGameMode(false)} />
                    ) : (
                        <>
                            <div className="flashcards-grid">
                                {filteredVocab.map((item, idx) => (
                            <div 
                                className={`flashcard-container ${flippedCards[idx] ? 'flipped' : ''}`} 
                                key={idx}
                                onClick={() => toggleFlip(idx)}
                            >
                                <div className="flashcard">
                                    <div className="card-front">
                                        <span className="flashcard-word">{item.word}</span>
                                        {item.origin && (
                                            <span style={{position: 'absolute', top: '10px', left: '10px', fontSize: '0.65rem', background: 'var(--color-violet-glow)', color: 'var(--color-violet)', padding: '2px 6px', borderRadius: '4px', fontWeight: 'bold'}}>Đề {item.origin}</span>
                                        )}
                                        <button 
                                            className={`btn btn-round btn-outline ${playingWord === item.word ? 'animate-pulse-glow' : ''}`} 
                                            style={{width: '36px', height: '36px', marginTop: '12px', marginBottom: '12px'}}
                                            onClick={(e) => {
                                                e.stopPropagation();
                                                playWordSpeech(item.word);
                                            }}
                                        >
                                            <i className="fa-solid fa-volume-high" style={{fontSize: '15px'}}></i>
                                        </button>
                                        <span className="card-hint">Nhấp để lật</span>
                                    </div>
                                    <div className="card-back">
                                        <span className="flashcard-meaning">{item.meaning}</span>
                                        <span className="card-hint">Nhấp để lật lại</span>
                                    </div>
                                </div>
                            </div>
                        ))}
                            </div>
                        </>
                    )}
                </div>
            );
        }

        // --- REACT ERROR BOUNDARY ---
        class ErrorBoundary extends React.Component {
            constructor(props) {
                super(props);
                this.state = { hasError: false, error: null };
            }
            static getDerivedStateFromError(error) {
                return { hasError: true, error: error };
            }
            componentDidCatch(error, errorInfo) {
                var diag = document.getElementById('diagnostic-log');
                if (diag) {
                    diag.style.display = 'block';
                    diag.innerHTML += '<div><strong>[REACT CRASH]</strong> ' + error.message + '<br><pre style="white-space: pre-wrap; font-size: 11px; margin-top: 8px; color: #b91c1c;">' + error.stack + '</pre></div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
                }
            }
            render() {
                if (this.state.hasError) {
                    return (
                        <div style={{ padding: '24px', color: '#ef4444', background: 'rgba(239, 68, 68, 0.05)', border: '1.5px solid #ef4444', borderRadius: '12px', margin: '24px', fontFamily: 'monospace' }}>
                            <h3 style={{ margin: '0 0 12px 0' }}><i class="fa-solid fa-triangle-exclamation"></i> React Application Crashed</h3>
                            <p style={{ fontWeight: 'bold' }}>{this.state.error && this.state.error.message}</p>
                            <pre style={{ whiteSpace: 'pre-wrap', fontSize: '11px', background: 'rgba(0,0,0,0.03)', padding: '12px', borderRadius: '6px', overflowX: 'auto' }}>{this.state.error && this.state.error.stack}</pre>
                        </div>
                    );
                }
                return this.props.children;
            }
        }

        // --- MAIN APP ENTRY ---
        function App() {
            const [currentScreen, setCurrentScreen] = useState('dashboard'); // 'dashboard', 'test', 'results', 'vocab'
            const [selectedTest, setSelectedTest] = useState(null);
            const [answers, setAnswers] = useState({});
            
            // Saved history state
            const [history, setHistory] = useState(() => {
                try {
                    const saved = localStorage.getItem('vstep_listening_history');
                    return saved ? JSON.parse(saved) : [];
                } catch (e) {
                    console.error("Error reading history from localStorage:", e);
                    return [];
                }
            });

            // Dark Mode state
            const [darkMode, setDarkMode] = useState(() => {
                try {
                    const saved = localStorage.getItem('vstep_listening_dark_mode');
                    return saved === 'true';
                } catch (e) {
                    return false;
                }
            });

            // Sync Dark Mode
            useEffect(() => {
                if (darkMode) {
                    document.body.classList.add('dark-mode');
                } else {
                    document.body.classList.remove('dark-mode');
                }
                localStorage.setItem('vstep_listening_dark_mode', darkMode);
            }, [darkMode]);

            // Save history helper
            const saveAttempt = (testId, testTitle, correctCount, finalAnswers) => {
                const now = new Date();
                const formattedDate = `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getFullYear()} lúc ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
                
                const newAttempt = {
                    testId,
                    testTitle,
                    correctCount,
                    vstepScore: convertVstepScore(correctCount),
                    answers: finalAnswers,
                    date: formattedDate
                };

                const updatedHistory = [newAttempt, ...history];
                setHistory(updatedHistory);
                localStorage.setItem('vstep_listening_history', JSON.stringify(updatedHistory));
            };

            const handleClearHistory = () => {
                if (window.confirm("Bạn có chắc chắn muốn xóa toàn bộ lịch sử thi thử không?")) {
                    setHistory([]);
                    localStorage.removeItem('vstep_listening_history');
                }
            };

            const handleBackToDashboard = () => {
                setCurrentScreen('dashboard');
                setSelectedTest(null);
                setAnswers({});
            };

            const handleFinishTest = () => {
                let score = 0;
                selectedTest.test.parts.forEach(part => {
                    part.questions.forEach(q => {
                        if (answers[q.id] === q.correct) score++;
                    });
                });
                
                saveAttempt(selectedTest.id, selectedTest.title, score, answers);
                localStorage.removeItem('vstep_saved_progress_' + selectedTest.id);
                setCurrentScreen('results');
                window.scrollTo(0, 0);
            };

            const handleStartTest = (test, reviewAnswers = null) => {
                setSelectedTest(test);
                if (reviewAnswers) {
                    setAnswers(reviewAnswers);
                    setCurrentScreen('results');
                } else {
                    const savedProgress = localStorage.getItem('vstep_saved_progress_' + test.id);
                    if (savedProgress) {
                        try {
                            setAnswers(JSON.parse(savedProgress));
                        } catch(e) {
                            setAnswers({});
                        }
                    } else {
                        setAnswers({});
                    }
                    setCurrentScreen('test');
                }
                window.scrollTo(0, 0);
            };

            const toggleTheme = () => setDarkMode(prev => !prev);
            // Global Sidebar Component
            const GlobalSidebar = () => {
                return (
                    <aside className="global-sidebar">
                        <div className="global-sidebar-header">
                            <i className="fa-solid fa-list-check" style={{color: 'var(--color-violet)'}}></i>
                            VSTEP MOCK TESTS
                        </div>
                        
                        <div className="global-sidebar-nav">
                            <div 
                                className={`sidebar-nav-item ${currentScreen === 'dashboard' ? 'active' : ''}`}
                                onClick={handleBackToDashboard}
                            >
                                <i className="fa-solid fa-house" style={{width: '20px', textAlign: 'center'}}></i>
                                TRANG CHỦ
                            </div>
                            
                            <div style={{height: '1px', background: 'var(--border-color)', margin: '8px 0'}}></div>
                            
                            {ALL_TESTS.map(t => {
                                const isCurrentTest = currentScreen === 'test' && selectedTest && selectedTest.id === t.id;
                                return (
                                    <div 
                                        key={t.id}
                                        className={`sidebar-nav-item ${isCurrentTest ? 'active' : ''}`}
                                        onClick={() => {
                                            if (!isCurrentTest) {
                                                if (currentScreen === 'test' && Object.keys(answers).length > 0) {
                                                    if (window.confirm('Bạn có chắc chắn muốn chuyển đề thi? Các câu trả lời hiện tại sẽ bị mất.')) {
                                                        handleStartTest(t);
                                                    }
                                                } else {
                                                    handleStartTest(t);
                                                }
                                            }
                                        }}
                                    >
                                        <i className="fa-solid fa-headphones" style={{width: '20px', textAlign: 'center'}}></i>
                                        {t.title.replace('VSTEP ', '').replace('Mock ', '')}
                                    </div>
                                );
                            })}
                        </div>
                        
                        <div className="global-sidebar-footer">
                            <button onClick={toggleTheme} aria-label="Toggle dark mode" style={{width: '100%', display: 'flex', justifyContent: 'center', gap: '8px', padding: '10px', borderRadius: '8px', background: 'var(--input-bg)', border: '1px solid var(--border-color)', cursor: 'pointer', color: 'var(--text-dark)', fontWeight: 700}}>
                                <i className={darkMode ? "fa-solid fa-sun" : "fa-solid fa-moon"}></i>
                                {darkMode ? "Giao diện Sáng" : "Giao diện Tối"}
                            </button>
                            <div style={{fontSize: '0.85rem', fontWeight: 800, color: 'var(--color-violet)', textAlign: 'center', marginTop: '4px'}}>
                                <i className="fa-solid fa-graduation-cap"></i> ENGLISH WITH MISS NGUYET
                            </div>
                        </div>
                    </aside>
                );
            };

            return (
                <div className="app-layout">
                    <GlobalSidebar />
                    
                    <div className="main-content-wrapper" style={{display: 'flex', flexDirection: 'column'}}>
                        {/* Top Branding Section */}
                        <div style={{width: '100%', textAlign: 'center', paddingTop: '16px'}}>
                            <a href="https://www.facebook.com/englishwithmissnguyet" target="_blank" rel="noreferrer" className="galaxy-brand-badge">
                                <i className="fa-brands fa-facebook"></i> ENGLISH WITH MISS NGUYET
                            </a>
                            <div className="motivation-img-container">
                                <img src="never_give_up.jpg" alt="Never Give Up Motivation" />
                            </div>
                        </div>

                        <main className="container" style={{paddingBottom: '40px', maxWidth: '1000px', flex: 1}}>
                        {currentScreen === 'dashboard' && (
                            <Dashboard 
                                tests={ALL_TESTS} 
                                onStartTest={handleStartTest} 
                                onOpenVocab={() => setCurrentScreen('vocab')} 
                                history={history}
                                onClearHistory={handleClearHistory}
                            />
                        )}
                        {currentScreen === 'test' && (
                            <TestPlayer 
                                test={selectedTest} 
                                allTests={ALL_TESTS}
                                onStartTest={handleStartTest}
                                answers={answers} 
                                setAnswers={setAnswers} 
                                onSubmit={handleFinishTest}
                                onBackToDashboard={handleBackToDashboard}
                                onSubmitDirectly={handleFinishTest}
                            />
                        )}
                        {currentScreen === 'results' && (
                            <Results 
                                test={selectedTest} 
                                answers={answers} 
                                onBackToDashboard={handleBackToDashboard}
                            />
                        )}
                        {currentScreen === 'vocab' && (
                            <VocabHub 
                                tests={ALL_TESTS} 
                                onBackToDashboard={handleBackToDashboard}
                            />
                        )}
                    </main>

                    <footer className="footer">
                        <div className="container">
                            <p>© 2026 THI THỬ VSTEP LISTENING CÙNG MISS NGUYỆT. Thiết kế tối ưu cho học viên ôn thi B1 - B2 - C1.</p>
                            <p style={{fontSize: '0.72rem', marginTop: '4px', opacity: 0.6}}>Hệ thống tự động lưu trữ kết quả và tiến trình thi thử trực tiếp trên trình duyệt của bạn (Local Storage).</p>
                        </div>
                    </footer>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ErrorBoundary><App /></ErrorBoundary>);
    </script>
    
    <!-- Diagnostic Error Logger (Visible only when crashes occur) -->
    <div id="diagnostic-log" style="color: #ef4444; background: rgba(239, 68, 68, 0.05); border: 1.5px solid #ef4444; border-radius: 8px; padding: 16px; margin: 20px; font-family: monospace; font-size: 13px; line-height: 1.5; display: none;">
        <h3 style="margin-top: 0; margin-bottom: 12px; color: #ef4444; font-size: 15px;"><i class="fa-solid fa-circle-exclamation"></i> LỖI HỆ THỐNG (SYSTEM ERROR)</h3>
    </div>
    <script>
        var diag = document.getElementById('diagnostic-log');
        
        // Show any errors captured early in the queue
        if (window.errorLogQueue && window.errorLogQueue.length > 0) {
            diag.style.display = 'block';
            window.errorLogQueue.forEach(function(msg) {
                diag.innerHTML += '<div><strong>[COMPILATION ERROR]</strong> ' + msg + '</div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
            });
        }
        
        window.onerror = function(message, source, lineno, colno, error) {
            diag.style.display = 'block';
            diag.innerHTML += '<div><strong>[RUNTIME ERROR]</strong> ' + message + '<br><small>File: ' + source + ' (Dòng ' + lineno + ', Cột ' + colno + ')</small></div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
        };
        
        window.addEventListener('load', function() {
            if (typeof React === 'undefined') {
                diag.style.display = 'block';
                diag.innerHTML += '<div><strong>[LOAD ERROR]</strong> React library failed to load. Hãy kiểm tra kết nối mạng.</div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
            }
            if (typeof ReactDOM === 'undefined') {
                diag.style.display = 'block';
                diag.innerHTML += '<div><strong>[LOAD ERROR]</strong> ReactDOM library failed to load. Hãy kiểm tra kết nối mạng.</div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
            }
            if (typeof Babel === 'undefined') {
                diag.style.display = 'block';
                diag.innerHTML += '<div><strong>[LOAD ERROR]</strong> Babel transpiler failed to load. Hãy kiểm tra kết nối mạng.</div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
            }
            if (typeof ALL_TESTS === 'undefined') {
                diag.style.display = 'block';
                diag.innerHTML += '<div><strong>[DATA ERROR]</strong> ALL_TESTS is undefined. File data.js chưa được tải thành công.</div><hr style="border: 0; border-top: 1px solid rgba(239, 68, 68, 0.2); margin: 8px 0;">';
            }
        });
    </script>
</body>
</html>
