            transcript: `[Talk 1: Recycling in the UK]
Well, my group has been doing a project on how household waste is recycled in Britain. We were quite shocked to discover that ${hl("only 9% of people here in the UK")} make an effort to recycle their household waste. This is a lower figure than in most other European countries, and ${hl("needs to increase dramatically in the next few years")} if the government is going to meet its recycling targets. The agreed targets for the UK mean that by 2008, we must reduce our carbon dioxide emissions by 12.5% compared with 1990. 
And recycling can help to achieve that goal in two main ways. The production of recycled glass and paper uses much less energy than producing them from virgin materials, and also recycling reduces greenhouse gas emissions from landfill sites and incineration plants. 
As part of our project, we carried out a survey of people in the street, and the thing that came up over and over again is that ${hl("people don't think it's easy enough")} to recycle their waste. One problem is that there aren't enough drop-off sites, that is, the places where the public are supposed to take their waste. We also discovered that waste that's collected from householders is taken to places called bring banks for sorting and bailing into loads. One problem here is taking out everything that shouldn't have been placed in the recycling containers. People put all sorts of things into bottle banks like ${hl("plastic bags")} and even broken umbrellas. All this has to be ${hl("removed by hand.")} Another difficulty is that toughened glass used for cooking doesn't fully melt at the temperature required for other glass, and so that also has to be picked out by hand.
Glass is easy to recycle because it can be reused over and over again without becoming weaker. Two million tons of glass is thrown away each year, that is, seven billion bottles and jars, but ${hl("only 500,000 tons of that is collected and recycled.")} 

[Talk 2: Asiatic Lions]
Well, most people think that lions only come from Africa, and you would be forgiven for thinking this because in fact most lions do come from Africa, but this hasn't always been the case. If we go back 10,000 years, we would find that there were lions roaming vast sections of the globe, but now, unfortunately, only very small sections of the lions' former habitat remain. 
My particular interest is Asiatic lions, which are a subspecies of African lions. It's almost ${hl("100,000 years since the Asiatic lion split off and developed as a subspecies.")} At one time, the Asiatic lion was living as far west as Greece, and they were found from there in a band that spread east through various countries of the Middle East, all the way to India. In museums, you can now see ${hl("Greek coins")} that have clear images of the Asiatic lion on them. Most of them are dated at around 500 BC. However, Europe saw its last Asiatic lion roaming free ${hl("2,000 years ago.")} Over the next 1,900 years, the numbers of Asiatic lions in the other areas declined steadily, but it was only in the 19th century that they disappeared from everywhere but India.
So, how can you tell an Asiatic lion from an African lion, with which you're probably more familiar? Well, in general, Asiatic lions are not as big as African lions. The colour is more or less the same, but the appearance of the mane is different. That's the hair around the lion's face and neck. The Asiatic lion's mane is noticeably shorter than the African lion's. Asiatic lions also have a ${hl("long fold of skin on their undersides")}, whereas not many African lions have this. One final piece of interesting information. In ancient India, one of the greatest tests of ${hl("leadership")} for a man was to fight a lion. Now, it seems, in modern India, it will be a great test to see if the lion can be saved. I'm sure this is something that all of you will share concern for too.

[Talk 3: City Boat Trip & Bus Tour]
Thank you for calling the tourist line. There are many different ${hl("ways of getting around the city")}, and we'd like to suggest some you may not have thought of. 
How about a city trip by boat? There are four main stopping points. From west to east, stop A, Greenbanks; stop B, City Bridge; stop C, Roman Landing; and stop D, Newtown. You can find the main booking office at stop A.The first boat leaves at 8am, and ${hl("the last one at 6.30pm.")} There are also many attractions you can visit along the river. 
At stop A, if you have time, you can visit the fine 16th century palace here, built for the king, with its ${hl("beautiful formal gardens.")} It's very near the booking office. Now, you can enjoy every corner of this superb residence. 
Stop B. Why don't you visit Tower Restaurant, with its wide range of refreshments? This is a place where you can sit and enjoy the wonderful views over the old commercial and banking centre of the city. 
Stop C is the area where, in the first century AD, invading soldiers crossed the river. This was much shallower than it is now. That's why this area is called Roman Landing. There's an interactive museum to visit here, with a large shop, which has a good range of local history books.
At the furthest point of the trip, ${hl("stop D")}, the most exciting place to visit is the new entertainment complex, with ${hl("seven screen cinema")}, bowling alley and video games arcade. Besides the boat tours, there are city buses. Two companies offer special services. The Top Bus Company runs all its tours with a live commentary in English. Tours leave from 8.30am ${hl("every 20 minutes.")} There are departures from Central Station, Castle Hill and Long Walk. This is a hop-on hop-off service and tickets are valid for 24 hours. For further details call Top Bus, on 0208 944 7810.`,
            translatedTranscript: `[Bài giảng 1: Tái chế ở Vương quốc Anh]
Chà, nhóm của tôi đã và đang thực hiện một dự án về cách thức rác thải sinh hoạt được tái chế ở Anh. Chúng tôi khá sốc khi phát hiện ra rằng chỉ có 9% người dân ở Vương quốc Anh nỗ lực tái chế rác thải sinh hoạt của họ. Con số này thấp hơn ở hầu hết các nước châu Âu khác, và cần phải tăng mạnh trong vài năm tới nếu chính phủ muốn đạt được các mục tiêu tái chế của mình. Các mục tiêu đã được thống nhất đối với Vương quốc Anh có nghĩa là đến năm 2008, chúng ta phải giảm 12,5% lượng khí thải carbon dioxide so với năm 1990. 
Và việc tái chế có thể giúp đạt được mục tiêu đó theo hai cách chính. Việc sản xuất thủy tinh và giấy tái chế tiêu tốn ít năng lượng hơn nhiều so với việc sản xuất chúng từ các nguyên liệu thô sơ, và việc tái chế cũng giúp giảm phát thải khí nhà kính từ các bãi chôn lấp và các nhà máy đốt rác. 
Là một phần của dự án, chúng tôi đã thực hiện một cuộc khảo sát với những người trên đường phố, và một điều cứ lặp đi lặp lại là mọi người không nghĩ việc tái chế rác thải là đủ dễ dàng. Một vấn đề là không có đủ các điểm tập kết, tức là những nơi mà công chúng được cho là sẽ mang rác thải đến đó. Chúng tôi cũng phát hiện ra rằng rác thải thu gom từ các hộ gia đình được đưa đến những nơi gọi là "bring banks" (ngân hàng tái chế) để phân loại và đóng kiện thành từng khối. Một vấn đề ở đây là phải lấy ra mọi thứ không nên được đặt trong các thùng chứa tái chế. Mọi người bỏ đủ loại đồ vật vào các thùng chứa chai lọ như túi ni lông và thậm chí cả những chiếc ô (dù) bị hỏng. Tất cả những thứ này phải được loại bỏ bằng tay. Một khó khăn nữa là kính cường lực dùng trong nấu ăn không nóng chảy hoàn toàn ở nhiệt độ cần thiết cho các loại kính khác, và do đó nó cũng phải được nhặt ra bằng tay.
Thủy tinh rất dễ tái chế vì nó có thể được tái sử dụng nhiều lần mà không bị giảm chất lượng. Hai triệu tấn thủy tinh bị vứt bỏ mỗi năm, tức là bảy tỷ chai và lọ, nhưng chỉ có 500.000 tấn trong số đó được thu gom và tái chế. 

[Bài giảng 2: Sư tử châu Á]
Chà, hầu hết mọi người đều nghĩ rằng sư tử chỉ đến từ châu Phi, và bạn sẽ được tha thứ khi nghĩ như vậy vì thực tế là hầu hết sư tử đều đến từ châu Phi, nhưng không phải lúc nào cũng như vậy. Nếu chúng ta quay ngược lại 10.000 năm trước, chúng ta sẽ thấy rằng từng có những con sư tử đi lang thang trên những khu vực rộng lớn của toàn cầu, nhưng giờ đây, thật không may, chỉ còn lại những phần rất nhỏ trong môi trường sống trước đây của sư tử. 
Sự quan tâm đặc biệt của tôi là sư tử châu Á, một phân loài của sư tử châu Phi. Đã gần 100.000 năm kể từ khi sư tử châu Á tách ra và phát triển thành một phân loài. Đã có thời, sư tử châu Á sống xa về phía tây như ở Hy Lạp, và chúng được tìm thấy từ đó trong một dải trải dài về phía đông qua nhiều quốc gia ở Trung Đông, kéo dài cho đến tận Ấn Độ. Trong các viện bảo tàng, hiện nay bạn có thể nhìn thấy những đồng tiền cổ của Hy Lạp có in hình rõ nét của sư tử châu Á. Hầu hết chúng có niên đại vào khoảng năm 500 trước Công nguyên. Tuy nhiên, châu Âu đã chứng kiến chú sư tử châu Á đi lang thang tự do cuối cùng cách đây 2.000 năm. Trong 1.900 năm tiếp theo, số lượng sư tử châu Á ở các khu vực khác đã giảm dần đều, nhưng mãi đến thế kỷ 19, chúng mới biến mất khỏi mọi nơi, ngoại trừ Ấn Độ.
Vậy, làm thế nào bạn có thể phân biệt một con sư tử châu Á với một con sư tử châu Phi, loài mà bạn có lẽ quen thuộc hơn? Chà, nhìn chung, sư tử châu Á không to lớn bằng sư tử châu Phi. Màu sắc thì tương đương nhau, nhưng hình dáng của chiếc bờm thì khác biệt. Đó là phần lông quanh mặt và cổ sư tử. Bờm của sư tử châu Á ngắn hơn rõ rệt so với sư tử châu Phi. Sư tử châu Á cũng có một nếp gấp da dài ở phần dưới bụng của chúng, trong khi không có nhiều con sư tử châu Phi có đặc điểm này. Một mẩu thông tin thú vị cuối cùng. Ở Ấn Độ cổ đại, một trong những bài kiểm tra lớn nhất về khả năng lãnh đạo của một người đàn ông là chiến đấu với một con sư tử. Còn bây giờ, có vẻ như, ở Ấn Độ hiện đại, đó sẽ là một bài kiểm tra lớn để xem liệu con sư tử có thể được cứu thoát (khỏi nguy cơ tuyệt chủng) hay không. Tôi chắc chắn đây là điều mà tất cả các bạn cũng sẽ cùng chia sẻ sự quan tâm.

[Bài giảng 3: Chuyến đi thuyền quanh thành phố & Chuyến tham quan bằng xe buýt]

        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- AUDIO COMPONENT ---
        const AudioPlayer = ({ src, audioId, isReviewMode = false, timestamps = [] }) => {
            const audioRef = useRef(null);
            const progressBarRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [hasEnded, setHasEnded] = useState(false);
            const [hasError, setHasError] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            
            useEffect(() => {
                const handleStopOtherAudios = (e) => {
                    if (e.detail !== audioId && audioRef.current) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    }
                };
                window.addEventListener('stopAllAudios', handleStopOtherAudios);
                return () => window.removeEventListener('stopAllAudios', handleStopOtherAudios);
            }, [audioId]);

            const playAudio = () => {
                window.dispatchEvent(new CustomEvent('stopAllAudios', { detail: audioId }));
                const playPromise = audioRef.current.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setIsPlaying(true);
                        setHasEnded(false);
                        setHasError(false);
                    }).catch(error => {
                        console.error("Lỗi phát âm thanh:", error);
                        setHasError(true);
                        setIsPlaying(false);
                    });
                }
            };

            const togglePlay = () => {
                if (hasEnded && !isReviewMode) return;
                
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    if (isReviewMode && hasEnded) {
                        audioRef.current.currentTime = 0;
                    }
                    playAudio();
                }
            };

            const handleTimeUpdate = () => {
                const current = audioRef.current.currentTime;
                const duration = audioRef.current.duration;
                setCurrentTime(current);
                if (duration) {
                    setProgress((current / duration) * 100);
                }
            };

            const handleEnded = () => {
                setIsPlaying(false);
                setHasEnded(true);
            };

            const handleError = (e) => {
                console.error("Không thể tải nguồn âm thanh.", e);
                setHasError(true);
            };

            const handleProgressClick = (e) => {
                if (!isReviewMode) return; 
                if (hasError || !audioRef.current?.duration) return;
                
                const rect = progressBarRef.current.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const newPercentage = clickX / width;
                const newTime = newPercentage * audioRef.current.duration;
                
                audioRef.current.currentTime = newTime;
                setProgress(newPercentage * 100);
                
                if (!isPlaying) playAudio();
            };

            let activeTimestampIndex = -1;
            if (timestamps && timestamps.length > 0) {
                for (let i = timestamps.length - 1; i >= 0; i--) {
                    if (currentTime >= timestamps[i].time - 0.5) {
                        activeTimestampIndex = i;
                        break;
                    }
                }
            }

            return (
                <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg flex flex-col shadow-sm w-full">
                    <div className="flex items-center w-full">
                        <audio ref={audioRef} src={src} onTimeUpdate={handleTimeUpdate} onEnded={handleEnded} onError={handleError} className="hidden" />
                        <button onClick={togglePlay} disabled={hasEnded && !isReviewMode} className={`mr-4 focus:outline-none transition-colors ${(hasEnded && !isReviewMode) ? 'text-gray-400 cursor-not-allowed' : hasError ? 'text-red-500' : 'text-blue-600 hover:text-blue-800'}`}>
                            {isPlaying ? <PauseCircle size={40} /> : hasError ? <AlertCircle size={40} /> : <PlayCircle size={40} />}
                        </button>
                        <div className="flex-1">
                            <div

        // --- STAGE 3: MINIGAME TỪ VỰNG ---
        function Stage3VocabGame({ onBackToResult }) {
            const [gamePhase, setGamePhase] = useState('learn'); // 'learn', 'play', 'finish'
            const [playList, setPlayList] = useState(VOCAB_DATA); // List từ đang chơi
            const [currentIndex, setCurrentIndex] = useState(0);
            const [options, setOptions] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [score, setScore] = useState(0);
            const [playingWord, setPlayingWord] = useState(null);
            
            // Array lưu các từ làm sai
            const [wrongVocabs, setWrongVocabs] = useState([]);

            const loadQuestion = () => {
                if (currentIndex >= playList.length) {
                    setGamePhase('finish');
                    return;
                }
                const currentVocab = playList[currentIndex];
                
                const incorrectOptions = VOCAB_DATA
                    .filter(v => v.word !== currentVocab.word)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3)
                    .map(v => v.meaning);
                
                const allOptions = shuffleArray([currentVocab.meaning, ...incorrectOptions]);
                setOptions(allOptions);
                setSelectedOption(null);
                
                setTimeout(() => playWordAudio(currentVocab.word), 500);
            };

            useEffect(() => {
                if (gamePhase === 'play') {
                    loadQuestion();
                }
            }, [currentIndex, gamePhase, playList]);

            const playWordAudio = (word) => {
                setPlayingWord(word);
                const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`;
                const audio = new Audio(audioUrl);
                
                audio.play().catch(err => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(word);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        utterance.onend = () => setPlayingWord(null);
                        window.speechSynthesis.speak(utterance);
                    } else {
                        setPlayingWord(null);
                    }
                });
                audio.onended = () => setPlayingWord(null);
            };

            const handleSelect = (opt) => {
                if (selectedOption !== null) return; 
                setSelectedOption(opt);
                
                const currentVocab = playList[currentIndex];
                if (opt === currentVocab.meaning) {
                    setScore(prev => prev + 1);
                } else {
                    if (!wrongVocabs.find(w => w.word === currentVocab.word)) {
                        setWrongVocabs(prev => [...prev, currentVocab]);
                    }
                }
            };

            const handleNext = () => {
                if (currentIndex + 1 >= playList.length) {
                    setGamePhase('finish');
                } else {
                    setCurrentIndex(prev => prev + 1);
                }
            };

            const handleRestartAll = () => {
                setPlayList(VOCAB_DATA);
                setWrongVocabs([]); 
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play'); 
            };

            const handleReplayWrong = () => {
                setPlayList(wrongVocabs);
                setWrongVocabs([]); 
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play');
            };

            if (gamePhase === 'learn') {
                return (
                    <div className="max-w-4xl mx-auto mt-8 px-4 pb-12">
                        <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                            <div className="bg-blue-600 p-6 text-white text-center">
                                <h2 className="text-2xl font-bold flex items-center justify-center">
                                    <BookOpen className="mr-2" />
                                    DANH SÁCH TỪ VỰNG QUAN TRỌNG
                                </h2>
                                <p className="mt-2 opacity-90">Hãy nghe và ghi nhớ các từ vựng này trước khi bước vào thử thách nhé!</p>
                            </div>
                            <div className="p-6 md:p-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {VOCAB_DATA.map((item, idx) => (
                                        <div key={idx} className={`flex items-center p-4 rounded-xl border transition-colors ${playingWord === item.word ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:bg-blue-50'}`}>
                                            <button 
                                                onClick={() => playWordAudio(item.word)}
                                                className={`flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4 transition-all ${playingWord === item.word ? 'bg-blue-500 text-white shadow-md scale-110' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'}`}
                                            >
                                                <Volume2 size={24} />
                                            </button>
                                            <div>
                                                <p className="font-bold text-lg text-gray-800">{item.word}</p>
                                                <p className="text-gray-600 text-sm">{item.meaning}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 text-center">
                                    <button 
                                        onClick={() => {
                                            setPlayList(VOCAB_DATA);
                                            setCurrentIndex(0);
                                            setScore(0);
                                            setWrongVocabs([]);
                                            setGamePhase('play');
                                        }}
                                        className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:scale-105 inline-flex items-center text-lg"
                                    >
                                        <Gamepad2 className="mr-2" size={28} /> Đã Nhớ! Bắt Đầu Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gamePhase === 'finish') {
                return (
                    <div className="min-h-[70vh] flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-purple-500">
                            <Award size={64} className="text-yellow-400 mx-auto mb-4" />
                            <h2 className="text-3xl font-black text-gray-800 mb-2">Hoàn Thành!</h2>
                            <p className="text-gray-600 mb-6">Bạn đã đối mặt với {playList.length} thử thách từ vựng.</p>
                            
                            <div className="text-5xl font-black text-purple-600 mb-8">
                                {score} <span className="text-2xl text-gray-400">/ {playList.length}</span>
                            </div>

                            <div className="space-y-3">
                                {wrongVocabs.length > 0 && (
                                    <button 
                                        onClick={handleReplayWrong}
                                        className="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition flex items-center justify-center animate-pulse shadow-md"
                                    >
                                        <RefreshCw size={20} className="mr-2" /> Chơi Lại {wrongVocabs.length} Câu Sai
                                    </button>
                                )}
                                <button 
                                    onClick={handleRestartAll}
                                    className="w-full py-3 bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <RefreshCw size={20} className="mr-2" /> Chơi Lại Toàn Bộ Từ Đầu
                                </button>
                                <button 
                                    onClick={() => setGamePhase('learn')}
                                    className="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <BookOpen size={20} className="mr-2" /> Xem Lại Từ Vựng
                                </button>
                                <button 
                                    onClick={onBackToResult}
                                    className="w-full py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <FileText size={20} className="mr-2" /> Trở Về Bài Test
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentVocab = playList[currentIndex];
            if (!currentVocab) return null; 

            return (
                <div className="max-w-3xl mx-auto mt-8 px-4 pb-12">
                    <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                        <div className="bg-purple-600 p-4 text-white flex justify-between items-center">
                            <div className="font-bold flex items-center">
                                <Gamepad2 className="mr-2" />
                                {playList.length < 10 ? 'LUYỆN TẬP CÂU SAI' : 'THỬ THÁCH NGHE TỪ VỰNG'}
                            </div>
                            <div className="bg-purple-800 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                                Câu {currentIndex + 1} / {playList.length}
                            </div>
                        </div>

                        <div className="p-6 md:p-10 text-center">
                            <p className="text-gray-600 mb-6 font-medium">Lắng nghe kỹ và chọn nghĩa tiếng Việt chính xác nhất cho cụm từ bạn vừa nghe thấy:</p>
                            
                            <button 
                                onClick={() => playWordAudio(currentVocab.word)}
                                className={`mx-auto w-24 h-24 rounded-full flex items-center justify-center transition-all shadow-lg mb-8 ${playingWord === currentVocab.word ? 'bg-purple-200 text-purple-600 scale-95 ring-4 ring-purple-300' : 'bg-purple-100 text-purple-500 hover:bg-purple-200 hover:scale-105'}`}
                            >
                                <Volume2 size={48} />
                            </button>

                            <div className="h-12 mb-6">
                                {selectedOption !== null && (
                                    <div className="animate-fade-in inline-block bg-yellow-100 border border-yellow-300 text-yellow-800 px-6 py-2 rounded-xl text-xl font-bold tracking-wide shadow-sm">
                                        {currentVocab.word}
                                    </div>
                                )}
                            </div>

                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {options.map((opt, idx) => {
                                    let btnClass = "p-4 rounded-xl border-2 font-bold text-left transition-all ";
                                    
                                    if (selectedOption === null) {
                                        btnClass += "border-gray-200 text-gray-700 hover:border-purple-300 hover:bg-purple-50";
                                    } else {
                                        if (opt === currentVocab.meaning) {
                                            btnClass += "border-green-500 bg-green-100 text-green-800"; 
                                        } else if (opt === selectedOption && selectedOption !== currentVocab.meaning) {
                                            btnClass += "border-red-500 bg-red-100 text-red-800"; 
                                        } else {
                                            btnClass += "border-gray-100 text-gray-400 opacity-50"; 
                                        }
                                    }

                                    return (
                                        <button 
                                            key={idx}
                                            onClick={() => handleSelect(opt)}
                                            className={btnClass}
                                            disabled={selectedOption !== null}
                                        >
                                            {opt}
                                            {selectedOption !== null && opt === currentVocab.meaning && <CheckCircle className="inline float-right text-green-600" size={20} />}
                                            {selectedOption !== null && opt === selectedOption && selectedOption !== currentVocab.meaning && <XCircle className="inline float-right text-red-600" size={20} />}
                                        </button>
                                    );
                                })}
                            </div>

                            <div className="mt-8 h-12">
                                {selectedOption !== null && (
                                    <button 
                                        onClick={handleNext}
                                        className="bg-gray-800 hover:bg-black text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 animate-fade-in"
                                    >
                                        Câu Tiếp Theo &rarr;
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [stage, setStage] = useState(1); 
            const [answers, setAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.duration);

            useEffect(() => {
                if (isSubmitted) return;
                if (timeLeft <= 0) {
                    setIsSubmitted(true);
                    setStage(2);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, isSubmitted]);

            const handleSubmit = () => {
                setIsSubmitted(true);
                setStage(2);
                window.scrollTo(0, 0);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
                    <header className="bg-white shadow-md sticky top-0 z-50 overflow-x-auto">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-row justify-between items-center gap-4 min-w-[700px]">
                            {/* Tiêu đề bên trái */}
                            <div className="font-black text-xl md:text-2xl text-blue-800 uppercase tracking-wide whitespace-nowrap flex-1 text-left">
                                VSTEP LISTENING TEST 06
                            </div>
                            
                            {/* Đồng hồ ở giữa */}
                            <div className="flex-1 flex justify-center">
                                <div className={`flex items-center space-x-2 font-mono text-xl px-4 py-1.5 rounded-md font-bold whitespace-nowrap ${timeLeft < 300 && !isSubmitted ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>
                                    <Clock size={20} />
                                    <span>{formatTime(timeLeft)}</span>
                                </div>
                            </div>

                            {/* Navigation Tabs ở rìa phải */}
                            <div className="flex-1 flex justify-end">
                                <div className="flex bg-gray-100 p-1 rounded-lg whitespace-nowrap">
                                    <button 
                                        onClick={() => setStage(1)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 1 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'}`}
                                    >
                                        Làm Bài
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(2)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 2 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        Kết Quả
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(3)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center ${stage === 3 ? 'bg-purple-500 text-white shadow-sm' : 'text-purple-600 hover:bg-purple-100'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        <Gamepad2 size={16} className="mr-1" /> Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="h-auto min-h-[calc(100vh-64px)] pb-10">
                        {stage === 1 && <Stage1Test answers={answers} setAnswers={setAnswers} onSubmit={handleSubmit} />}
                        {stage === 2 && <Stage2Result answers={answers} onGoToGame={() => setStage(3)} />}
                        {stage === 3 && <Stage3VocabGame onBackToResult={() => setStage(2)} />}
                    </main>

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .animate-fade-in {
                            animation: fadeIn 0.3s ease-out forwards;
                        }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
