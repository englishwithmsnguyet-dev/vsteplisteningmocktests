                        "transcript": "Questions 9 to 12\nMan: My guest today is the star of the London Ballet Company, twenty-two-year-old Elena Karpov. Elena you were born in Bulgaria. Did you always want to be a dancer?\nWoman: Well, I was a very lively little girl, so at the age of seven my mother sent me to gymnastics classes. When I was nine, I went on to ballet lessons and from that moment I knew that I wanted to spend my life dancing. Two years later, when I was eleven, I won a place at the New York Ballet School.\nMan: So you had to move to the United States. Did you miss your family?\nWoman: Oh yes. At first it was difficult being away from home and not knowing a lot of English. But it taught me how to look after myself and not to depend on others. There were other Bulgarian students there and we actually found it quite easy to learn enough English to take part in the lessons with the other students.\nMan: Tell us about your latest role with the London Ballet Company.\nWoman: I'm going to dance the part of Cinderella. It's a story about a poor girl who marries a handsome prince. My parents used to read it to me when I was little. I'd never seen the ballet before, but I already knew the music really well. I'm sure children will love the ballet.\nMan: What do you do when you're not practicing or performing?\nWoman: Before I joined this company I spent two weeks going round London as a tourist. I don't have time for sightseeing now, but I love trying on the latest fashions with my friends. I'm always buying new jeans and trainers! I'm not too keen on discos and nightclubs I dance enough during the day!\nMan: You must have lots of fans.\nWoman: Quite a few! They always ask for a photograph of me, but unfortunately I don't have many to give away. I sometimes sign their programs instead and if I can I give them one of the flowers I've received from the audience. They always ask for tickets, but of course that's not possible.\nMan: What's been the best thing that's happened in your career so far?\nWoman: Well, I've been a guest dancer with ballet companies in Moscow and Vienna and I appeared twice on television in Bulgaria and met the president! I shall never forget that! But the most satisfying thing for me is that I'm paid for doing what I really enjoy - dancing!\nMan: Elena, thank you for talking to us.\nWoman: Thank you.\n\nQuestions 13 to 16\nWoman: Today, I'm with Robin Marshall, who has just written a book about traveling in Argentina. Robin, tell us about yourself...\nMan: Well, I've travelled to South America a lot for my work and I know Argentina well now. So well that I could be a tour guide if I wanted! I speak fluent Spanish, so I don't need anyone to translate for me. My job involves traveling around selling products for my company. I meet a lot of people doing that, and I wanted to share those experiences with others, so I decided to try writing.\nWoman: So, tell us about your last visit to Argentina. What was the weather like?\nMan: Well, it was winter there, so mornings were cold, but I'd expected that. Every day they said on the radio that it would be sunny later and sure enough, it was! I wanted to go sightseeing, and the weather was perfect for that.\nWoman: And where did you go when you went sightseeing?\nMan: Well, I went to a wonderful market that sold everything from modern art to old recordings of traditional music, which I collect. I came home with a beautiful painting of the area I also saw a wonderful antique chair, but unfortunately it was too big to bring back.\nWoman: Now, Argentina is famous for its dancing. Did you see any performances during your trip?\nMan: I did, yes. It reminded me of when I used to attend dance classes. I enjoyed them although I was never very good. I'm sure my teacher was pleased when I said I wasn't going to continue! But these dancers made it look so easy that at that moment I felt like joining in and dancing with them.\nWoman: It sounds wonderful! And what else did you do?\nMan: Well, I went to a small village on the coast. I took the bus there, and got a room in a small hotel. The hotel owner was very friendly. He took me down the river in his boat. It was very beautiful - you could see the forest in the distance.\nWoman: Do you have a favorite place in Argentina?\nMan: Definitely. It's a mountain near Buenos Aires. It's famous for its spectacular scenery. But when I went there it was very misty and the sun was just rising. You couldn't see much. there were no birds or animals about It was totally quiet, and I loved that. I shall go back one day.\nWoman: We look forward to reading your book. Thank you, Robin.\nMan: Thank you.\n\nQuestions 17 to 20\nWoman: Harry Park, you run a travel company which organizes adventure holidays in some difficult places? How did you first become interested in Adventure travel?\nMan: Well, my father worked in an insurance company once he had a family but before that he'd spent several years traveling the world and he never stopped telling us about it. His stories were much more exciting than the books I read and they make me want to travel and have adventures of my own.\nWoman: And what made you decide to start an adventure travel company?\nMan: Well, when I was in my twenties, I traveled a lot in different countries I went exploring and climbing in mountains and deserts. I wanted to show other people how wonderful these things were. The business has been very successful but when I started it I didn't know if I'd make any money.\nWoman: Your company is called Far and wide. How did you choose the name?\nMan: Well, I just called it Park Travel at first. But everyone thought that was terribly boring! My wife kept suggesting different things but in the end it was a customer who gave me the idea. Far and wide is also the title of a book that a friend wrote so it reminds me of him too.\nWoman: Great... The places you visit are usually very unspoilt, Harry. Some people think it's not a good idea to take tourists there. What would you say to them?\nMan: Well, most of the places we visit have no inhabitants, so we aren't going to spoil people's way of life or bring in things like television and fridges! And I make sure that we always take care of the environment. We are careful not to cause pollution, so we take all our rubbish away.\nWoman: Some of the things you do are also dangerous. Do you enjoy danger?\nMan: Well, it's not a question of enjoying it. It's just that you can't do what I do without thinking about the possible dangers. I'm never frightened though. If I'm taking a group up a mountain or something like that. I just concentrate on what I have to do and get on with it.\nWoman: You've been to some fascinating places, Harry. What's your favorite?\nMan: It's in India. You travel along a river through spectacular scenery and up into the mountains in Madhya Pradesh. In the valley on the other side there's a wonderful old castle. It's magical. The mountains hide it, so few people know it's there ...\nWoman: Thanks for talking to us, Harry ...\nMan: Thank you.",

                                        "text": "Chào mừng đến Green Vale Agricultural Park. Công viên mới mở một tuần nên các bạn là những khách đầu tiên. Khu phức hợp rất rộng với nhiều triển lãm trong nhà và ngoài trời. Nhiệm vụ của công viên là tạo cơ hội giáo dục cho công chúng rộng rãi, đồng thời cung cấp địa điểm nghiên cứu cho nhiều nhà nông học và nhà khoa học.\nTừ khu lễ tân, đi theo lối chính sẽ đến khu Rare Breeds, nơi giữ nhiều loài vật. Bên cạnh đó về phía đông là khu đồng cỏ lớn cho các giống quý hiếm. Xa hơn về phía đông, phần lớn nhất của công viên là Forest Area. Phía nam khu đồng cỏ, cạnh khu lễ tân, là Experimental Crop Area. Ở giữa công viên có hồ tròn. Hai hình chữ nhật nhỏ là Fish Farms, phía đông là vùng đầm lầy thu hút chim di cư, và góc đông nam là Market Garden trồng rau và hoa.\nCông chúng có thể thăm hầu hết các khu gần như quanh năm, trừ khi có biển báo khu vực đang dùng cho thí nghiệm kiểm soát. Ô tô bị cấm trong công viên. Khách có thể thuê xe đạp phía sau khu lễ tân, đi bộ hoặc đi xe điện chạy bằng năng lượng mặt trời. Ở khu Rare Breeds hiện có dê, cừu, gà mái và các loại gia cầm khác. Mục đích chính của khu này không phải chỉ để bảo tồn động vật hiếm, mà để duy trì sự đa dạng giống và mở rộng nguồn gene cho phát triển nông nghiệp."

                        "transcript": "Questions 21 to 25:\nGood morning. I'm very pleased to have been invited along to your club to talk about our Charity Sponsored Walking Holiday for Education Aid. I'll start by giving you a brief overview of what it entails. First of all, let me explain what we mean by 'sponsored' here. This is where people promise to donate money to the charity if you achieve your goal. In this case, to walk a certain number of miles. Basically, we are organizing a ten-day holiday, from the sixth to the sixteenth of November, with eight-day actual walking, trekking in the Semira Mountains. Let's have a look at some of the details.\nWe require you to raise sponsorship money of at least $3,200, paying $250 of it up front as a deposit, and the rest in stages throughout the year. Out of this, about 35% will go on your expenses, and that leaves 65% guaranteed to go to the charity, which brings me to the most important part. This trek is being specifically organized to help education in the Semira region. Last year, we helped train teachers for the disabled, and this year, we're focusing on the pupils. Each of the walkers' sponsorship money will go to help an individual special needs pupil in one of the mountain schools.\nIn the second part of the talk, I'll be giving you a lot more details, but back to the basic information - age limits. This is the second time we have run this kind of holiday, and um, on the first we even had an eighty-year old. But we found it was wise to establish limits this time. You have to be at least eighteen and the top limit is now seventy, though you need to obtain a health certificate from your doctor if you are over sixty years old. Now, the Semira Mountains are among the highest in the world but you mustn't be too daunted we will mainly be trekking in the foothills only, although there will be spectacular views even in the foothills. However, you will need to be extremely fit if you aren't now, and you're interested in coming with us. You have plenty of time to get into shape.\nYou will be sleeping in tents, so you must have quite a bit of equipment with you, but you will be helped by local assistants. Your bedding and so forth will be carried by them. We ask that you only walk with a small rucksack with needs for the day.\nI don't think I've really said enough about the marvellous area you'll be walking in. Let's have a look at some of the sights you'll be seeing. Apart from these spectacular snow-covered peaks and valleys, there are marvellous historic villages. The area has been famous for centuries for making beautiful carpets although recently there has been a trend to move into weaving blankets and wood carving. The people are extremely friendly and welcoming. We deliberately keep the parties small in size to minimize disruption to people and landscape.\n\nQuestions 26 to 30:\nWelcome to all of you ... Can everybody see and hear me? ... Good .... I'm Sally, your guide for this tour of the Bicentennial Park. I hope that you're all wearing your most comfortable shoes and that you can keep up the pace. So, let's get under way on our tour around this wonderful park.\nI'll start today with some general background information. There used to be a lot of factories in this area until the 1960s. Creating the park required the demolition of lots of derelict buildings on the site, so most of the exciting park space all around you was originally warehouses and storehouses. The idea of building a public park here was first discussed when a property developer proposed a high-rise housing development, but the local community wasn't happy. If the land was to be cleaned up, they wanted to use the site for recreation. Residents wanted open space for outdoor activities rather than housing or even an indoor sports complex.\nNow, to the Bicentennial Park itself. It has two areas, a nature reserve and a formal park with man-made features and gardens. The tall blue-and-white building in front of us is called The Tower, and is the centre point for the formal gardens. It stands twelve metres high, so follow me up the stairs to where we can take advantage of the fantastic views.\nWell, here we are at the top of The Tower, and we're going to look at the view from each direction. Out to the east, the large buildings about a kilometre away are on the Olympic site. There's an indoor arena for gymnastics, a stadium for track and field, and a swimming pool for races and synchronised swimming and also diving. If you look carefully down there, you can see the train lines. The Olympic site has its own station to encourage the use of public transport. There is also a car park, but it only holds a limited number of cars. The formal park has some specially-created water features. If you look out here to the south, you can see a circular ornamental pond. And around to the west, you can relax and sit on a bench to smell the flowers in the rose garden, and finally up to the north, if you look in front of you now, there's a lake with a small island in the centre. You can hire rowing boats at the boat shed, which you can't see from here. But if you look through the trees, you can see the café, which has lovely views across the water. Okay, let's climb down now.\n\nQuestions 31 to 35:\nWelcome to Green Vale Agricultural Park. As you know, we have only been open a week, so you are amongst our first visitors. We have lots of fascinating indoor and outdoor exhibits on our huge complex, spreading hundreds of hectares. Our remit is to give educational opportunities to the wider public, as well as to offer research sites for a wide variety of agriculturists and other scientists.\nLet's start by seeing what there is to do. As you can see, here on our giant wall plan, we are now situated in the Reception block ... here. As you walk out of the main door into the park, there is a path you can follow. If you follow this route, you will immediately come into the Rare Breeds section where we keep a wide variety of animals, which I shall be telling you a little more about later.\nNext to this ... moving east... is the large grazing area for the rare breeds. Then, further east... in the largest section of our Park is the Forest Area. South of the grazing area and in fact just next to the Reception block is our Experimental Crop Area. In the middle of the Park ... this circular area is our lake. These two small rectangular shapes here are the Fish Farms where we rear fish for sale. To the east of those is the marsh area which attracts a great many migrant birds. In the south-eastern corner, beyond the marsh, is our Market Garden area, growing vegetables and flowers.\nAll these areas can be visited by the general public for almost all the year... Although ... please take note of the large signs at the entrance to each area ... which tell ... which tell you when certain areas are being used for particular controlled experiments, and are therefore, temporarily out of bounds to the public. You can see for yourself what a huge area the park covers, and a key question is always how can we move around? Well, you have a choice of means, all environmentally friendly. Cars are banned in the park. We have bicycles which you can hire behind the reception block .. here ... the healthy ones of you can go on foot, and finally there's our electric tram, powered from solar cells. You find more information about this at the front entrance. A good place to start on your tour is the Rare Breeds section. We keep goats, sheep, and hens, and other kinds of poultry. We are also thinking of bringing in cows and horses, but we do not, as yet, have facilities for these bigger animals. The animals are fed in public twice a day, and a short lecture given on their feeding habits and nutritional needs. These are very popular with the public, but of course we mustn't lose sight of the main purpose of having this section not as such to preserve rare animals, but to maintain the diversity of breeds ... to broaden the gene pool for agricultural development.",

};

        // --- HÀM TRỘN MẢNG ---
        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- AUDIO COMPONENT ---
        const AudioPlayer = ({ src, audioId, isReviewMode = false, timestamps = [] }) => {
            const audioRef = useRef(null);
            const progressBarRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [hasEnded, setHasEnded] = useState(false);
            const [hasError, setHasError] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            
            // Lắng nghe sự kiện để tắt các audio khác khi có 1 audio bắt đầu phát
            useEffect(() => {
                const handleStopOtherAudios = (e) => {
                    if (e.detail !== audioId && audioRef.current) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    }
                };
                window.addEventListener('stopAllAudios', handleStopOtherAudios);
                return () => window.removeEventListener('stopAllAudios', handleStopOtherAudios);
            }, [audioId]);

            const playAudio = () => {
                // Bắn tín hiệu yêu cầu các AudioPlayer khác dừng lại
                window.dispatchEvent(new CustomEvent('stopAllAudios', { detail: audioId }));
                const playPromise = audioRef.current.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setIsPlaying(true);
                        setHasEnded(false);
                        setHasError(false);
                    }).catch(error => {
                        console.error("Lỗi phát âm thanh:", error);
                        setHasError(true);
                        setIsPlaying(false);
                    });
                }
            };

            const togglePlay = () => {
                if (hasEnded && !isReviewMode) return;
                
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    if (isReviewMode && hasEnded) {
                        audioRef.current.currentTime = 0;
                    }
                    playAudio();
                }
            };

            const handleTimeUpdate = () => {
                const current = audioRef.current.currentTime;
                const duration = audioRef.current.duration;
                setCurrentTime(current);
                if (duration) {
                    setProgress((current / duration) * 100);
                }
            };

            const handleEnded = () => {
                setIsPlaying(false);
                setHasEnded(true);
            };

            const handleError = (e) => {
                console.error("Không thể tải nguồn âm thanh.", e);
                setHasError(true);
            };

            // Tính năng tua trên thanh Progress
            const handleProgressClick = (e) => {
                if (!isReviewMode) return; // Chỉ cho tua khi ở chế độ Review
                if (hasError || !audioRef.current?.duration) return;
                
                const rect = progressBarRef.current.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const newPercentage = clickX / width;
                const newTime = newPercentage * audioRef.current.duration;
                
                audioRef.current.currentTime = newTime;
                setProgress(newPercentage * 100);
                
                // Tự động phát tiếp nếu đang pause và tua xong
                if (!isPlaying) playAudio();
            };

            // Tính toán Timestamp nào đang active (Đang nghe tới đâu sáng tới đó)
            let activeTimestampIndex = -1;
            if (timestamps && timestamps.length > 0) {
                for (let i = timestamps.length - 1; i >= 0; i--) {
                    if (currentTime >= timestamps[i].time - 0.5) {
                        activeTimestampIndex = i;
                        break;
                    }
                }
            }

            return (
                <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg flex flex-col shadow-sm w-full">
                    <div className="flex items-center w-full">
                        <audio ref={audioRef} src={src} onTimeUpdate={handleTimeUpdate} onEnded={handleEnded} onError={handleError} className="hidden" />
                        <button onClick={togglePlay} disabled={hasEnded && !isReviewMode} className={`mr-4 focus:outline-none transition-colors ${(hasEnded && !isReviewMode) ? 'text-gray-400 cursor-not-allowed' : hasError ? 'text-red-500' : 'text-blue-600 hover:text-blue-800'}`}>
                            {isPlaying ? <PauseCircle size={40} /> : hasError ? <AlertCircle size={40} /> : <PlayCircle size={40} />}
                        </button>
                        <div className="flex-1">
                            <div 
                                ref={progressBarRef}
                                onClick={handleProgressClick}
                                className={`h-3 bg-gray-200 rounded-full overflow-hidden ${isReviewMode ? 'cursor-pointer hover:h-4 transition-all' : ''}`}
                                title={isReviewMode ? "Bấm vào thanh này để tua nhanh/chậm" : ""}
                            >
                                <div className={`h-full transition-all duration-100 ${(hasEnded && !isReviewMode) ? 'bg-gray-400' : hasError ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${progress}%` }}></div>
                            </div>
                            <div className="flex justify-between mt-2 text-xs text-gray-500">
                                <span className={hasError ? "text-red-500 font-bold" : ""}>
                                    {hasError ? "Lỗi Audio." : (hasEnded && !isReviewMode) ? "Đã khóa (Chỉ nghe 1 lần)" : (hasEnded && isReviewMode) ? "Bấm Play để nghe lại" : isReviewMode ? "Bấm thanh màu xám để tua" : "Bấm Play để nghe"}
                                </span>
                            </div>
                        </div>
                    </div>
                    {/* KHU VỰC TIMESTAMPS GỌN GÀNG NHƯ YOUTUBE CHAPTERS */}
                    {isReviewMode && timestamps && timestamps.length > 0 && (
                        <div className="mt-3 pt-3 border-t border-blue-200">
                            <p className="text-xs font-bold text-blue-800 mb-2">TIMESTAMPS CHỮA BÀI (Bấm để tua đến vị trí bài nghe):</p>
                            <div className="flex flex-wrap gap-2">
                                {timestamps.map((ts, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => {
                                            if (hasError || !audioRef.current) return;
                                            audioRef.current.currentTime = ts.time;
                                            if (!isPlaying) playAudio();
                                        }}
                                        className={`px-2 py-1 text-xs font-bold rounded shadow-sm transition-colors ${activeTimestampIndex === idx ? 'bg-blue-600 text-white' : 'bg-white text-blue-600 border border-blue-300 hover:bg-blue-100'}`}
                                    >
                                        {ts.label} ({formatTimeStr(ts.time)})
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

                                                            {isSelected && !isActualCorrect && <XCircle size={18} className="ml-auto text-red-600" />}
                                                        </div>
                                                    );
                                                    })}
                                                </div>

                                                <div className="md:ml-12 bg-white p-4 rounded-lg border shadow-sm mt-4">
                                                    <h4 className="font-bold mb-2 text-blue-800 border-b pb-2 flex items-center"><BookOpen size={18} className="mr-2"/> Giải thích chi tiết</h4>
                                                    
                                                    <div className="mb-4 text-sm text-gray-700">
                                                        <p className="mb-1 font-semibold italic text-gray-800">Dịch câu hỏi: {q.translation.question}</p>
                                                        <ul className="mb-3 pl-4 list-disc text-gray-700 mt-2">
                                                            {Object.entries(q.translation.options).map(([k, v]) => (<li key={k}><strong>{k}.</strong> {v}</li>))}
                                                        </ul>
                                                    </div>

                                                    {/* Phần giải thích logic sai/đúng */}
                                                    <div className="space-y-3 text-sm">
                                                        {isUnanswered && (
                                                            <div className="p-3 bg-yellow-50 border border-yellow-200 rounded text-yellow-800">
                                                                <strong>Bạn đã bỏ trống câu này!</strong> Hãy luôn thử dự đoán đáp án dù không nghe rõ nhé.
                                                            </div>
                                                        )}
                                                        
                                                        {userAns && !isCorrect && (
                                                            <div className="p-3 bg-red-50 border border-red-200 rounded text-red-800">
                                                                <span className="font-bold uppercase mb-1 block">Tại sao bạn sai?</span>
                                                                <strong>Bạn chọn {userAns}:</strong> {q.explanations[userAns]}
                                                            </div>
                                                        )}
                                                        
                                                        <div className="p-3 bg-green-50 border border-green-200 rounded text-green-800">
                                                            <span className="font-bold uppercase mb-1 block">Phân tích đáp án đúng</span>
                                                            <strong>Đáp án {q.correct}:</strong> {q.explanations[q.correct]}
                                                        </div>
                                                    </div>

                                                    {/* Trích đoạn Transcript Bôi đỏ */}
                                                    <div className="mt-4 pt-4 border-t border-dashed">
                                                        <div className="flex items-center justify-between mb-2">
                                                            <h5 className="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center"><FileText size={14} className="mr-1"/> Đoạn Audio xuất hiện đáp án:</h5>
                                                        </div>
                                                        <p className="bg-gray-50 p-3 rounded text-gray-800 italic leading-relaxed" dangerouslySetInnerHTML={{ __html: q.transcriptSnippet }}></p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                        })}
                                    </div>

                                    {/* NÚT ẨN/HIỆN TRANSCRIPT ĐẦY ĐỦ */}
                                    <div className="mt-8 border-t-2 border-dashed pt-6 mb-4 px-4 md:px-8">
                                        <button onClick={() => toggleTranscript(part.id)} className="flex items-center justify-center w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-lg transition-colors">
                                            <FileText className="mr-2" size={20} />
                                            {showTranscript[part.id] ? "Ẩn Transcript (Nội dung bài nghe đầy đủ)" : "Hiện Transcript (Nội dung bài nghe đầy đủ)"}
                                        </button>

                                        {/* PHẦN DỊCH TIẾNG VIỆT */}
                                        {showTranscript[part.id] && part.transcriptTranslations && (
                                            <div className="mt-4 p-4 bg-white border border-blue-200 rounded-lg shadow-sm">
                                                <p className="text-sm font-bold text-blue-800 mb-3 uppercase flex items-center">
                                                    <BookOpen size={16} className="mr-2" />
                                                    Xem bản dịch tiếng Việt
                                                </p>
                                                <div className="flex flex-wrap gap-2 mb-4">
                                                    {part.transcriptTranslations.map((trans, idx) => (
                                                        <button 
                                                            key={idx}
                                                            onClick={() => toggleTranslation(part.id, trans.label)}
                                                            className={`px-3 py-1.5 text-sm font-bold rounded shadow-sm transition-colors ${activeTranslation[part.id] === trans.label ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100'}`}
                                                        >
                                                            Dịch {trans.label}
                                                        </button>
                                                    ))}
                                                </div>
                                                
                                                {/* Khu vực hiển thị nội dung dịch */}
                                                {activeTranslation[part.id] && (
                                                    <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg text-gray-800 text-sm md:text-base leading-relaxed whitespace-pre-line animate-fade-in border-l-4 border-l-blue-500">
                                                        <h5 className="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-2">
                                                            {activeTranslation[part.id]} (Tiếng Việt):
                                                        </h5>
                                                        {part.transcriptTranslations.find(t => t.label === activeTranslation[part.id])?.text}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {showTranscript[part.id] && (
                                            <div className="mt-4 p-5 bg-yellow-50 border border-yellow-200 rounded-lg text-gray-800 text-sm md:text-base leading-relaxed whitespace-pre-line">
                                                {part.transcript}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- STAGE 3: MINIGAME TỪ VỰNG ---
        function Stage3VocabGame({ onBackToResult }) {
            const [gamePhase, setGamePhase] = useState('learn'); // 'learn', 'play', 'finish'
            const [playList, setPlayList] = useState(VOCAB_DATA); // List từ đang chơi
            const [currentIndex, setCurrentIndex] = useState(0);
            const [options, setOptions] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [score, setScore] = useState(0);
            const [playingWord, setPlayingWord] = useState(null);
            
            // Array lưu các từ làm sai
            const [wrongVocabs, setWrongVocabs] = useState([]);

            const loadQuestion = () => {
                if (currentIndex >= playList.length) {
                    setGamePhase('finish');
                    return;
                }
                const currentVocab = playList[currentIndex];
                
                // Lấy 3 nghĩa sai ngẫu nhiên từ TỔNG DATA gốc để lúc nào cũng có đủ 3 options gây nhiễu
                const incorrectOptions = VOCAB_DATA
                    .filter(v => v.word !== currentVocab.word)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3)
                    .map(v => v.meaning);
                
                const allOptions = shuffleArray([currentVocab.meaning, ...incorrectOptions]);
                setOptions(allOptions);
                setSelectedOption(null);
                
                // Trì hoãn một chút để UI render xong rồi mới phát âm thanh
                setTimeout(() => playWordAudio(currentVocab.word), 500);
            };

            useEffect(() => {
                if (gamePhase === 'play') {
                    loadQuestion();
                }
            }, [currentIndex, gamePhase, playList]);

            const playWordAudio = (word) => {
                setPlayingWord(word);
                const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`;
                const audio = new Audio(audioUrl);
                
                audio.play().catch(err => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(word);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        utterance.onend = () => setPlayingWord(null);
                        window.speechSynthesis.speak(utterance);
                    } else {
                        setPlayingWord(null);
                    }
                });
                audio.onended = () => setPlayingWord(null);
            };

            const handleSelect = (opt) => {
                if (selectedOption !== null) return; 
                setSelectedOption(opt);
                
                const currentVocab = playList[currentIndex];
                if (opt === currentVocab.meaning) {
                    setScore(prev => prev + 1);
                } else {
                    // Nếu chọn sai, thêm từ đó vào danh sách wrongVocabs (không add trùng)
                    if (!wrongVocabs.find(w => w.word === currentVocab.word)) {
                        setWrongVocabs(prev => [...prev, currentVocab]);
                    }
                }
            };

            const handleNext = () => {
                if (currentIndex + 1 >= playList.length) {
                    setGamePhase('finish');
                } else {
                    setCurrentIndex(prev => prev + 1);
                }
            };

            // Chơi lại toàn bộ 10 từ
            const handleRestartAll = () => {
                setPlayList(VOCAB_DATA);
                setWrongVocabs([]); // reset sai
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play'); 
            };

            // Chỉ chơi lại những câu đã sai
            const handleReplayWrong = () => {
                setPlayList(wrongVocabs);
                setWrongVocabs([]); // reset để bắt lỗi lại cho lượt đánh này
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play');
            };

            if (gamePhase === 'learn') {
                return (
                    <div className="max-w-4xl mx-auto mt-8 px-4 pb-12">
                        <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                            <div className="bg-blue-600 p-6 text-white text-center">
                                <h2 className="text-2xl font-bold flex items-center justify-center">
                                    <BookOpen className="mr-2" />
                                    DANH SÁCH TỪ VỰNG QUAN TRỌNG
                                </h2>
                                <p className="mt-2 opacity-90">Hãy nghe và ghi nhớ các từ vựng này trước khi bước vào thử thách nhé!</p>
                            </div>
                            <div className="p-6 md:p-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {VOCAB_DATA.map((item, idx) => (
                                        <div key={idx} className={`flex items-center p-4 rounded-xl border transition-colors ${playingWord === item.word ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:bg-blue-50'}`}>
                                            <button 
                                                onClick={() => playWordAudio(item.word)}
                                                className={`flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4 transition-all ${playingWord === item.word ? 'bg-blue-500 text-white shadow-md scale-110' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'}`}
                                            >
                                                <Volume2 size={24} />
                                            </button>
                                            <div>
                                                <p className="font-bold text-lg text-gray-800">{item.word}</p>
                                                <p className="text-gray-600 text-sm">{item.meaning}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 text-center">
                                    <button 
                                        onClick={() => {
                                            setPlayList(VOCAB_DATA);
                                            setCurrentIndex(0);
                                            setScore(0);
                                            setWrongVocabs([]);
                                            setGamePhase('play');
                                        }}
                                        className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:scale-105 inline-flex items-center text-lg"
                                    >
                                        <Gamepad2 className="mr-2" size={28} /> Đã Nhớ! Bắt Đầu Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gamePhase === 'finish') {
                return (
                    <div className="min-h-[70vh] flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-purple-500">
                            <Award size={64} className="text-yellow-400 mx-auto mb-4" />
                            <h2 className="text-3xl font-black text-gray-800 mb-2">Hoàn Thành!</h2>
                            <p className="text-gray-600 mb-6">Bạn đã đối mặt với {playList.length} thử thách từ vựng.</p>
                            
                            <div className="text-5xl font-black text-purple-600 mb-8">
                                {score} <span className="text-2xl text-gray-400">/ {playList.length}</span>
                            </div>

                            <div className="space-y-3">
                                {wrongVocabs.length > 0 && (
                                    <button 
                                        onClick={handleReplayWrong}
                                        className="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition flex items-center justify-center animate-pulse shadow-md"
                                    >
                                        <RefreshCw size={20} className="mr-2" /> Chơi Lại {wrongVocabs.length} Câu Sai
                                    </button>
                                )}
                                <button 
                                    onClick={handleRestartAll}
                                    className="w-full py-3 bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <RefreshCw size={20} className="mr-2" /> Chơi Lại Toàn Bộ Từ Đầu
                                </button>
                                <button 
                                    onClick={() => setGamePhase('learn')}
                                    className="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <BookOpen size={20} className="mr-2" /> Xem Lại Từ Vựng
                                </button>
                                <button 
                                    onClick={onBackToResult}
                                    className="w-full py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <FileText size={20} className="mr-2" /> Trở Về Bài Test
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentVocab = playList[currentIndex];
            if (!currentVocab) return null; // Safety check

            return (
                <div className="max-w-3xl mx-auto mt-8 px-4 pb-12">
                    <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                        {/* Header của Minigame */}
                        <div className="bg-purple-600 p-4 text-white flex justify-between items-center">
                            <div className="font-bold flex items-center">
                                <Gamepad2 className="mr-2" />
                                {playList.length < 10 ? 'LUYỆN TẬP CÂU SAI' : 'THỬ THÁCH NGHE TỪ VỰNG'}
                            </div>
                            <div className="bg-purple-800 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                                Câu {currentIndex + 1} / {playList.length}
                            </div>
                        </div>

                        <div className="p-6 md:p-10 text-center">
                            <p className="text-gray-600 mb-6 font-medium">Lắng nghe kỹ và chọn nghĩa tiếng Việt chính xác nhất cho cụm từ bạn vừa nghe thấy:</p>
                            
                            {/* Nút phát loa */}
                            <button 
                                onClick={() => playWordAudio(currentVocab.word)}
                                className={`mx-auto w-24 h-24 rounded-full flex items-center justify-center transition-all shadow-lg mb-8 ${playingWord === currentVocab.word ? 'bg-purple-200 text-purple-600 scale-95 ring-4 ring-purple-300' : 'bg-purple-100 text-purple-500 hover:bg-purple-200 hover:scale-105'}`}
                            >
                                <Volume2 size={48} />
                            </button>

                            {/* Khu vực hiển thị từ tiếng Anh (chỉ hiện sau khi đã chọn đáp án) */}
                            <div className="h-12 mb-6">
                                {selectedOption !== null && (
                                    <div className="animate-fade-in inline-block bg-yellow-100 border border-yellow-300 text-yellow-800 px-6 py-2 rounded-xl text-xl font-bold tracking-wide shadow-sm">
                                        {currentVocab.word}
                                    </div>
                                )}
                            </div>

                            {/* Các lựa chọn đáp án */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {options.map((opt, idx) => {
                                    let btnClass = "p-4 rounded-xl border-2 font-bold text-left transition-all ";
                                    
                                    if (selectedOption === null) {
                                        btnClass += "border-gray-200 text-gray-700 hover:border-purple-300 hover:bg-purple-50";
                                    } else {
                                        if (opt === currentVocab.meaning) {
                                            btnClass += "border-green-500 bg-green-100 text-green-800"; // Đáp án đúng luôn hiện xanh
                                        } else if (opt === selectedOption && selectedOption !== currentVocab.meaning) {
                                            btnClass += "border-red-500 bg-red-100 text-red-800"; // Bấm sai thì hiện đỏ
                                        } else {
                                            btnClass += "border-gray-100 text-gray-400 opacity-50"; // Các ô khác mờ đi
                                        }
                                    }

                                    return (
                                        <button 
                                            key={idx}
                                            onClick={() => handleSelect(opt)}
                                            className={btnClass}
                                            disabled={selectedOption !== null}
                                        >
                                            {opt}
                                            {selectedOption !== null && opt === currentVocab.meaning && <CheckCircle className="inline float-right text-green-600" size={20} />}
                                            {selectedOption !== null && opt === selectedOption && selectedOption !== currentVocab.meaning && <XCircle className="inline float-right text-red-600" size={20} />}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Nút Next */}
                            <div className="mt-8 h-12">
                                {selectedOption !== null && (
                                    <button 
                                        onClick={handleNext}
                                        className="bg-gray-800 hover:bg-black text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 animate-fade-in"
                                    >
                                        Câu Tiếp Theo &rarr;
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [stage, setStage] = useState(1); // 1: Test, 2: Result, 3: Vocab Game
            const [answers, setAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.duration);

            useEffect(() => {
                if (isSubmitted) return;
                if (timeLeft <= 0) {
                    setIsSubmitted(true);
                    setStage(2);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, isSubmitted]);

            const handleSubmit = () => {
                setIsSubmitted(true);
                setStage(2);
                window.scrollTo(0, 0);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
                    {/* Header cố định */}
                    <header className="bg-white shadow-md sticky top-0 z-50 overflow-x-auto">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-row justify-between items-center gap-4 min-w-[700px]">
                            {/* Tiêu đề bên trái */}
                            <div className="font-black text-xl md:text-2xl text-blue-800 uppercase tracking-wide whitespace-nowrap flex-1 text-left">
                                VSTEP LISTENING TEST 07
                            </div>
                            
                            {/* Đồng hồ ở giữa */}
                            <div className="flex-1 flex justify-center">
                                <div className={`flex items-center space-x-2 font-mono text-xl px-4 py-1.5 rounded-md font-bold whitespace-nowrap ${timeLeft < 300 && !isSubmitted ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>
                                    <Clock size={20} />
                                    <span>{formatTime(timeLeft)}</span>
                                </div>
                            </div>

                            {/* Navigation Tabs ở rìa phải */}
                            <div className="flex-1 flex justify-end">
                                <div className="flex bg-gray-100 p-1 rounded-lg whitespace-nowrap">
                                    <button 
                                        onClick={() => setStage(1)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 1 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'}`}
                                    >
                                        Làm Bài
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(2)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 2 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        Kết Quả
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(3)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center ${stage === 3 ? 'bg-purple-500 text-white shadow-sm' : 'text-purple-600 hover:bg-purple-100'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        <Gamepad2 size={16} className="mr-1" /> Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="h-auto min-h-[calc(100vh-64px)] pb-10">
                        {stage === 1 && <Stage1Test answers={answers} setAnswers={setAnswers} onSubmit={handleSubmit} />}
                        {stage === 2 && <Stage2Result answers={answers} onGoToGame={() => setStage(3)} />}
                        {stage === 3 && <Stage3VocabGame onBackToResult={() => setStage(2)} />}
                    </main>

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .animate-fade-in {
                            animation: fadeIn 0.3s ease-out forwards;
                        }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
