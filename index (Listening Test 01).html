        // --- HÀM TRỘN MẢNG ---
        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- AUDIO COMPONENT ---
        const AudioPlayer = ({ src, audioId, isReviewMode = false, timestamps = [] }) => {
            const audioRef = useRef(null);
            const progressBarRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [hasEnded, setHasEnded] = useState(false);
            const [hasError, setHasError] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            
            // Lắng nghe sự kiện để tắt các audio khác khi có 1 audio bắt đầu phát
            useEffect(() => {
                const handleStopOtherAudios = (e) => {
                    if (e.detail !== audioId && audioRef.current) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    }
                };
                window.addEventListener('stopAllAudios', handleStopOtherAudios);
                return () => window.removeEventListener('stopAllAudios', handleStopOtherAudios);
            }, [audioId]);

            const playAudio = () => {
                // Bắn tín hiệu yêu cầu các AudioPlayer khác dừng lại
                window.dispatchEvent(new CustomEvent('stopAllAudios', { detail: audioId }));
                const playPromise = audioRef.current.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setIsPlaying(true);
                        setHasEnded(false);
                        setHasError(false);
                    }).catch(error => {
                        console.error("Lỗi phát âm thanh:", error);
                        setHasError(true);
                        setIsPlaying(false);
                    });
                }
            };

            const togglePlay = () => {
                if (hasEnded && !isReviewMode) return;
                
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    if (isReviewMode && hasEnded) {
                        audioRef.current.currentTime = 0;
                    }
                    playAudio();
                }
            };

            const handleTimeUpdate = () => {
                const current = audioRef.current.currentTime;
                const duration = audioRef.current.duration;
                setCurrentTime(current);
                if (duration) {
                    setProgress((current / duration) * 100);
                }
            };

            const handleEnded = () => {
                setIsPlaying(false);
                setHasEnded(true);
            };

            const handleError = (e) => {
                console.error("Không thể tải nguồn âm thanh.", e);
                setHasError(true);
            };

            // Tính năng tua trên thanh Progress
            const handleProgressClick = (e) => {
                if (!isReviewMode) return; // Chỉ cho tua khi ở chế độ Review
                if (hasError || !audioRef.current?.duration) return;
                
                const rect = progressBarRef.current.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const newPercentage = clickX / width;
                const newTime = newPercentage * audioRef.current.duration;
                
                audioRef.current.currentTime = newTime;
                setProgress(newPercentage * 100);
                
                // Tự động phát tiếp nếu đang pause và tua xong
                if (!isPlaying) playAudio();
            };

            // Tính toán Timestamp nào đang active (Đang nghe tới đâu sáng tới đó)
            let activeTimestampIndex = -1;
            if (timestamps && timestamps.length > 0) {
                for (let i = timestamps.length - 1; i >= 0; i--) {
                    if (currentTime >= timestamps[i].time - 0.5) {
                        activeTimestampIndex = i;
                        break;
                    }
                }
            }

            return (
                <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg flex flex-col shadow-sm w-full">
                    <div className="flex items-center w-full">
                        <audio ref={audioRef} src={src} onTimeUpdate={handleTimeUpdate} onEnded={handleEnded} onError={handleError} className="hidden" />
                        <button onClick={togglePlay} disabled={hasEnded && !isReviewMode} className={`mr-4 focus:outline-none transition-colors ${(hasEnded && !isReviewMode) ? 'text-gray-400 cursor-not-allowed' : hasError ? 'text-red-500' : 'text-blue-600 hover:text-blue-800'}`}>
                            {isPlaying ? <PauseCircle size={40} /> : hasError ? <AlertCircle size={40} /> : <PlayCircle size={40} />}
                        </button>
                        <div className="flex-1">
                            <div 
                                ref={progressBarRef}
                                onClick={handleProgressClick}
                                className={`h-3 bg-gray-200 rounded-full overflow-hidden ${isReviewMode ? 'cursor-pointer hover:h-4 transition-all' : ''}`}
                                title={isReviewMode ? "Bấm vào thanh này để tua nhanh/chậm" : ""}
                            >
                                <div className={`h-full transition-all duration-100 ${(hasEnded && !isReviewMode) ? 'bg-gray-400' : hasError ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${progress}%` }}></div>
                            </div>
                            <div className="flex justify-between mt-2 text-xs text-gray-500">
                                <span className={hasError ? "text-red-500 font-bold" : ""}>
                                    {hasError ? "Lỗi Audio." : (hasEnded && !isReviewMode) ? "Đã khóa (Chỉ nghe 1 lần)" : (hasEnded && isReviewMode) ? "Bấm Play để nghe lại" : isReviewMode ? "Bấm thanh màu xám để tua" : "Bấm Play để nghe"}
                                </span>
                            </div>
                        </div>
                    </div>
                    {/* KHU VỰC TIMESTAMPS GỌN GÀNG NHƯ YOUTUBE CHAPTERS */}
                    {isReviewMode && timestamps && timestamps.length > 0 && (
                        <div className="mt-3 pt-3 border-t border-blue-200">
                            <p className="text-xs font-bold text-blue-800 mb-2">TIMESTAMPS CHỮA BÀI (Bấm để tua đến vị trí bài nghe):</p>
                            <div className="flex flex-wrap gap-2">
                                {timestamps.map((ts, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => {
                                            if (hasError || !audioRef.current) return;
                                            audioRef.current.currentTime = ts.time;
                                            if (!isPlaying) playAudio();
                                        }}
                                        className={`px-2 py-1 text-xs font-bold rounded shadow-sm transition-colors ${activeTimestampIndex === idx ? 'bg-blue-600 text-white' : 'bg-white text-blue-600 border border-blue-300 hover:bg-blue-100'}`}
                                    >
                                        {ts.label} ({formatTimeStr(ts.time)})
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        // --- STAGE 1: LÀM BÀI TEST ---

                                        })}
                                    </div>

                                    {/* NÚT ẨN/HIỆN TRANSCRIPT ĐẦY ĐỦ */}
                                    <div className="mt-8 border-t-2 border-dashed pt-6 mb-4 px-4 md:px-8">
                                        <button onClick={() => toggleTranscript(part.id)} className="flex items-center justify-center w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-lg transition-colors">
                                            <FileText className="mr-2" size={20} />
                                            {showTranscript[part.id] ? "Ẩn Transcript (Nội dung bài nghe đầy đủ)" : "Hiện Transcript (Nội dung bài nghe đầy đủ)"}
                                        </button>
                                        {showTranscript[part.id] && (
                                            <div className="mt-4 p-5 bg-yellow-50 border border-yellow-200 rounded-lg text-gray-800 text-sm md:text-base leading-relaxed whitespace-pre-line">
                                                {part.transcript}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- STAGE 3: MINIGAME TỪ VỰNG ---
        function Stage3VocabGame({ onBackToResult }) {
            const [gamePhase, setGamePhase] = useState('learn'); // 'learn', 'play', 'finish'
            const [playList, setPlayList] = useState(VOCAB_DATA); // List từ đang chơi
            const [currentIndex, setCurrentIndex] = useState(0);
            const [options, setOptions] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [score, setScore] = useState(0);
            const [playingWord, setPlayingWord] = useState(null);
            
            // Array lưu các từ làm sai
            const [wrongVocabs, setWrongVocabs] = useState([]);

            const loadQuestion = () => {
                if (currentIndex >= playList.length) {
                    setGamePhase('finish');
                    return;
                }
                const currentVocab = playList[currentIndex];
                
                // Lấy 3 nghĩa sai ngẫu nhiên từ TỔNG DATA gốc để lúc nào cũng có đủ 3 options gây nhiễu
                const incorrectOptions = VOCAB_DATA
                    .filter(v => v.word !== currentVocab.word)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3)
                    .map(v => v.meaning);
                
                const allOptions = shuffleArray([currentVocab.meaning, ...incorrectOptions]);
                setOptions(allOptions);
                setSelectedOption(null);
                
                // Trì hoãn một chút để UI render xong rồi mới phát âm thanh
                setTimeout(() => playWordAudio(currentVocab.word), 500);
            };

            useEffect(() => {
                if (gamePhase === 'play') {
                    loadQuestion();
                }
            }, [currentIndex, gamePhase, playList]);

            const playWordAudio = (word) => {
                setPlayingWord(word);
                const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`;
                const audio = new Audio(audioUrl);
                
                audio.play().catch(err => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(word);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        utterance.onend = () => setPlayingWord(null);
                        window.speechSynthesis.speak(utterance);
                    } else {
                        setPlayingWord(null);
                    }
                });
                audio.onended = () => setPlayingWord(null);
            };

            const handleSelect = (opt) => {
                if (selectedOption !== null) return; 
                setSelectedOption(opt);
                
                const currentVocab = playList[currentIndex];
                if (opt === currentVocab.meaning) {
                    setScore(prev => prev + 1);
                } else {
                    // Nếu chọn sai, thêm từ đó vào danh sách wrongVocabs (không add trùng)
                    if (!wrongVocabs.find(w => w.word === currentVocab.word)) {
                        setWrongVocabs(prev => [...prev, currentVocab]);
                    }
                }
            };

            const handleNext = () => {
                if (currentIndex + 1 >= playList.length) {
                    setGamePhase('finish');
                } else {
                    setCurrentIndex(prev => prev + 1);
                }
            };

            // Chơi lại toàn bộ 10 từ
            const handleRestartAll = () => {
                setPlayList(VOCAB_DATA);
                setWrongVocabs([]); // reset sai
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play'); 
            };

            // Chỉ chơi lại những câu đã sai
            const handleReplayWrong = () => {
                setPlayList(wrongVocabs);
                setWrongVocabs([]); // reset để bắt lỗi lại cho lượt đánh này
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play');
            };

            if (gamePhase === 'learn') {
                return (
                    <div className="max-w-4xl mx-auto mt-8 px-4 pb-12">
                        <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                            <div className="bg-blue-600 p-6 text-white text-center">
                                <h2 className="text-2xl font-bold flex items-center justify-center">
                                    <BookOpen className="mr-2" />
                                    DANH SÁCH TỪ VỰNG QUAN TRỌNG
                                </h2>
                                <p className="mt-2 opacity-90">Hãy nghe và ghi nhớ các từ vựng này trước khi bước vào thử thách nhé!</p>
                            </div>
                            <div className="p-6 md:p-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {VOCAB_DATA.map((item, idx) => (
                                        <div key={idx} className={`flex items-center p-4 rounded-xl border transition-colors ${playingWord === item.word ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:bg-blue-50'}`}>
                                            <button 
                                                onClick={() => playWordAudio(item.word)}
                                                className={`flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4 transition-all ${playingWord === item.word ? 'bg-blue-500 text-white shadow-md scale-110' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'}`}
                                            >
                                                <Volume2 size={24} />
                                            </button>
                                            <div>
                                                <p className="font-bold text-lg text-gray-800">{item.word}</p>
                                                <p className="text-gray-600 text-sm">{item.meaning}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 text-center">
                                    <button 
                                        onClick={() => {
                                            setPlayList(VOCAB_DATA);
                                            setCurrentIndex(0);
                                            setScore(0);
                                            setWrongVocabs([]);
                                            setGamePhase('play');
                                        }}
                                        className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:scale-105 inline-flex items-center text-lg"
                                    >
                                        <Gamepad2 className="mr-2" size={28} /> Đã Nhớ! Bắt Đầu Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gamePhase === 'finish') {
                return (
                    <div className="min-h-[70vh] flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-purple-500">
                            <Award size={64} className="text-yellow-400 mx-auto mb-4" />
                            <h2 className="text-3xl font-black text-gray-800 mb-2">Hoàn Thành!</h2>
                            <p className="text-gray-600 mb-6">Bạn đã đối mặt với {playList.length} thử thách từ vựng.</p>
                            
                            <div className="text-5xl font-black text-purple-600 mb-8">
                                {score} <span className="text-2xl text-gray-400">/ {playList.length}</span>
                            </div>

                            <div className="space-y-3">
                                {wrongVocabs.length > 0 && (
                                    <button 
                                        onClick={handleReplayWrong}
                                        className="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition flex items-center justify-center animate-pulse shadow-md"
                                    >
                                        <RefreshCw size={20} className="mr-2" /> Chơi Lại {wrongVocabs.length} Câu Sai
                                    </button>
                                )}
                                <button 
                                    onClick={handleRestartAll}
                                    className="w-full py-3 bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <RefreshCw size={20} className="mr-2" /> Chơi Lại Toàn Bộ Từ Đầu
                                </button>
                                <button 
                                    onClick={() => setGamePhase('learn')}
                                    className="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <BookOpen size={20} className="mr-2" /> Xem Lại Từ Vựng
                                </button>
                                <button 
                                    onClick={onBackToResult}
                                    className="w-full py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <FileText size={20} className="mr-2" /> Trở Về Bài Test
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentVocab = playList[currentIndex];
            if (!currentVocab) return null; // Safety check

            return (
                <div className="max-w-3xl mx-auto mt-8 px-4 pb-12">
                    <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                        {/* Header của Minigame */}
                        <div className="bg-purple-600 p-4 text-white flex justify-between items-center">
                            <div className="font-bold flex items-center">
                                <Gamepad2 className="mr-2" />
                                {playList.length < 10 ? 'LUYỆN TẬP CÂU SAI' : 'THỬ THÁCH NGHE TỪ VỰNG'}
                            </div>
                            <div className="bg-purple-800 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                                Câu {currentIndex + 1} / {playList.length}
                            </div>
                        </div>

                        <div className="p-6 md:p-10 text-center">
                            <p className="text-gray-600 mb-6 font-medium">Lắng nghe kỹ và chọn nghĩa tiếng Việt chính xác nhất cho cụm từ bạn vừa nghe thấy:</p>
                            
                            {/* Nút phát loa */}
                            <button 
                                onClick={() => playWordAudio(currentVocab.word)}
                                className={`mx-auto w-24 h-24 rounded-full flex items-center justify-center transition-all shadow-lg mb-8 ${playingWord === currentVocab.word ? 'bg-purple-200 text-purple-600 scale-95 ring-4 ring-purple-300' : 'bg-purple-100 text-purple-500 hover:bg-purple-200 hover:scale-105'}`}
                            >
                                <Volume2 size={48} />
                            </button>

                            {/* Khu vực hiển thị từ tiếng Anh (chỉ hiện sau khi đã chọn đáp án) */}
                            <div className="h-12 mb-6">
                                {selectedOption !== null && (
                                    <div className="animate-fade-in inline-block bg-yellow-100 border border-yellow-300 text-yellow-800 px-6 py-2 rounded-xl text-xl font-bold tracking-wide shadow-sm">
                                        {currentVocab.word}
                                    </div>
                                )}
                            </div>

                            {/* Các lựa chọn đáp án */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {options.map((opt, idx) => {
                                    let btnClass = "p-4 rounded-xl border-2 font-bold text-left transition-all ";
                                    
                                    if (selectedOption === null) {
                                        btnClass += "border-gray-200 text-gray-700 hover:border-purple-300 hover:bg-purple-50";
                                    } else {
                                        if (opt === currentVocab.meaning) {
                                            btnClass += "border-green-500 bg-green-100 text-green-800"; // Đáp án đúng luôn hiện xanh
                                        } else if (opt === selectedOption && selectedOption !== currentVocab.meaning) {
                                            btnClass += "border-red-500 bg-red-100 text-red-800"; // Bấm sai thì hiện đỏ
                                        } else {
                                            btnClass += "border-gray-100 text-gray-400 opacity-50"; // Các ô khác mờ đi
                                        }
                                    }

                                    return (
                                        <button 
                                            key={idx}
                                            onClick={() => handleSelect(opt)}
                                            className={btnClass}
                                            disabled={selectedOption !== null}
                                        >
                                            {opt}
                                            {selectedOption !== null && opt === currentVocab.meaning && <CheckCircle className="inline float-right text-green-600" size={20} />}
                                            {selectedOption !== null && opt === selectedOption && selectedOption !== currentVocab.meaning && <XCircle className="inline float-right text-red-600" size={20} />}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Nút Next */}
                            <div className="mt-8 h-12">
                                {selectedOption !== null && (
                                    <button 
                                        onClick={handleNext}
                                        className="bg-gray-800 hover:bg-black text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 animate-fade-in"
                                    >
                                        Câu Tiếp Theo &rarr;
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [stage, setStage] = useState(1); // 1: Test, 2: Result, 3: Vocab Game
            const [answers, setAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.duration);

            useEffect(() => {
                if (isSubmitted) return;
                if (timeLeft <= 0) {
                    setIsSubmitted(true);
                    setStage(2);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, isSubmitted]);

            const handleSubmit = () => {
                setIsSubmitted(true);
                setStage(2);
                window.scrollTo(0, 0);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
                    {/* Header cố định */}
                    <header className="bg-white shadow-md sticky top-0 z-50">
                        <div className="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center flex-wrap gap-2">
                            <div className="font-black text-xl md:text-2xl text-blue-800 uppercase tracking-wide flex items-center">
                                VSTEP LISTENING 01
                            </div>
                            
                            {/* Navigation Tabs */}
                            <div className="flex bg-gray-100 p-1 rounded-lg">
                                <button 
                                    onClick={() => setStage(1)}
                                    className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 1 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'}`}
                                >
                                    Làm Bài
                                </button>
                                <button 
                                    onClick={() => isSubmitted && setStage(2)}
                                    className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 2 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                    disabled={!isSubmitted}
                                >
                                    Kết Quả
                                </button>
                                <button 
                                    onClick={() => isSubmitted && setStage(3)}
                                    className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center ${stage === 3 ? 'bg-purple-500 text-white shadow-sm' : 'text-purple-600 hover:bg-purple-100'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                    disabled={!isSubmitted}
                                >
                                    <Gamepad2 size={16} className="mr-1" /> Minigame
                                </button>
                            </div>

                            <div className={`flex items-center space-x-2 font-mono text-xl px-3 py-1 rounded-md font-bold ${timeLeft < 300 && !isSubmitted ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>
                                <Clock size={20} />
                                <span>{formatTime(timeLeft)}</span>
                            </div>
                        </div>
                    </header>

                    <main className="h-auto min-h-[calc(100vh-64px)] pb-10">
                        {stage === 1 && <Stage1Test answers={answers} setAnswers={setAnswers} onSubmit={handleSubmit} />}
                        {stage === 2 && <Stage2Result answers={answers} onGoToGame={() => setStage(3)} />}
                        {stage === 3 && <Stage3VocabGame onBackToResult={() => setStage(2)} />}
                    </main>

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .animate-fade-in {
                            animation: fadeIn 0.3s ease-out forwards;
                        }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
