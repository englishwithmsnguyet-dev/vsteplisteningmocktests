                { label: "Hội thoại 3", text: "Người phỏng vấn: Ồ, một khung cảnh tuyệt vời. Tôi đang ở đây cùng Jack Williams, người đang kể cho tôi nghe về quê hương Swanton của ông ấy.\nJack: Vâng, đỉnh ngọn đồi này là nơi tốt nhất để ngắm nhìn khu vực. Swanton nằm trên bờ biển, bạn có thể nhìn thấy bến cảng từ đây, nhưng trên thực tế thị trấn được xây dựng dọc theo Sông Dean. Con sông này bắt nguồn từ một cái hồ trên những ngọn núi đằng xa kia, sau đó chảy xuống vùng đất bằng phẳng bên dưới chúng ta, nơi thị trấn được xây dựng.\n\nNgười phỏng vấn: Ông thích điều gì nhất khi sống ở đây?\nJack: Ở Swanton á? Ồ, đây là một thị trấn công nghiệp quan trọng và là một bến cảng, vì vậy có rất nhiều hoạt động, và có một khu rừng đằng sau thị trấn với động vật hoang dã thú vị. Nhưng điều thú vị nhất đối với tôi là những ngọn núi. Tôi đi leo núi bất cứ khi nào có cơ hội.\n\nNgười phỏng vấn: Còn về giải trí thì sao?\nJack: Có rất nhiều hình thức giải trí. Một trung tâm lớn đã được xây dựng vào năm ngoái để khuyến khích nghệ thuật, rất hiện đại. Nó có rạp chiếu phim, nhà hát và phòng trưng bày nghệ thuật. Và có cả bóng đá. Đội bóng địa phương dạo này thi đấu không tốt lắm. Vài năm trước, chúng tôi gần như đã giành được cúp. Và khu vực của chúng tôi nổi tiếng về âm nhạc, không phải ở chính Swanton, mà có một lễ hội âm nhạc nổi tiếng ở thị trấn bên cạnh.\n\nNgười phỏng vấn: Nhưng có những vấn đề về môi trường phải không?\nJack: Chúng tôi đang giải quyết điều đó. Con sông từng là một nơi tuyệt vời cho cá, nhưng nước bị ô nhiễm bởi các nhà máy đến nỗi hầu hết các loài cá biến mất. Chà, bây giờ chúng tôi đã dọn sạch dòng sông, và lũ cá đang bắt đầu quay trở lại. Nhưng tôi cảm thấy buồn về Rừng Swanton. Các cây cối thì khá khỏe mạnh, nhưng nếu bạn nhìn kỹ, không có loài chim nào ở đó, và đó là do ô nhiễm đã làm giảm số lượng côn trùng.\n\nNgười phỏng vấn: Swanton đang phát triển nhanh chóng. Ông có hài lòng về cách nó thay đổi không?\nJack: Bạn phải thay đổi theo thời đại thôi. Nó             transcript: `Questions 9 to 12
Interviewer: Rachel, tell us how your shows for children started. You studied art at college, didn't you?
Rachel: That's right. But I gave up my career as an artist when my twin daughters were born. Painting took up too much time when I was looking after them. I thought about teaching art classes part-time, but instead I started making dolls for my daughters. I love acting, so I often invented little plays for the dolls, doing the voices myself.

Interviewer: And when did you start doing shows for other people?
Rachel: When our daughters were five, my husband suggested using the dolls to entertain the children at their birthday party. I wrote a little show, and he built a doll's theatre. My daughters and their friends loved it. As a result, other parents asked me to come and do the show at their children's parties. That's how it all began.

Interviewer: Must be a lot of work for you.
Rachel: Yes, I love making the dolls, but I decided that I needed someone to help me with the shows. Luckily, my neighbour, Lena, was keen to perform with me. Her husband records the music to go with the shows. It would be impossible to do everything on my own.

Interviewer: Have you ever had any problems?
Rachel: Only once. I did a show for a group of three-year-olds, and I'd written a story about a lion. Unfortunately, the children were really afraid of the lion and started crying. I was worried the parents might complain, but luckily they were all able to laugh about it afterwards.

Interviewer: And what did you learn from that?
Rachel: The experience taught me that I had to find out beforehand just what children enjoy. Like me, Lena has two daughters, so whenever we've invented a new story, we show it to our four girls first. They always tell us exactly what they think of it. And sometimes I take new dolls to the local primary school to check that children like them.

Interviewer: And the shows continue to be successful?
Rachel: They do. I have a range of different shows for five to nine-year-olds. In fact, the shows have become so successful I could do one every day, but I don't want to do that. The reason the shows have become popular, I think, is because I love every minute of every show, and so other people love them too. I certainly didn't realise when I organised that birthday party for my daughters all those years ago that it would change my life so much.

Questions 13 to 16
Interviewer: And today in the studio, we have a familiar face on television, Angela Bond, the news reporter. Angela, your job has taken you all over the world, hasn't it?
Angela: Yes. I've reported from a number of countries in Asia, and I've just returned from the United States. I must say, it's good to be able to unpack my suitcase now that the job has brought me to Britain for at least six months.

Interviewer: Is the travelling what you enjoy about the job?
Angela: It's certainly interesting, but it can be annoying never knowing where I'm going to be next week. For me, the really exciting thing is being somewhere when a big news story is taking place and seeing it develop. Sometimes that can be quite dangerous, but all jobs have their disadvantages, and travelling gives me the chance to collect souvenirs.

Interviewer: What kind of things?
Angela: Mostly things for my flat. I'm mad about anything Chinese, and so when I was in Hong Kong, I got a really nice table and some chairs, and in Turkey, I spent a lot of money on carpets. Then I've got pictures and other bits of art from Thailand and India. The flat's getting a bit crowded.

Interviewer: It sounds colourful. Do you have a regular working day?
Angela: Not really. At the moment, I'm one of the team that reads the evening news, so sometimes I'm on at 6:30 and sometimes at 10 o'clock. But that's at the end of the day. It all starts in the morning at 8:30 when I phone the office to see what has happened and what they want me to go and report on.

Interviewer: So you don't have much time for a social life?
Angela: It's better now I'm in London and can see my boyfriend more often. My sister introduced us. He came round for dinner when I was staying with her a year ago. We have a lot in common. He's a lawyer and I studied law at university. Also, we've found that we lived in Hong Kong at the same time, although we never met.

Interviewer: What do you like to do in your free time?
Angela: Well, cooking is something new I'm trying, because I can't do it when I'm travelling, but I'm not very good at it yet, so I find it a bit stressful. One of the best things I've bought recently was a boat, and when I want to feel calm and peaceful, I go for a sail on the river. It never fails.

Interviewer: Angela, thanks.

Questions 17 to 20
Interviewer: Oh, what a wonderful view. I'm here with Jack Williams, who's telling me about his home town of Swanton.
Jack: Yes, the top of this hill is the best place to see the area. Swanton is on the coast, you can see the harbour from here, but in fact the town is built along the River Dean. This river comes from a lake in the mountains over there in the distance, then flows down to the flat land below us where the town is built.

Interviewer: What do you most like about living here?
Jack: About Swanton? Oh, it's an important industrial town, and a port, so there's lots of activity, and there's a forest behind the town with interesting wildlife. But the most exciting thing for me is the mountains. I go climbing whenever I get the chance.

Interviewer: What about entertainment?
Jack: There's plenty of entertainment. A big centre was built last year to encourage the arts, very modern. It's got a cinema, a theatre, and an art gallery. And there's football. The local team hasn't done so well lately. A few years ago, we nearly won the cup. And our area is famous for music, not in Swanton itself, but there's a well-known music festival in the next town.

Interviewer: But there are problems with the environment?
Jack: We're working on that. The river was a great place for fish, but the water got so polluted by the factories that most of the fish disappeared. Well, we've cleaned the river up now, and the fish are starting to come back. But I'm unhappy about Swanton Woods. The trees are quite healthy, but if you look, there are no birds there, and that's because pollution has reduced the number of insects.

Interviewer: Swanton's growing fast. Are you pleased about the way it's changed?
Jack: You've got to move with the times. It was completely different when I was a boy. In those days, everybody worked in the factories, and the families all knew each other. Maybe it was a little boring. Today, there are hundreds of different companies, and so many new houses that some people don't even know their neighbours. There are disadvantages, but it's impossible to be bored with all the things going on.

Interviewer: And what about Swanton's future?
Jack: Education is important to us. We have a fine university, which specialises in advanced technology, and a huge shopping centre, just built, which is bringing in double the number of visitors. Good news for us. And last year, we improved our airport, so more planes can come in.`,

            transcriptTranslations: [
                { label: "Bài giảng 1", text: "Cùng tham gia với chúng ta hôm nay để kể về chuyến đi xuyên Châu Phi của ông ấy là nhà sinh vật học Paul Hart. Chúng tôi bắt đầu ở Bờ Đông và đi bộ băng qua Châu Phi đến Gabon ở miền Tây, thu thập các loài thực vật và hoa dọc đường đi. Chuyến đi không hề dễ dàng, nhưng tuyến đường của tôi đi qua một khu vực rất phong phú về thực vật, và tôi đã chọn nó vì khu vực đó sẽ không giữ được tình trạng nguyên sơ lâu nữa khi có thêm nhiều con đường được xây dựng. Đó là cơ hội duy nhất của tôi để thu thập những thông tin quan trọng về đời sống tự nhiên của khu vực. Tôi có một nhóm gồm 11 nhà khoa học. Chúng tôi đi bộ từ 6 giờ sáng, nhưng khu rừng quá rậm rạp đến nỗi mất hàng giờ để mở đường đi xuyên qua nó, và có những ngày chúng tôi chỉ đi được 1 kilomet trước khi trời tối. May mắn thay, chúng tôi mang theo thiết bị chuyên dụng rất nhẹ, và mang càng ít thức ăn càng tốt. Nhưng chúng tôi luôn mệt mỏi khi dựng lều vào ban đêm. Đôi khi chúng tôi nhìn thấy voi hoặc sư tử. Xem chúng thật tuyệt vời và chúng không bao giờ tấn công chúng tôi. Mỗi ngày tôi đều thu thập cây cỏ và ghi chép thêm. Có quá nhiều thông tin mới để viết ra.\n\nTất nhiên, cũng có một số thời điểm tồi tệ, đặc biệt là khi tôi lo lắng cho cả đội. Trách nhiệm của tôi là đảm bảo mọi người về nhà an toàn. Gần cuối chuyến đi, một ngày nọ tôi đột nhiên phát hiện ra rằng thực phẩm gần như đã cạn sạch. Thật kỳ lạ vì chúng tôi đã mang đủ thức ăn khô cho chuyến đi, loại thức ăn không bao giờ bị hỏng, và chúng tôi cũng đã dừng lại ở các ngôi làng để lấy thêm thực phẩm tươi. Nhưng rồi tôi phát hiện ra rằng một vài người trong nhóm đã ăn nhiều hơn mức họ được phép. Tôi rất tức giận với họ vì đó là một hành động ngớ ngẩn. Sau đó chúng tôi tiếp tục đi bộ. Không có bản đồ cho khu vực đó, nhưng chúng tôi có một người dẫn đường địa phương. Rồi một người trong nhóm bị bệnh và chúng tôi không thể đi xa hơn nữa. Chúng tôi để anh ấy nghỉ ngơi, nhưng anh ấy ngày càng yếu đi. Rất may, mạng sống của anh ấy đã được cứu bởi một ngư dân đi dọc sông bằng thuyền và đưa anh ấy đến gặp bác sĩ ở ngôi làng gần nhất.\n\nCuối cùng, tôi cũng đã trở về nhà, và tôi lại được ở bên gia đình, bạn bè. Tôi thực sự nhớ họ trong thời gian đi vắng. Nhưng tôi đã học được rất nhiều điều từ chuyến đi, và tôi thực sự rất vui vì mình đã đi. Tôi được mời tham gia một chuyến đi khác, lần này là đến Úc, nhưng tôi nói rằng tôi không thể vì tôi đang bận rộn ở London. Và tôi nghĩ rằng mình đã đi lại đủ rồi." },
                { label: "Bài giảng 2", text: "Xin chào, tôi là Sarah Brown, và tôi ở đây để kể cho các bạn nghe về công việc của tôi với tư cách là một người dự báo thời tiết. Tôi đã làm dự báo thời tiết cho một công ty truyền hình được 7 năm, và 2 năm trước, tôi trở thành trưởng phòng thời tiết. Bây giờ tôi chia đều thời gian của mình giữa việc trình bày dự báo thời tiết trên truyền hình và quản lý bộ phận thời tiết, gồm 11 nhân viên. Ở tuổi 30, tôi là trưởng phòng thời tiết trẻ nhất từ trước đến nay, và là người phụ nữ đầu tiên đảm nhận công việc này. Vì dịch vụ thời tiết và tin tức của chúng tôi được phát sóng trên toàn thế giới, chúng tôi đều luân phiên làm việc vào ban đêm. Tôi thích làm đêm hơn là phải làm chương trình khi tôi phải dậy lúc 4 giờ sáng. Tôi thường làm việc 8 giờ một ngày, và trong thời gian đó, tôi thực hiện 10 hoặc 12 bản tin dự báo. Trước khi làm dự báo, tôi nghiên cứu dữ liệu trên máy tính. Đây là những thông tin tôi dùng trong bản tin của mình. Không có nhiều thời gian để học thuộc những gì tôi phải nói, nhưng may mắn thay, tôi chưa bao giờ quên lời, vì vậy tôi không bị căng thẳng.\n\nChồng tôi và tôi cố gắng có cùng những ngày nghỉ, nhưng không ai trong chúng tôi có một lịch trình làm việc cố định. Anh ấy là phi công lái các chuyến bay đường dài, vì vậy mặc dù anh ấy làm việc vất vả, anh ấy lại có nhiều thời gian ở nhà hơn tôi. Chúng tôi chuyển đến ngôi nhà hiện tại khoảng một năm trước, và anh ấy đang rất thích việc sơn sửa lại nó. Tôi đã bắt đầu chơi môn dù lượn (bay) như một sở thích từ 5 năm trước. Tôi hy vọng sẽ lấy được bằng phi công trong năm nay, nhưng vì công việc, tôi đã không đến trường dạy bay từ rất lâu rồi. Để tập thể dục, tôi bơi lội và trượt tuyết, và tôi thích chạy bộ. Tôi thực sự tự hào về bản thân vì đã tham gia chạy tại London Marathon. Đó là một cuộc đua dài 40 km, và tôi chưa từng nghĩ mình có thể hoàn thành nó. Chồng tôi chơi quần vợt, và chúng tôi thỉnh thoảng chơi cùng nhau, nhưng anh ấy giỏi hơn tôi, nên tôi không bao giờ thắng được.\n\nVì tôi làm việc trên Bản tin Thế giới, thỉnh thoảng mọi người nhận ra tôi ở những nơi rất xa xôi. Có lần, ở một ngôi làng Ấn Độ, một ông lão đã kéo tôi đi chụp ảnh cùng với cả gia đình ông. Tôi nhận được những bức thư rất dễ thương. Một người viết thư kể rằng nụ cười của tôi khiến cô ấy cảm thấy vui vẻ cả ngày. Thỉnh thoảng, mọi người thậm chí còn viết thư và ngỏ lời cầu hôn tôi nữa." },
                { label: "Bài giảng 3", text: "Cảm ơn tất cả các bạn đã đến buổi nói chuyện của tôi tối nay. Thật tuyệt khi thấy nhiều người dưới khán đài như vậy. Dành cho những ai chưa biết nhiều về PS Camping, hãy để tôi bắt đầu bằng cách cung cấp một số thông tin nền tảng về công ty. Công ty được thành lập cách đây 25 năm. Ban đầu nó thực chất là một chuỗi cửa hàng bán lẻ dụng cụ cắm trại, và sau đó 20 năm trước, nó đã mua lại một số lượng nhỏ các khu cắm trại ở Anh và bắt đầu cung cấp dịch vụ kỳ nghỉ cắm trại. Công ty phát triển nhanh chóng và đã cung cấp các kỳ nghỉ ở lục địa Châu Âu trong 15 năm qua. Nếu bạn đặt một kỳ nghỉ cắm trại với chúng tôi, bạn sẽ có hơn 300 địa điểm để lựa chọn. Ở Ý, chúng tôi hiện có khoảng 64 khu cắm trại mà chúng tôi sở hữu hoặc có quyền sử dụng độc quyền. Pháp là nơi chúng tôi có phần lớn các địa điểm cắm trại, và chúng tôi hiện đang có dự án mở rộng sang Thụy Sĩ. Chúng tôi cũng có một số địa điểm ở miền Bắc Tây Ban Nha, đặc biệt là khu vực đồi núi Picos de Europa. Chúng tôi đã nâng cấp tất cả các khu cắm trại ở Tây Ban Nha này và cải thiện chúng đáng kể so với xếp hạng ba sao ban đầu của chúng.\n\nChúng tôi tin rằng các kỳ nghỉ của chúng tôi cung cấp những tiện ích tuyệt vời cho cả gia đình. Các bậc phụ huynh muốn con cái mình bận rộn cả ngày hoặc một phần trong ngày có thể tận dụng các hoạt động dành cho trẻ em của chúng tôi. Những hoạt động này được tổ chức bởi đội ngũ nhân viên nhiệt tình và có chuyên môn cao của chúng tôi. Mỗi ngày khởi động bằng một trận đấu thể thao, có thể là bóng đá hoặc bóng chuyền, tiếp theo là một giờ diễn kịch cho tất cả mọi người. Hoạt động này có thể bao gồm ca hát hoặc khiêu vũ, diễn kịch câm, hoặc các hoạt động khác. Vào buổi chiều, mỗi ngày trong tuần sẽ có một hoạt động nghệ thuật khác nhau, bao gồm cuộc thi làm áp phích hoặc lắp ráp mô hình. Hơn thế nữa, các khu cắm trại của chúng tôi thực sự thân thiện với trẻ em, và vì vậy, chúng tôi áp dụng quy định không làm ồn vào buổi tối. Các hoạt động buổi tối của trẻ em thường kết thúc lúc 9:30 hoặc đôi khi là 10:00, và từ 10:30 trở đi, người đi nghỉ được yêu cầu phải giữ yên lặng ở những khu vực có dựng lều.\n\nChúng tôi không muốn có bất cứ sự cố nào xảy ra trong kỳ nghỉ của PS Camping, nhưng nếu có, chúng tôi cũng muốn tất cả khách hàng của mình được bảo hiểm. Nếu bạn chưa có sẵn gói bảo hiểm hàng năm của riêng mình, bạn sẽ cần mua gói bảo hiểm chi phí thấp mà chúng tôi cung cấp, và chúng tôi yêu cầu bạn phải sắp xếp việc này vào lúc đặt trước kỳ nghỉ. Có rất nhiều lợi ích khi chọn PS Camping và giới thiệu cho người khác. Là một khách hàng thường xuyên, bạn sẽ được thông báo về các ưu đãi đặc biệt, và bạn bè của bạn có thể được giảm giá 10% cho kỳ nghỉ của họ, hoặc được đặt lều sang trọng với mức giá của lều tiêu chuẩn. Đổi lại, chúng tôi sẽ gửi cho bạn một món quà cảm ơn, món quà mà bạn có thể chọn từ danh sách các mặt hàng chất lượng cao." }

            transcript: `Questions 21 to 25: Paul Hart's Trip Across Africa
Now turn to part 3. Questions 21 to 25. First, you have some time to look at questions 21 to 25.

With us today to tell us about his trip across Africa is the biologist Paul Hart. We started on the East Coast and travelled on foot across Africa to Gabon in the West, collecting plants and flowers along the way. It wasn't easy, but my route crossed a region rich in plants, and I chose it because it won't stay that way for long when more roads are built. It was my only chance to get important information about the natural life of the area. I had a team of 11 scientists. We walked from 6:00 in the morning, but the forest was so thick it took hours to cut our way through it, and some days we only walked 1 kilometre before dark. Fortunately, we carried special equipment that was very light, and we took as little food as possible. But we were always tired when we put the tents up at night. Sometimes we saw elephants or lions. They were amazing to watch, and never attacked us. Every day I collected plants and added to my notes. There was so much new information to write down.

There were, of course, some low points, especially when I got anxious about the team. It was my job to make sure everyone got home safely. Towards the end of the trip, I suddenly discovered one day that the food had nearly all gone. It was strange because we'd brought enough dried food with us to last the trip, food that wouldn't ever go bad, and we'd stopped at villages for fresh food too. But then I found that some of the team had eaten much more than they were supposed to. I was angry with them because it was a silly thing to do. Then we started walking again. There were no maps for the area, but we had a local guide. Then one of the team got sick and we couldn't go any further. We let him rest, but he got much worse. Thankfully, his life was saved by a fisherman who came along the river in a boat and took him to a doctor in the nearest village.

Finally, I returned home, and I'm back with my family and friends. I really missed them while I was away. But I learnt so much on the trip, and I'm really glad I went. I was asked to go on another trip, this time to Australia, but I said that I couldn't because I'm busy here in London. And I think I've done enough travelling.

Questions 26 to 30: Sarah Brown, Weather Forecaster
Questions 26 to 30. First, you have some time to look at questions 26 to 30.

Hello, I'm Sarah Brown, and I'm here to tell you about my job as a weather forecaster. I've been a weather forecaster for a television company for 7 years, and 2 years ago, I became the head of the weather department. Now I divide my time equally between presenting weather forecasting on television and managing the weather department, which has a staff of 11. At 30 years old, I'm the youngest ever head of weather, and the first woman to do the job. Since our news and weather service goes out all round the world, we all take turns to work at night. I prefer that to doing the show when I have to get up at 4:00 in the morning. I normally work an 8-hour day, and in that time, I do 10 or 12 forecasts. Before doing a weather forecast, I study data on the computer. This is the information I use in my forecasts. There isn't much time to learn what I have to say, but fortunately, I've never forgotten my words, so I don't get nervous.

My husband and I try to have the same free days, but neither of us has a regular pattern of work. He's a pilot on long-distance flights, so although he works hard, he has a lot more time at home than I do. We moved to our present house about a year ago, and he's enjoying painting it. I took up flying as a hobby 5 years ago. I hope to get my pilot's license this year, but because of the job, I haven't been to the flying school for ages. For exercise, I swim and ski, and I like running. I'm really proud of myself for running in the London Marathon. It's a 40-kilometre race, and I never thought I could manage it. My husband plays tennis, and we sometimes play together, but he's better than me, so I never win.

Because I'm on World News, people sometimes recognise me in really distant places. Once, in an Indian village, an old man took me to have my photo taken with all his family. I get some lovely letters. One person wrote to say that my smile made her feel happy all day. People occasionally even write and ask me to marry them.

Questions 31 to 35: PS Camping
Questions 31 to 35. First, you have some time to look at questions 31 to 35.

Thank you all for coming to my talk this evening. It's nice to see so many people in the audience. For those of you who don't know very much about PS Camping, let me start by giving you some background information about the company. The company started 25 years ago. It actually opened as a retail chain selling camping equipment, and then 20 years ago, it bought a small number of campsites in the UK and began offering camping holidays. The company grew rapidly and has been providing holidays in Continental Europe for the last 15 years. If you book a camping holiday with us, you'll have a choice of over 300 sites. In Italy, we now have some 64 sites that we either own or have exclusive use of. France is where we have the majority of sites, and we currently have a project to expand into Switzerland. We also have a number of sites in Northern Spain, particularly in the mountainous region of Picos de Europa. We've upgraded all these Spanish sites and improved them considerably from their original three-star rating.

We believe our holidays offer superb facilities for the whole family. Parents who want their children to be fully occupied for all or part of the day can take advantage of our children's activities. These are organized by our well-qualified and enthusiastic staff. Each day kicks off with a sports match, perhaps football or volleyball, followed by an hour of drama for everyone. This may include singing or dancing, mime, or other activities. In the afternoon, there's a different art activity for each day of the week, including a poster competition or model making. What's more, our sites are truly child-friendly, and with this in mind, we operate a no-noise rule in the evenings. Children's evening activities usually finish at 9:30 or occasionally 10:00, and from 10:30, holidaymakers are expected to be quiet in the areas where there are tents.

We want nothing to go wrong on a PS Camping holiday, but if it does, we also want all our customers to be insured. If you haven't organized an annual insurance policy of your own, you'll need to take out the low-cost cover we offer, and we require that you arrange this when you make your holiday reservation. There are many advantages to choosing PS Camping and to recommending it to others. As a regular customer, you'll be kept informed of special offers, and your friends can benefit from 10% off their holiday, or book a luxury tent for the price of a standard one. In return, we'll send you a thank you present, which you can choose from a list of high-quality items.`,

        // --- HÀM TRỘN MẢNG ---
        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- AUDIO COMPONENT ---
        const AudioPlayer = ({ src, audioId, isReviewMode = false, timestamps = [] }) => {
            const audioRef = useRef(null);
            const progressBarRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [hasEnded, setHasEnded] = useState(false);
            const [hasError, setHasError] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            
            // Lắng nghe sự kiện để tắt các audio khác khi có 1 audio bắt đầu phát
            useEffect(() => {
                const handleStopOtherAudios = (e) => {
                    if (e.detail !== audioId && audioRef.current) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    }
                };
                window.addEventListener('stopAllAudios', handleStopOtherAudios);
                return () => window.removeEventListener('stopAllAudios', handleStopOtherAudios);
            }, [audioId]);

            const playAudio = () => {
                // Bắn tín hiệu yêu cầu các AudioPlayer khác dừng lại
                window.dispatchEvent(new CustomEvent('stopAllAudios', { detail: audioId }));
                const playPromise = audioRef.current.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setIsPlaying(true);
                        setHasEnded(false);
                        setHasError(false);
                    }).catch(error => {
                        console.error("Lỗi phát âm thanh:", error);
                        setHasError(true);
                        setIsPlaying(false);
                    });
                }
            };

            const togglePlay = () => {
                if (hasEnded && !isReviewMode) return;
                
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    if (isReviewMode && hasEnded) {
                        audioRef.current.currentTime = 0;
                    }
                    playAudio();
                }
            };

            const handleTimeUpdate = () => {
                const current = audioRef.current.currentTime;
                const duration = audioRef.current.duration;
                setCurrentTime(current);
                if (duration) {
                    setProgress((current / duration) * 100);
                }
            };

            const handleEnded = () => {
                setIsPlaying(false);
                setHasEnded(true);
            };

            const handleError = (e) => {
                console.error("Không thể tải nguồn âm thanh.", e);
                setHasError(true);
            };

            // Tính năng tua trên thanh Progress
            const handleProgressClick = (e) => {
                if (!isReviewMode) return; // Chỉ cho tua khi ở chế độ Review
                if (hasError || !audioRef.current?.duration) return;
                
                const rect = progressBarRef.current.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const newPercentage = clickX / width;
                const newTime = newPercentage * audioRef.current.duration;
                
                audioRef.current.currentTime = newTime;
                setProgress(newPercentage * 100);
                
                // Tự động phát tiếp nếu đang pause và tua xong
                if (!isPlaying) playAudio();
            };

            // Tính toán Timestamp nào đang active (Đang nghe tới đâu sáng tới đó)
            let activeTimestampIndex = -1;
            if (timestamps && timestamps.length > 0) {
                for (let i = timestamps.length - 1; i >= 0; i--) {
                    if (currentTime >= timestamps[i].time - 0.5) {
                        activeTimestampIndex = i;
                        break;
                    }
                }
            }

            return (
                <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg flex flex-col shadow-sm w-full">
                    <div className="flex items-center w-full">
                        <audio ref={audioRef} src={src} onTimeUpdate={handleTimeUpdate} onEnded={handleEnded} onError={handleError} className="hidden" />
                        <button onClick={togglePlay} disabled={hasEnded && !isReviewMode} className={`mr-4 focus:outline-none transition-colors ${(hasEnded && !isReviewMode) ? 'text-gray-400 cursor-not-allowed' : hasError ? 'text-red-500' : 'text-blue-600 hover:text-blue-800'}`}>
                            {isPlaying ? <PauseCircle size={40} /> : hasError ? <AlertCircle size={40} /> : <PlayCircle size={40} />}
                        </button>
                        <div className="flex-1">
                            <div 
                                ref={progressBarRef}
                                onClick={handleProgressClick}
                                className={`h-3 bg-gray-200 rounded-full overflow-hidden ${isReviewMode ? 'cursor-pointer hover:h-4 transition-all' : ''}`}
                                title={isReviewMode ? "Bấm vào thanh này để tua nhanh/chậm" : ""}
                            >
                                <div className={`h-full transition-all duration-100 ${(hasEnded && !isReviewMode) ? 'bg-gray-400' : hasError ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${progress}%` }}></div>
                            </div>
                            <div className="flex justify-between mt-2 text-xs text-gray-500">
                                <span className={hasError ? "text-red-500 font-bold" : ""}>
                                    {hasError ? "Lỗi Audio." : (hasEnded && !isReviewMode) ? "Đã khóa (Chỉ nghe 1 lần)" : (hasEnded && isReviewMode) ? "Bấm Play để nghe lại" : isReviewMode ? "Bấm thanh màu xám để tua" : "Bấm Play để nghe"}
                                </span>
                            </div>
                        </div>
                    </div>
                    {/* KHU VỰC TIMESTAMPS GỌN GÀNG NHƯ YOUTUBE CHAPTERS */}
                    {isReviewMode && timestamps && timestamps.length > 0 && (
                        <div className="mt-3 pt-3 border-t border-blue-200">
                            <p className="text-xs font-bold text-blue-800 mb-2">TIMESTAMPS CHỮA BÀI (Bấm để tua đến vị trí bài nghe):</p>
                            <div className="flex flex-wrap gap-2">
                                {timestamps.map((ts, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => {
                                            if (hasError || !audioRef.current) return;
                                            audioRef.current.currentTime = ts.time;
                                            if (!isPlaying) playAudio();
                                        }}
                                        className={`px-2 py-1 text-xs font-bold rounded shadow-sm transition-colors ${activeTimestampIndex === idx ? 'bg-blue-600 text-white' : 'bg-white text-blue-600 border border-blue-300 hover:bg-blue-100'}`}
                                    >
                                        {ts.label} ({formatTimeStr(ts.time)})
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

                                        return (

                                                <div className="flex items-start justify-between mb-4">
                                                    <div className="flex items-start">
                                                        <span className={`px-2 py-1 rounded text-white font-bold text-xs md:text-sm mr-3 shrink-0 ${isCorrect ? 'bg-green-500' : isUnanswered ? 'bg-yellow-500' : 'bg-red-500'}`}>Câu {q.id}</span>
                                                        <p className="font-bold text-gray-900 text-sm md:text-base">{q.text}</p>
                                                    </div>
                                                    {isCorrect ? <CheckCircle className="text-green-500 shrink-0 ml-2" size={24}/> : <XCircle className="text-red-500 shrink-0 ml-2" size={24}/>}
                                                </div>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4 md:ml-12">
                                                    {Object.entries(q.options).map(([key, value]) => {
                                                    const isSelected = userAns === key;
                                                    const isActualCorrect = key === q.correct;
                                                    
                                                    let btnClass = "text-left px-3 py-2 rounded-md border flex items-center ";
                                                    if (isActualCorrect) btnClass += "border-green-500 bg-green-100 text-green-800 font-bold shadow-sm";
                                                    else if (isSelected && !isActualCorrect) btnClass += "border-red-500 bg-red-100 text-red-800";
                                                    else btnClass += "border-gray-200 bg-white opacity-60";

                                                    return (
                                                        <div key={key} className={btnClass}>
                                                            <span className="font-bold mr-2">{key}.</span> <span>{value}</span>
                                                            {isActualCorrect && <CheckCircle size={18} className="ml-auto text-green-600" />}
                                                            {isSelected && !isActualCorrect && <XCircle size={18} className="ml-auto text-red-600" />}
                                                        </div>
                                                    );
                                                    })}
                                                </div>

                                                <div className="md:ml-12 bg-white p-4 rounded-lg border shadow-sm mt-4">
                                                    <h4 className="font-bold mb-2 text-blue-800 border-b pb-2 flex items-center"><BookOpen size={18} className="mr-2"/> Giải thích chi tiết</h4>
                                                    
                                                    <div className="mb-4 text-sm text-gray-700">
                                                        <p className="mb-1 font-semibold italic text-gray-800">Dịch câu hỏi: {q.translation.question}</p>
                                                        <ul className="mb-3 pl-4 list-disc text-gray-700 mt-2">
                                                            {Object.entries(q.translation.options).map(([k, v]) => (<li key={k}><strong>{k}.</strong> {v}</li>))}
                                                        </ul>
                                                    </div>

                                                    {/* Phần giải thích logic sai/đúng */}
                                                    <div className="space-y-3 text-sm">
                                                        {isUnanswered && (
                                                            <div className="p-3 bg-yellow-50 border border-yellow-200 rounded text-yellow-800">
                                                                <strong>Bạn đã bỏ trống câu này!</strong> Hãy luôn thử dự đoán đáp án dù không nghe rõ nhé.
                                                            </div>
                                                        )}
                                                        
                                                        {userAns && !isCorrect && (
                                                            <div className="p-3 bg-red-50 border border-red-200 rounded text-red-800">
                                                                <span className="font-bold uppercase mb-1 block">Tại sao bạn sai?</span>
                                                                <strong>Bạn chọn {userAns}:</strong> {q.explanations[userAns]}
                                                            </div>
                                                        )}
                                                        
                                                        <div className="p-3 bg-green-50 border border-green-200 rounded text-green-800">
                                                            <span className="font-bold uppercase mb-1 block">Phân tích đáp án đúng</span>
                                                            <strong>Đáp án {q.correct}:</strong> {q.explanations[q.correct]}
                                                        </div>
                                                    </div>

                                                    {/* Trích đoạn Transcript Bôi đỏ */}
                                                    <div className="mt-4 pt-4 border-t border-dashed">
                                                        <div className="flex items-center justify-between mb-2">
                                                            <h5 className="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center"><FileText size={14} className="mr-1"/> Đoạn Audio xuất hiện đáp án:</h5>
                                                        </div>
                                                        <p className="bg-gray-50 p-3 rounded text-gray-800 italic leading-relaxed" dangerouslySetInnerHTML={{ __html: q.transcriptSnippet }}></p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                        })}
                                    </div>

                                    {/* NÚT ẨN/HIỆN TRANSCRIPT ĐẦY ĐỦ */}
                                    <div className="mt-8 border-t-2 border-dashed pt-6 mb-4 px-4 md:px-8">
                                        <button onClick={() => toggleTranscript(part.id)} className="flex items-center justify-center w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-lg transition-colors">
                                            <FileText className="mr-2" size={20} />
                                            {showTranscript[part.id] ? "Ẩn Transcript (Nội dung bài nghe đầy đủ)" : "Hiện Transcript (Nội dung bài nghe đầy đủ)"}
                                        </button>

                                        {/* PHẦN DỊCH TIẾNG VIỆT */}
                                        {showTranscript[part.id] && part.transcriptTranslations && (
                                            <div className="mt-4 p-4 bg-white border border-blue-200 rounded-lg shadow-sm">
                                                <p className="text-sm font-bold text-blue-800 mb-3 uppercase flex items-center">
                                                    <BookOpen size={16} className="mr-2" />
                                                    Xem bản dịch tiếng Việt
                                                </p>
                                                <div className="flex flex-wrap gap-2 mb-4">
                                                    {part.transcriptTranslations.map((trans, idx) => (
                                                        <button 
                                                            key={idx}
                                                            onClick={() => toggleTranslation(part.id, trans.label)}
                                                            className={`px-3 py-1.5 text-sm font-bold rounded shadow-sm transition-colors ${activeTranslation[part.id] === trans.label ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100'}`}
                                                        >
                                                            Dịch {trans.label}
                                                        </button>
                                                    ))}
                                                </div>
                                                
                                                {/* Khu vực hiển thị nội dung dịch */}
                                                {activeTranslation[part.id] && (
                                                    <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg text-gray-800 text-sm md:text-base leading-relaxed whitespace-pre-line animate-fade-in border-l-4 border-l-blue-500">
                                                        <h5 className="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-2">
                                                            {activeTranslation[part.id]} (Tiếng Việt):
                                                        </h5>
                                                        {part.transcriptTranslations.find(t => t.label === activeTranslation[part.id])?.text}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {showTranscript[part.id] && (
                                            <div className="mt-4 p-5 bg-yellow-50 border border-yellow-200 rounded-lg text-gray-800 text-sm md:text-base leading-relaxed whitespace-pre-line">
                                                {part.transcript}

                    </div>
                </div>
            );
        }

        // --- STAGE 3: MINIGAME TỪ VỰNG ---
        function Stage3VocabGame({ onBackToResult }) {
            const [gamePhase, setGamePhase] = useState('learn'); // 'learn', 'play', 'finish'
            const [playList, setPlayList] = useState(VOCAB_DATA); // List từ đang chơi
            const [currentIndex, setCurrentIndex] = useState(0);
            const [options, setOptions] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [score, setScore] = useState(0);
            const [playingWord, setPlayingWord] = useState(null);
            
            // Array lưu các từ làm sai
            const [wrongVocabs, setWrongVocabs] = useState([]);

            const loadQuestion = () => {
                if (currentIndex >= playList.length) {
                    setGamePhase('finish');
                    return;
                }
                const currentVocab = playList[currentIndex];
                
                // Lấy 3 nghĩa sai ngẫu nhiên từ TỔNG DATA gốc để lúc nào cũng có đủ 3 options gây nhiễu
                const incorrectOptions = VOCAB_DATA
                    .filter(v => v.word !== currentVocab.word)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3)
                    .map(v => v.meaning);
                
                const allOptions = shuffleArray([currentVocab.meaning, ...incorrectOptions]);
                setOptions(allOptions);
                setSelectedOption(null);
                
                // Trì hoãn một chút để UI render xong rồi mới phát âm thanh
                setTimeout(() => playWordAudio(currentVocab.word), 500);
            };

            useEffect(() => {
                if (gamePhase === 'play') {
                    loadQuestion();
                }
            }, [currentIndex, gamePhase, playList]);

            const playWordAudio = (word) => {
                setPlayingWord(word);
                const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`;
                const audio = new Audio(audioUrl);
                
                audio.play().catch(err => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(word);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        utterance.onend = () => setPlayingWord(null);
                        window.speechSynthesis.speak(utterance);
                    } else {
                        setPlayingWord(null);
                    }
                });
                audio.onended = () => setPlayingWord(null);
            };

            const handleSelect = (opt) => {
                if (selectedOption !== null) return; 
                setSelectedOption(opt);
                
                const currentVocab = playList[currentIndex];
                if (opt === currentVocab.meaning) {
                    setScore(prev => prev + 1);
                } else {
                    // Nếu chọn sai, thêm từ đó vào danh sách wrongVocabs (không add trùng)
                    if (!wrongVocabs.find(w => w.word === currentVocab.word)) {
                        setWrongVocabs(prev => [...prev, currentVocab]);
                    }
                }
            };

            const handleNext = () => {
                if (currentIndex + 1 >= playList.length) {
                    setGamePhase('finish');
                } else {
                    setCurrentIndex(prev => prev + 1);
                }
            };

            // Chơi lại toàn bộ 10 từ
            const handleRestartAll = () => {
                setPlayList(VOCAB_DATA);
                setWrongVocabs([]); // reset sai
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play'); 
            };

            // Chỉ chơi lại những câu đã sai
            const handleReplayWrong = () => {
                setPlayList(wrongVocabs);
                setWrongVocabs([]); // reset để bắt lỗi lại cho lượt đánh này
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play');
            };

            if (gamePhase === 'learn') {
                return (
                    <div className="max-w-4xl mx-auto mt-8 px-4 pb-12">
                        <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                            <div className="bg-blue-600 p-6 text-white text-center">
                                <h2 className="text-2xl font-bold flex items-center justify-center">
                                    <BookOpen className="mr-2" />
                                    DANH SÁCH TỪ VỰNG QUAN TRỌNG
                                </h2>
                                <p className="mt-2 opacity-90">Hãy nghe và ghi nhớ các từ vựng này trước khi bước vào thử thách nhé!</p>
                            </div>
                            <div className="p-6 md:p-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {VOCAB_DATA.map((item, idx) => (
                                        <div key={idx} className={`flex items-center p-4 rounded-xl border transition-colors ${playingWord === item.word ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:bg-blue-50'}`}>
                                            <button 
                                                onClick={() => playWordAudio(item.word)}
                                                className={`flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4 transition-all ${playingWord === item.word ? 'bg-blue-500 text-white shadow-md scale-110' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'}`}
                                            >
                                                <Volume2 size={24} />
                                            </button>
                                            <div>
                                                <p className="font-bold text-lg text-gray-800">{item.word}</p>
                                                <p className="text-gray-600 text-sm">{item.meaning}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 text-center">
                                    <button 
                                        onClick={() => {
                                            setPlayList(VOCAB_DATA);
                                            setCurrentIndex(0);
                                            setScore(0);
                                            setWrongVocabs([]);
                                            setGamePhase('play');
                                        }}
                                        className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:scale-105 inline-flex items-center text-lg"
                                    >
                                        <Gamepad2 className="mr-2" size={28} /> Đã Nhớ! Bắt Đầu Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gamePhase === 'finish') {
                return (
                    <div className="min-h-[70vh] flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-purple-500">
                            <Award size={64} className="text-yellow-400 mx-auto mb-4" />
                            <h2 className="text-3xl font-black text-gray-800 mb-2">Hoàn Thành!</h2>
                            <p className="text-gray-600 mb-6">Bạn đã đối mặt với {playList.length} thử thách từ vựng.</p>
                            
                            <div className="text-5xl font-black text-purple-600 mb-8">
                                {score} <span className="text-2xl text-gray-400">/ {playList.length}</span>
                            </div>

                            <div className="space-y-3">
                                {wrongVocabs.length > 0 && (
                                    <button 
                                        onClick={handleReplayWrong}
                                        className="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition flex items-center justify-center animate-pulse shadow-md"
                                    >
                                        <RefreshCw size={20} className="mr-2" /> Chơi Lại {wrongVocabs.length} Câu Sai
                                    </button>
                                )}
                                <button 
                                    onClick={handleRestartAll}
                                    className="w-full py-3 bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <RefreshCw size={20} className="mr-2" /> Chơi Lại Toàn Bộ Từ Đầu
                                </button>
                                <button 
                                    onClick={() => setGamePhase('learn')}
                                    className="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <BookOpen size={20} className="mr-2" /> Xem Lại Từ Vựng
                                </button>
                                <button 
                                    onClick={onBackToResult}
                                    className="w-full py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <FileText size={20} className="mr-2" /> Trở Về Bài Test
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentVocab = playList[currentIndex];
            if (!currentVocab) return null; // Safety check

            return (
                <div className="max-w-3xl mx-auto mt-8 px-4 pb-12">
                    <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                        {/* Header của Minigame */}
                        <div className="bg-purple-600 p-4 text-white flex justify-between items-center">
                            <div className="font-bold flex items-center">
                                <Gamepad2 className="mr-2" />
                                {playList.length < 10 ? 'LUYỆN TẬP CÂU SAI' : 'THỬ THÁCH NGHE TỪ VỰNG'}
                            </div>
                            <div className="bg-purple-800 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                                Câu {currentIndex + 1} / {playList.length}
                            </div>
                        </div>

                        <div className="p-6 md:p-10 text-center">
                            <p className="text-gray-600 mb-6 font-medium">Lắng nghe kỹ và chọn nghĩa tiếng Việt chính xác nhất cho cụm từ bạn vừa nghe thấy:</p>
                            
                            {/* Nút phát loa */}
                            <button 
                                onClick={() => playWordAudio(currentVocab.word)}
                                className={`mx-auto w-24 h-24 rounded-full flex items-center justify-center transition-all shadow-lg mb-8 ${playingWord === currentVocab.word ? 'bg-purple-200 text-purple-600 scale-95 ring-4 ring-purple-300' : 'bg-purple-100 text-purple-500 hover:bg-purple-200 hover:scale-105'}`}
                            >
                                <Volume2 size={48} />
                            </button>

                            {/* Khu vực hiển thị từ tiếng Anh (chỉ hiện sau khi đã chọn đáp án) */}
                            <div className="h-12 mb-6">
                                {selectedOption !== null && (
                                    <div className="animate-fade-in inline-block bg-yellow-100 border border-yellow-300 text-yellow-800 px-6 py-2 rounded-xl text-xl font-bold tracking-wide shadow-sm">
                                        {currentVocab.word}
                                    </div>
                                )}
                            </div>

                            {/* Các lựa chọn đáp án */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {options.map((opt, idx) => {
                                    let btnClass = "p-4 rounded-xl border-2 font-bold text-left transition-all ";
                                    
                                    if (selectedOption === null) {
                                        btnClass += "border-gray-200 text-gray-700 hover:border-purple-300 hover:bg-purple-50";
                                    } else {
                                        if (opt === currentVocab.meaning) {
                                            btnClass += "border-green-500 bg-green-100 text-green-800"; // Đáp án đúng luôn hiện xanh
                                        } else if (opt === selectedOption && selectedOption !== currentVocab.meaning) {
                                            btnClass += "border-red-500 bg-red-100 text-red-800"; // Bấm sai thì hiện đỏ
                                        } else {
                                            btnClass += "border-gray-100 text-gray-400 opacity-50"; // Các ô khác mờ đi
                                        }
                                    }

                                    return (
                                        <button 
                                            key={idx}
                                            onClick={() => handleSelect(opt)}
                                            className={btnClass}
                                            disabled={selectedOption !== null}
                                        >
                                            {opt}
                                            {selectedOption !== null && opt === currentVocab.meaning && <CheckCircle className="inline float-right text-green-600" size={20} />}
                                            {selectedOption !== null && opt === selectedOption && selectedOption !== currentVocab.meaning && <XCircle className="inline float-right text-red-600" size={20} />}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Nút Next */}
                            <div className="mt-8 h-12">
                                {selectedOption !== null && (
                                    <button 
                                        onClick={handleNext}
                                        className="bg-gray-800 hover:bg-black text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 animate-fade-in"
                                    >
                                        Câu Tiếp Theo &rarr;
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [stage, setStage] = useState(1); // 1: Test, 2: Result, 3: Vocab Game
            const [answers, setAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.duration);

            useEffect(() => {
                if (isSubmitted) return;
                if (timeLeft <= 0) {
                    setIsSubmitted(true);
                    setStage(2);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, isSubmitted]);

            const handleSubmit = () => {
                setIsSubmitted(true);
                setStage(2);
                window.scrollTo(0, 0);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
                    {/* Header cố định */}
                    <header className="bg-white shadow-md sticky top-0 z-50 overflow-x-auto">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-row justify-between items-center gap-4 min-w-[700px]">
                            {/* Tiêu đề bên trái */}
                            <div className="font-black text-xl md:text-2xl text-blue-800 uppercase tracking-wide whitespace-nowrap flex-1 text-left">
                                VSTEP LISTENING TEST 05
                            </div>
                            
                            {/* Đồng hồ ở giữa */}
                            <div className="flex-1 flex justify-center">
                                <div className={`flex items-center space-x-2 font-mono text-xl px-4 py-1.5 rounded-md font-bold whitespace-nowrap ${timeLeft < 300 && !isSubmitted ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>
                                    <Clock size={20} />
                                    <span>{formatTime(timeLeft)}</span>
                                </div>
                            </div>

                            {/* Navigation Tabs ở rìa phải */}
                            <div className="flex-1 flex justify-end">
                                <div className="flex bg-gray-100 p-1 rounded-lg whitespace-nowrap">
                                    <button 
                                        onClick={() => setStage(1)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 1 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'}`}
                                    >
                                        Làm Bài
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(2)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 2 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        Kết Quả
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(3)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center ${stage === 3 ? 'bg-purple-500 text-white shadow-sm' : 'text-purple-600 hover:bg-purple-100'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        <Gamepad2 size={16} className="mr-1" /> Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="h-auto min-h-[calc(100vh-64px)] pb-10">
                        {stage === 1 && <Stage1Test answers={answers} setAnswers={setAnswers} onSubmit={handleSubmit} />}
                        {stage === 2 && <Stage2Result answers={answers} onGoToGame={() => setStage(3)} />}
                        {stage === 3 && <Stage3VocabGame onBackToResult={() => setStage(2)} />}
                    </main>

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .animate-fade-in {
                            animation: fadeIn 0.3s ease-out forwards;
                        }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
