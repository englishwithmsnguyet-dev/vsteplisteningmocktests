Woman: In today's program, David Green has come along to tell us all about Waterside Shopping Centre near Northport. Good morning, David.

David: Good morning. Well, I visited Waterside last week and I think it has something for everyone, and I would recommend it for a day out. It's taken three years to build, and finally opened three weeks ago, two months later than planned. Firstly, getting there. There are organized coach trips from most towns in the area, but they leave early and come home very late. So, I drove. There are 12,000 free parking spaces, so parking is no problem. You can also get there by train, but the station is 15 minutes from Waterside by bus, and the buses are really crowded, so you sometimes have a long wait.

Woman: And what about opening times?

David: Well, one thing to remember is that the shops don't open till 10:00 in the morning, except on Saturday when they open at 9:00. So, don't get there too early on a weekday. They close at 8:00 everyday, except Friday when they're open until 9:00 pm.

Woman: Can you tell us some more about the facilities at the shopping centre?

David: Yes, it's arranged on three levels. You'll find all your favorites here. In fact, if you want to buy a pair of shoes, there are 15 different shops to choose from on levels one and two. When you run out of money, there are seven different banks. But collect your money before you get to the third level, as there aren't any banks up there. On that level, however, there are several restaurants, as well as a cinema with seven screens. And uh, don't get lost like I did. Go to the information desk on the first level and get a map.

Woman: What else can you do at Waterside?

David: Before you go back to your car or the bus, and in fact, it might be better to do this before you go shopping and have too much to carry, go and see the lake. Take a walk or have a go at fishing, sailing or windsurfing if you have time. Or you can rest your tired feet and watch the birds and ducks. But you are asked not to feed them.

Woman: Was there anything you didn't like about the shopping centre?

David: Oh. Well, although I had a good day, I would complain about one thing. But not the usual thing. The service in the shops was good, and I had an excellent lunch in a cafe. No, the silly thing was that everywhere was quite clean, but people were dropping their sweet papers and empty drink cans on the ground, because there wasn't anywhere else to throw them. Apart from that, I would recommend it.

 Scotland. Tôi thích đi dạo trên các dãy núi của Scotland, và có rất nhiều loài chim khác nhau để ngắm nhìn, đặc biệt là vào mùa xuân.\nVâng, tôi sẽ kết thúc bây giờ bằng cách cho các bạn xem một đoạn video về những nơi tôi đã đến thăm. Sau đó sẽ có cơ hội để thư giãn với một tách cà phê, và rồi sẽ có thời gian cho một vài câu hỏi. Ồ, và tôi có một số thông tin về buổi triển lãm nghệ thuật tiếp theo của tôi dành cho các bạn. Nó sẽ diễn ra tại Queen's Gallery. Bây giờ, nếu có ai đó vui lòng tắt đèn giúp, thì tôi có thể..." },
                { label: "Bài giảng 2", text: "Chào mừng bạn đến với chương trình sách của tuần này. Chúng tôi có rất nhiều cuốn sách mới tuyệt vời để kể cho bạn nghe.\nCuốn 'My Life' (Cuộc đời tôi) của Joe Wrigley sẽ khiến tất cả những người hâm mộ truyện của Joe hài lòng trong nhiều giờ. Nó giải thích rất nhiều về nguồn gốc những ý tưởng của ông, và mang lại một bức tranh về những gì đang xảy ra trong cuộc đời ông khi ông thực hiện những cuốn sách thành công nhất của mình. Mặc dù vậy, tôi phải nói rằng, một số phần của nó sẽ rất khó hiểu nếu bạn chưa đọc những cuốn sách khác của ông ấy.\nTiếp theo, dành cho những ai thích một cuốn sách cảm động, 'Goodbye to the Fields' (Tạm biệt những cánh đồng) của Susan Marks kể câu chuyện buồn về John, một cậu bé nhỏ tuổi phải rời xa vùng nông thôn mà cậu yêu quý khi cả gia đình chuyển đến London vì công việc của cha cậu. John và mẹ cậu muốn ở lại nơi họ đang sống. Phải mất một thời gian dài để gia đình mới bắt đầu cảm thấy thoải mái khi sống ở thành phố lớn.\nCó rất nhiều cuốn sách với những lời khuyên hữu ích trong tuần này. Đầu tiên, cuốn 'A to Z of Photography' (Nhiếp ảnh từ A đến Z) sẽ là một món quà tuyệt vời cho bất kỳ ai mới bắt đầu sử dụng máy ảnh. Nó có mọi thứ bạn cần biết để chụp được những bức ảnh thực sự đẹp, và tìm hiểu về máy ảnh, phim, ánh sáng, v.v. Tuy nhiên, đây không phải là cuốn sách dành cho nhiếp ảnh gia giàu kinh nghiệm - không có nhiều thông tin nâng cao ở đây.\nChuyển sang khu vực nhà bếp, 'Cooking for One' (Nấu ăn cho một người) của Adrian White ghi trên bìa sách rằng ngay cả những người ghét nấu ăn cũng sẽ thấy nó hữu ích. Một tháng trước, tôi thậm chí còn không biết luộc trứng, nhưng giờ đây tôi đang nấu đủ loại món ăn, một số món khá khó, và, vâng, chúng có hương vị khá ngon nữa. Thực sự tôi đang rất tận hưởng việc nấu ăn lúc này. Giờ tôi sẽ thử một cuốn sách mới về nấu món ăn Ý.\nCuốn sách cuối cùng tuần này là 'Holidays in Europe' (Kỳ nghỉ ở Châu Âu) của Mary Curtis. Đây là một tác phẩm đáng đọc, nó sẽ kích thích trí tưởng tượng của bạn khi bạn lên kế hoạch cho kỳ nghỉ năm tới. Việc tác giả không nói về những địa danh nổi tiếng mà mọi người vẫn đến không quan trọng, thay vào đó bà ấy mô tả rất nhiều địa điểm nhỏ nằm cách xa các khu du lịch chính. Các bản đồ hơi quá nhỏ để có thể hữu ích, nhưng cuốn sách vẫn rất đáng đồng tiền bát gạo.\nVậy là xong cho tuần này rồi. Tuần tới, sẽ có một báo cáo đặc biệt về việc tặng sách như những món quà, vì vậy nếu bạn đã tiết kiệm được tiền và đang tự hỏi nên mua gì cho bạn bè hoặc người thân nhân ngày sinh nhật của họ, bạn có thể sẽ có được một vài ý tưởng hay. Tôi rất mong được nói chuyện với các bạn khi đó." },
                { label: "Bài giảng 3", text: "Mọi người luôn hỏi tôi tại sao tôi chỉ đi du lịch theo cách gian khổ. Rất nhiều chương trình du lịch trên truyền hình nói về những kỳ nghỉ thư giãn trên bãi biển, nhưng tôi chỉ từng làm những bộ phim tài liệu về những chuyến đi thực sự dài. Chuyến đi cuối cùng tôi thực hiện là một hành trình dài 50.000 dặm quanh Thái Bình Dương, và nó kéo dài 12 tháng, nhưng hồi chuyến đi đầu tiên của tôi là một hành trình vòng quanh thế giới, và chuyến đi khó khăn nhất có lẽ là hành trình lái xe hơi từ Bắc Cực đến Nam Cực.\nNhư các bạn có thể tưởng tượng, tôi đã nhìn thấy rất nhiều nơi trên thế giới. Tôi may mắn có được một sức khỏe thực sự tuyệt vời, nhưng cuộc đời thì rất ngắn ngủi, và tôi đã đi du lịch quá nhiều đến mức tôi muốn có một sự thay đổi. Di chuyển đường dài khiến bạn vô cùng mệt mỏi, và mặc dù nó vẫn là một niềm vui lớn đối với tôi, tôi muốn làm điều gì đó thư giãn hơn bây giờ.\nTôi nghĩ loạt phim truyền hình tiếp theo của tôi có thể được thực hiện ở gần nước Anh hơn. Có một số công việc thực sự thú vị đang diễn ra ở xứ Wales, nơi họ vừa tìm thấy những tàn tích của một thị trấn 2.000 năm tuổi. Hoặc tôi có thể làm một chương trình gì đó về các trang trại ở Pháp, hay thậm chí là đạp xe ở Hà Lan. Luôn có thứ gì đó để quay phim nếu bạn tìm kiếm đủ kỹ.\nNhưng tôi hy vọng những chương trình tôi đã thực hiện về những chuyến đi thực sự dài sẽ khuyến khích những người khác bước lên máy bay và có vài chuyến phiêu lưu. Một số người dường như sợ hãi việc đi đến một quốc gia xa lạ, và có lẽ là sợ bị ốm ở đó, nhưng có thể bây giờ họ sẽ nhận ra rằng nếu tôi có thể thực hiện những chuyến đi này, họ cũng có thể. Tôi chỉ là một người rất bình thường. Và hiển nhiên, bạn không nhất thiết phải đi du lịch một mình như tôi vẫn thường làm.\nTôi phải nói rằng cho đến gần đây, tôi chưa bao giờ lo lắng về việc phải ở quá xa nhà, kể cả khi các con tôi còn rất nhỏ. Nhưng khi tôi đang quay phim ở Borneo năm ngoái, vợ tôi phải trải qua một cuộc phẫu thuật khẩn cấp, và điều đó thực sự làm tôi hoảng sợ, vì tôi không thể quay về Anh ngay được. Mọi chuyện cuối cùng cũng ổn, nhưng tôi sẽ không muốn ở quá xa nếu có chuyện tương tự xảy ra với gia đình tôi một lần nữa.\nCó lẽ nếu tôi dành nhiều thời gian hơn ở nhà, tôi có thể viết nhiều hơn. Cho đến nay tôi đã hoàn thành hai cuốn sách. Tôi viết về những nơi tôi đã đến thăm và cảm nhận của tôi về chúng. Tôi không nghĩ mình sẽ bao giờ viết truyện hư cấu hay làm thơ, nhưng tôi sẽ quan tâm đến việc viết các bài báo. Gia đình tôi nói rằng tôi rất khó sống cùng khi tôi ở nhà viết lách. Có lẽ đó là lý do họ không bao giờ phàn nàn về việc tôi đi du lịch chăng?" }

Questions 21 to 25
Now turn to part 3. Questions 21 to 25. First, you have some time to look at questions 21 to 25.

Well, Good evening everyone. I've um come along to talk to you about my painting. It was, just a hobby, but it's really more than that now. I used to paint in the evenings, after work, but now I work four days a week instead of five. That means I spend Friday, Saturday and Sunday on my painting. I have pictures in local exhibitions at least once a month.

I'd love to give up my job and spend all my time painting, but I work with computers and I earn more that way. I do make some money from selling my pictures, enough to pay for all my paint, brushes and paper, and a few art lessons. I'd love to go to art college full-time for three years, but I've got all the rent on my flat to pay and a car to run.

I first became interested in art when I was at primary school. I used to go out with some paper and a few pencils during break time and draw anything I saw - houses, gardens, people. Then at secondary school we had art classes twice a week, and I learnt how to use chalk, and then different kinds of paints - watercolours, oils and so on. Those classes were really useful for me, and ever since then I've had lessons of some kind. I've attended evening classes and been on what they call painting holidays, where you go out into the countryside and paint during the day, and then sit and discuss your work with a teacher and the other artists after dinner. Those holidays are great. You learn so much talking to other people studying with you.

I've enjoyed painting in lots of different countries. I've been to Morocco and painted desert scenes with beautiful sunrises. I've been to Greece and Spain and painted pictures of the local people working in the fields near their homes. My favourite place is still Scotland. I love walking in the Scottish mountains, and there are so many different birds to see, especially in spring.

Well, I'm going to finish now by showing you a video of the places I've visited. After that there'll be a chance to relax with a cup of coffee, and then there'll be time for some questions. Oh, and I've got some information about my next art exhibition for you. It's going to be at the Queen's Gallery. Now, if someone would turn off the lights, then I can get...

Questions 26 to 30
Questions 26 to 30. First, you have some time to look at questions 26 to 30.

Welcome to this week's book program. We've got lots of great new books to tell you about.

My Life by Joe Wrigley will keep all fans of Joe's stories happy for hours. It explains a lot about where his ideas come from, and gives a picture of what was happening in his life when he was working on his most successful books. I must say, though, that some of it is difficult to understand if you haven't read his other books.

Now, for those of you who like a good cry, Goodbye to the Fields by Susan Marks tells the sad story of John, a small boy who has to leave the countryside he loves when the family move to London because of his father's job. John and his mother would prefer to stay where they are. It's a long time before the family begins to feel comfortable living in the big city.

There are plenty of books with helpful advice this week. First, the A to Z of Photography would make a great present for anyone just starting out with a camera. It has everything you need to know to take really good photos, and learn about cameras, film, lighting and so on. This is not one for the experienced photographer, though - there's not much advanced information here.

Turning to the kitchen, Cooking for One by Adrian White says on its cover that even people who hate cooking will find it useful. A month ago, I couldn't even boil an egg, but now I'm producing all sorts of dishes, some quite difficult, and, yes, they taste quite good, too. I'm actually enjoying cooking now. I'm now going to try a new book about cooking Italian food.

The last book this week is Holidays in Europe by Mary Curtis. This is an enjoyable read, which will start your imagination working as you plan for next year's holiday. It doesn't matter that the writer doesn't talk about the famous places everyone visits, but describes lots of small places away from the main tourist areas. The maps are too small to be useful, but the book is still good value for money.

That's it for this week, then. Next week, there's a special report on giving books as presents, so if you've saved up your money and you're wondering what to get for a friend or relation for their birthdays, you might get some good ideas. I'll look forward to talking to you then.

Questions 31 to 35
Questions 31 to 35. First, you have some time to look at questions 31 to 35.

People always ask me why I only travel the hard way. A lot of television travel programs are about relaxing holidays on the beach, but I've only ever made documentaries about really long trips. The last trip I did was a 50,000 mile journey around the Pacific Ocean, and it took 12 months, but then my very first trip was a round the world journey, and the most difficult one was probably a car journey from the North Pole to the South Pole.

As you can imagine, I've seen a lot of the world. I'm lucky to be in really excellent health, but life is very short, and I've done so much travelling that I want a change. Travelling long distances makes you extremely tired, and although it's still a great pleasure for me, I want to do something more relaxing now.

I think my next television series might be made nearer England. There's some really interesting work going on in Wales, where they've just found what remains of a 2,000-year-old town. Or I might do something about farms in France, or even cycling in Holland. There's always something to film if you look hard enough.

But I hope the programs I've made about the really long trips will encourage other people to get on a plane and have some adventures. Some people seem to be afraid of going to a strange country, and perhaps being ill there, but maybe they realise now that if I can do these trips, so can they. I'm only a very ordinary person. And obviously, you don't have to travel on your own, as I always have.

I must say that until recently, I hadn't ever worried about being so far from home, even when the children were very small. But while I was filming in Borneo last year, my wife had to have an emergency operation, and it really frightened me, because I couldn't get back to England. Everything was fine in the end, but I wouldn't want to be so far away if anything like that happened to my family again.

Perhaps if I spend more time at home, I can do more writing. I've done two books so far. I write about places I've seen and my feelings about them. I don't think I'll ever write fiction or poetry, but I'd be interested in writing newspaper articles. My family says I'm very difficult to live with when I'm writing at home. Perhaps that's why they've never complained about me travelling, eh?`,

        // --- HÀM TRỘN MẢNG ---
        const shuffleArray = (array) => {
            const newArray = [...array];
            for (let i = newArray.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArray[i], newArray[j]] = [newArray[j], newArray[i]];
            }
            return newArray;
        };

        // --- AUDIO COMPONENT ---
        const AudioPlayer = ({ src, audioId, isReviewMode = false, timestamps = [] }) => {
            const audioRef = useRef(null);
            const progressBarRef = useRef(null);
            const [isPlaying, setIsPlaying] = useState(false);
            const [progress, setProgress] = useState(0);
            const [hasEnded, setHasEnded] = useState(false);
            const [hasError, setHasError] = useState(false);
            const [currentTime, setCurrentTime] = useState(0);
            
            // Lắng nghe sự kiện để tắt các audio khác khi có 1 audio bắt đầu phát
            useEffect(() => {
                const handleStopOtherAudios = (e) => {
                    if (e.detail !== audioId && audioRef.current) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    }
                };
                window.addEventListener('stopAllAudios', handleStopOtherAudios);
                return () => window.removeEventListener('stopAllAudios', handleStopOtherAudios);
            }, [audioId]);

            const playAudio = () => {
                // Bắn tín hiệu yêu cầu các AudioPlayer khác dừng lại
                window.dispatchEvent(new CustomEvent('stopAllAudios', { detail: audioId }));
                const playPromise = audioRef.current.play();
                if (playPromise !== undefined) {
                    playPromise.then(() => {
                        setIsPlaying(true);
                        setHasEnded(false);
                        setHasError(false);
                    }).catch(error => {
                        console.error("Lỗi phát âm thanh:", error);
                        setHasError(true);
                        setIsPlaying(false);
                    });
                }
            };

            const togglePlay = () => {
                if (hasEnded && !isReviewMode) return;
                
                if (isPlaying) {
                    audioRef.current.pause();
                    setIsPlaying(false);
                } else {
                    if (isReviewMode && hasEnded) {
                        audioRef.current.currentTime = 0;
                    }
                    playAudio();
                }
            };

            const handleTimeUpdate = () => {
                const current = audioRef.current.currentTime;
                const duration = audioRef.current.duration;
                setCurrentTime(current);
                if (duration) {
                    setProgress((current / duration) * 100);
                }
            };

            const handleEnded = () => {
                setIsPlaying(false);
                setHasEnded(true);
            };

            const handleError = (e) => {
                console.error("Không thể tải nguồn âm thanh.", e);
                setHasError(true);
            };

            // Tính năng tua trên thanh Progress
            const handleProgressClick = (e) => {
                if (!isReviewMode) return; // Chỉ cho tua khi ở chế độ Review
                if (hasError || !audioRef.current?.duration) return;
                
                const rect = progressBarRef.current.getBoundingClientRect();
                const clickX = e.clientX - rect.left;
                const width = rect.width;
                const newPercentage = clickX / width;
                const newTime = newPercentage * audioRef.current.duration;
                
                audioRef.current.currentTime = newTime;
                setProgress(newPercentage * 100);
                
                // Tự động phát tiếp nếu đang pause và tua xong
                if (!isPlaying) playAudio();
            };

            // Tính toán Timestamp nào đang active (Đang nghe tới đâu sáng tới đó)
            let activeTimestampIndex = -1;
            if (timestamps && timestamps.length > 0) {
                for (let i = timestamps.length - 1; i >= 0; i--) {
                    if (currentTime >= timestamps[i].time - 0.5) {
                        activeTimestampIndex = i;
                        break;
                    }
                }
            }

            return (
                <div className="bg-blue-50 border border-blue-200 p-4 rounded-lg flex flex-col shadow-sm w-full">
                    <div className="flex items-center w-full">
                        <audio ref={audioRef} src={src} onTimeUpdate={handleTimeUpdate} onEnded={handleEnded} onError={handleError} className="hidden" />
                        <button onClick={togglePlay} disabled={hasEnded && !isReviewMode} className={`mr-4 focus:outline-none transition-colors ${(hasEnded && !isReviewMode) ? 'text-gray-400 cursor-not-allowed' : hasError ? 'text-red-500' : 'text-blue-600 hover:text-blue-800'}`}>
                            {isPlaying ? <PauseCircle size={40} /> : hasError ? <AlertCircle size={40} /> : <PlayCircle size={40} />}
                        </button>
                        <div className="flex-1">
                            <div 
                                ref={progressBarRef}
                                onClick={handleProgressClick}
                                className={`h-3 bg-gray-200 rounded-full overflow-hidden ${isReviewMode ? 'cursor-pointer hover:h-4 transition-all' : ''}`}
                                title={isReviewMode ? "Bấm vào thanh này để tua nhanh/chậm" : ""}
                            >
                                <div className={`h-full transition-all duration-100 ${(hasEnded && !isReviewMode) ? 'bg-gray-400' : hasError ? 'bg-red-500' : 'bg-blue-500'}`} style={{ width: `${progress}%` }}></div>
                            </div>
                            <div className="flex justify-between mt-2 text-xs text-gray-500">
                                <span className={hasError ? "text-red-500 font-bold" : ""}>
                                    {hasError ? "Lỗi Audio." : (hasEnded && !isReviewMode) ? "Đã khóa (Chỉ nghe 1 lần)" : (hasEnded && isReviewMode) ? "Bấm Play để nghe lại" : isReviewMode ? "Bấm thanh màu xám để tua" : "Bấm Play để nghe"}
                                </span>
                            </div>
                        </div>
                    </div>
                    {/* KHU VỰC TIMESTAMPS GỌN GÀNG NHƯ YOUTUBE CHAPTERS */}
                    {isReviewMode && timestamps && timestamps.length > 0 && (
                        <div className="mt-3 pt-3 border-t border-blue-200">
                            <p className="text-xs font-bold text-blue-800 mb-2">TIMESTAMPS CHỮA BÀI (Bấm để tua đến vị trí bài nghe):</p>
                            <div className="flex flex-wrap gap-2">
                                {timestamps.map((ts, idx) => (
                                    <button 
                                        key={idx}
                                        onClick={() => {
                                            if (hasError || !audioRef.current) return;
                                            audioRef.current.currentTime = ts.time;
                                            if (!isPlaying) playAudio();
                                        }}
                                        className={`px-2 py-1 text-xs font-bold rounded shadow-sm transition-colors ${activeTimestampIndex === idx ? 'bg-blue-600 text-white' : 'bg-white text-blue-600 border border-blue-300 hover:bg-blue-100'}`}
                                    >
                                        {ts.label} ({formatTimeStr(ts.time)})
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

                                {part.questions.map(q => {
                                const checkedVal = answers[q.id];

                                    <div key={q.id} className="bg-white p-4 rounded-lg shadow-sm border border-gray-200 hover:border-blue-300 transition-colors">
                                    <div className="flex items-start mb-4">
                                        <span className="bg-blue-100 text-blue-800 font-bold px-3 py-1 rounded mr-3 mt-0.5 shrink-0 text-sm">Câu {q.id}</span>
                                        <p className="font-semibold text-gray-900 text-sm md:text-base">{q.text}</p>
                                    </div>
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                        {Object.entries(q.options).map(([key, value]) => {
                                        const checked = checkedVal === key;
                                        return (
                                            <label key={key} className={`flex items-start p-3 rounded-md cursor-pointer border transition-colors ${checked ? 'border-blue-500 bg-blue-50 text-blue-800 font-medium' : 'border-gray-200 hover:bg-gray-50'}`}>
                                            <input type="radio" name={`q-${q.id}`} value={key} checked={checked} onChange={() => handleOptionChange(q.id, key)} className="mt-1 mr-3 h-4 w-4 text-blue-600 focus:ring-blue-500 border-gray-300" />
                                            <span className="font-bold mr-2">{key}.</span><span>{value}</span>
                                            </label>
                                        );
                                        })}
                                    </div>
                                    </div>
                                );
                                })}
                            </div>
                            </div>
                        ))}
                        </div>

                        <div className="mt-6 flex flex-col md:flex-row justify-between items-center bg-white p-4 rounded-xl shadow-sm gap-4 border border-gray-200">
                            <div className="text-gray-600 font-medium flex items-center">
                                <CheckCircle size={18} className="mr-2 text-green-500" />
                                <span>Đã chọn: <span className="font-bold">{answeredCount}/35</span> câu</span>
                            </div>
                            <button onClick={() => setShowConfirm(true)} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-lg shadow-md transition-transform hover:scale-105 w-full md:w-auto">
                                Nộp Bài Ngay
                            </button>
                        </div>
                    </div>

                    {showConfirm && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                        <div className="bg-white rounded-xl p-6 max-w-sm w-full shadow-2xl animate-fade-in text-center">
                            <AlertCircle className="w-16 h-16 text-yellow-500 mx-auto mb-4" />
                            <h3 className="text-xl font-bold text-gray-900 mb-2">Xác nhận nộp bài</h3>
                            <p className="text-gray-600 mb-6">Bạn có chắc chắn muốn nộp bài? Hành động này không thể hoàn tác và bạn sẽ không thể thay đổi đáp án.</p>
                            <div className="flex justify-center space-x-3">
                            <button onClick={() => setShowConfirm(false)} className="px-5 py-2 rounded-lg font-bold text-gray-600 bg-gray-100 hover:bg-gray-200 transition">Hủy</button>
                            <button onClick={() => { setShowConfirm(false); onSubmit(); }} className="px-5 py-2 rounded-lg font-bold text-white bg-blue-600 hover:bg-blue-700 transition">Đồng ý nộp</button>
                            </div>
                        </div>
                        </div>
                    )}
                </div>
            );
        }

        // --- STAGE 2: KẾT QUẢ ---
        function Stage2Result({ answers, onGoToGame }) {
            const [activeTab, setActiveTab] = useState(1);
            const [showTranscript, setShowTranscript] = useState({});
            const [activeTranslation, setActiveTranslation] = useState({});

            const calculateScore = () => {
                let correct = 0;
                TEST_DATA.parts.forEach(part => {
                part.questions.forEach(q => {
                    if (answers[q.id] === q.correct) correct++;
                });
                });
                return correct;
            };

            const correctCount = calculateScore();
            const vstepScore = convertVstepScore(correctCount);

            const toggleTranscript = (partId) => {
                setShowTranscript(prev => ({...prev, [partId]: !prev[partId]}));
            };

            const toggleTranslation = (partId, label) => {
                setActiveTranslation(prev => {
                    const currentActive = prev[partId];
                    if (currentActive === label) {
                        return { ...prev, [partId]: null };
                    }
                    return { ...prev, [partId]: label };
                });
            };

            return (
                <div className="min-h-screen bg-gray-100 pb-12 relative">
                    <div className="max-w-5xl mx-auto mt-6 px-4">
                        
                        {/* Khu vực thông báo kết quả và nút chuyển qua Minigame */}
                        <div className="bg-green-50 border-2 border-green-500 rounded-xl p-6 mb-6 shadow-md text-center flex flex-col items-center">
                            <Award className="text-yellow-500 mb-2" size={40} />
                            <h2 className="text-2xl font-bold text-green-700 mb-2">Đã Nộp Bài!</h2>
                            <div className="flex flex-col sm:flex-row items-center justify-center gap-4 sm:gap-8 my-4 w-full max-w-md">
                                <div className="bg-white px-6 py-4 rounded-lg shadow-sm border border-green-200 flex-1">
                                    <p className="text-sm text-gray-500 uppercase font-bold mb-1">Số câu đúng</p>
                                    <p className="text-3xl font-bold text-gray-800">{correctCount}<span className="text-lg text-gray-500 font-normal">/35</span></p>
                                </div>
                                <div className="bg-white px-6 py-4 rounded-xl shadow-sm border-2 border-blue-400 relative overflow-hidden flex-1">
                                    <div className="absolute top-0 left-0 right-0 bg-blue-500 h-1"></div>
                                    <p className="text-sm text-blue-600 uppercase font-bold mb-1">Điểm VSTEP</p>
                                    <p className="text-4xl font-black text-blue-700">{vstepScore.toFixed(1)}<span className="text-xl text-gray-400 font-bold">/10</span></p>
                                </div>
                            </div>
                            
                            {/* Banner Mời chơi Minigame */}
                            <div className="bg-white p-4 rounded-lg border border-purple-200 shadow-sm mt-4 w-full max-w-2xl">
                                <h3 className="text-lg font-bold text-purple-700 flex items-center justify-center mb-2">
                                    <Gamepad2 size={24} className="mr-2"/> Bạn muốn nhớ từ vựng lâu hơn?
                                </h3>
                                <p className="text-sm text-gray-600 mb-4">Hệ thống đã chắt lọc ra 10 từ vựng quan trọng nhất xuất hiện trong đề thi này. Chơi Minigame để khắc phục những từ bạn sai nhé!</p>
                                <button onClick={onGoToGame} className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-2 px-6 rounded-full shadow-md transition-transform hover:scale-105">
                                    Học & Chơi Minigame Từ Vựng
                                </button>
                            </div>
                        </div>

                        <div className="flex bg-white rounded-t-xl overflow-hidden shadow-sm border-b">
                            {TEST_DATA.parts.map(part => (
                                <button key={part.id} className={`flex-1 py-4 text-center font-bold text-sm uppercase transition-colors ${activeTab === part.id ? 'bg-blue-600 text-white' : 'bg-gray-50 text-gray-500 hover:bg-gray-100'}`} onClick={() => setActiveTab(part.id)}>
                                Part {part.id}
                                </button>
                            ))}
                        </div>

                        <div className="bg-white shadow-md rounded-b-xl pb-8 relative">
                            {TEST_DATA.parts.map(part => (
                                <div key={part.id} className={activeTab === part.id ? 'block' : 'hidden'}>
                                    
                                    {/* THẺ AUDIO CỐ ĐỊNH PHÍA TRÊN */}
                                    <div className="sticky top-16 z-40 bg-white/95 backdrop-blur-sm border-b border-blue-200 p-4 shadow-sm">
                                        <h3 className="text-sm font-bold text-blue-800 mb-2 uppercase flex items-center"><Headphones size={18} className="mr-2"/> {part.title} Audio - Cho phép tua</h3>
                                        <AudioPlayer 
                                            src={part.audioSrc} 
                                            audioId={`review-${part.id}`} 
                                            isReviewMode={true} 
                                            timestamps={part.audioTimestamps}
                                        />
                                    </div>

                                    <div className="space-y-8 p-4 md:p-8 mt-4">
                                        {part.questions.map(q => {
                                        const userAns = answers[q.id];
                                        const isCorrect = userAns === q.correct;
                                        const isUnanswered = !userAns;
                                        
                                        return (
                                            <div key={q.id} className={`p-4 md:p-5 rounded-lg border-l-4 ${isCorrect ? 'border-green-500 bg-green-50/30' : isUnanswered ? 'border-yellow-500 bg-yellow-50/30' : 'border-red-500 bg-red-50/30'}`}>
                                                <div className="flex items-start justify-between mb-4">
                                                    <div className="flex items-start">
                                                        <span className={`px-2 py-1 rounded text-white font-bold text-xs md:text-sm mr-3 shrink-0 ${isCorrect ? 'bg-green-500' : isUnanswered ? 'bg-yellow-500' : 'bg-red-500'}`}>Câu {q.id}</span>
                                                        <p className="font-bold text-gray-900 text-sm md:text-base">{q.text}</p>
                                                    </div>
                                                    {isCorrect ? <CheckCircle className="text-green-500 shrink-0 ml-2" size={24}/> : <XCircle className="text-red-500 shrink-0 ml-2" size={24}/>}
                                                </div>
                                                
                                                <div className="grid grid-cols-1 md:grid-cols-2 gap-3 mb-4 md:ml-12">
                                                    {Object.entries(q.options).map(([key, value]) => {
                                                    const isSelected = userAns === key;
                                                    const isActualCorrect = key === q.correct;
                                                    
                                                    let btnClass = "text-left px-3 py-2 rounded-md border flex items-center ";
                                                    if (isActualCorrect) btnClass += "border-green-500 bg-green-100 text-green-800 font-bold shadow-sm";
                                                    else if (isSelected && !isActualCorrect) btnClass += "border-red-500 bg-red-100 text-red-800";
                                                    else btnClass += "border-gray-200 bg-white opacity-60";

                                                    return (
                                                        <div key={key} className={btnClass}>
                                                            <span className="font-bold mr-2">{key}.</span> <span>{value}</span>
                                                            {isActualCorrect && <CheckCircle size={18} className="ml-auto text-green-600" />}
                                                            {isSelected && !isActualCorrect && <XCircle size={18} className="ml-auto text-red-600" />}
                                                        </div>
                                                    );
                                                    })}
                                                </div>

                                                <div className="md:ml-12 bg-white p-4 rounded-lg border shadow-sm mt-4">
                                                    <h4 className="font-bold mb-2 text-blue-800 border-b pb-2 flex items-center"><BookOpen size={18} className="mr-2"/> Giải thích chi tiết</h4>
                                                    
                                                    <div className="mb-4 text-sm text-gray-700">
                                                        <p className="mb-1 font-semibold italic text-gray-800">Dịch câu hỏi: {q.translation.question}</p>
                                                        <ul className="mb-3 pl-4 list-disc text-gray-700 mt-2">
                                                            {Object.entries(q.translation.options).map(([k, v]) => (<li key={k}><strong>{k}.</strong> {v}</li>))}
                                                        </ul>
                                                    </div>

                                                    {/* Phần giải thích logic sai/đúng */}
                                                    <div className="space-y-3 text-sm">
                                                        {isUnanswered && (
                                                            <div className="p-3 bg-yellow-50 border border-yellow-200 rounded text-yellow-800">
                                                                <strong>Bạn đã bỏ trống câu này!</strong> Hãy luôn thử dự đoán đáp án dù không nghe rõ nhé.
                                                            </div>
                                                        )}
                                                        
                                                        {userAns && !isCorrect && (
                                                            <div className="p-3 bg-red-50 border border-red-200 rounded text-red-800">
                                                                <span className="font-bold uppercase mb-1 block">Tại sao bạn sai?</span>
                                                                <strong>Bạn chọn {userAns}:</strong> {q.explanations[userAns]}
                                                            </div>
                                                        )}
                                                        
                                                        <div className="p-3 bg-green-50 border border-green-200 rounded text-green-800">
                                                            <span className="font-bold uppercase mb-1 block">Phân tích đáp án đúng</span>
                                                            <strong>Đáp án {q.correct}:</strong> {q.explanations[q.correct]}
                                                        </div>
                                                    </div>

                                                    {/* Trích đoạn Transcript Bôi đỏ */}
                                                    <div className="mt-4 pt-4 border-t border-dashed">
                                                        <div className="flex items-center justify-between mb-2">
                                                            <h5 className="text-xs font-bold text-gray-500 uppercase tracking-wider flex items-center"><FileText size={14} className="mr-1"/> Đoạn Audio xuất hiện đáp án:</h5>
                                                        </div>
                                                        <p className="bg-gray-50 p-3 rounded text-gray-800 italic leading-relaxed" dangerouslySetInnerHTML={{ __html: q.transcriptSnippet }}></p>
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                        })}
                                    </div>

                                    {/* NÚT ẨN/HIỆN TRANSCRIPT ĐẦY ĐỦ */}
                                    <div className="mt-8 border-t-2 border-dashed pt-6 mb-4 px-4 md:px-8">
                                        <button onClick={() => toggleTranscript(part.id)} className="flex items-center justify-center w-full py-3 bg-gray-100 hover:bg-gray-200 text-gray-800 font-bold rounded-lg transition-colors">
                                            <FileText className="mr-2" size={20} />
                                            {showTranscript[part.id] ? "Ẩn Transcript (Nội dung bài nghe đầy đủ)" : "Hiện Transcript (Nội dung bài nghe đầy đủ)"}
                                        </button>

                                        {/* PHẦN DỊCH TIẾNG VIỆT */}
                                        {showTranscript[part.id] && part.transcriptTranslations && (
                                            <div className="mt-4 p-4 bg-white border border-blue-200 rounded-lg shadow-sm">
                                                <p className="text-sm font-bold text-blue-800 mb-3 uppercase flex items-center">
                                                    <BookOpen size={16} className="mr-2" />
                                                    Xem bản dịch tiếng Việt
                                                </p>
                                                <div className="flex flex-wrap gap-2 mb-4">
                                                    {part.transcriptTranslations.map((trans, idx) => (
                                                        <button 
                                                            key={idx}
                                                            onClick={() => toggleTranslation(part.id, trans.label)}
                                                            className={`px-3 py-1.5 text-sm font-bold rounded shadow-sm transition-colors ${activeTranslation[part.id] === trans.label ? 'bg-blue-600 text-white' : 'bg-blue-50 text-blue-600 border border-blue-200 hover:bg-blue-100'}`}
                                                        >
                                                            Dịch {trans.label}
                                                        </button>
                                                    ))}
                                                </div>
                                                
                                                {/* Khu vực hiển thị nội dung dịch */}
                                                {activeTranslation[part.id] && (
                                                    <div className="p-4 bg-blue-50 border border-blue-200 rounded-lg text-gray-800 text-sm md:text-base leading-relaxed whitespace-pre-line animate-fade-in border-l-4 border-l-blue-500">
                                                        <h5 className="font-bold text-blue-800 mb-2 border-b border-blue-200 pb-2">
                                                            {activeTranslation[part.id]} (Tiếng Việt):
                                                        </h5>
                                                        {part.transcriptTranslations.find(t => t.label === activeTranslation[part.id])?.text}
                                                    </div>
                                                )}
                                            </div>
                                        )}

                                        {showTranscript[part.id] && (
                                            <div className="mt-4 p-5 bg-yellow-50 border border-yellow-200 rounded-lg text-gray-800 text-sm md:text-base leading-relaxed whitespace-pre-line">
                                                {part.transcript}
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        // --- STAGE 3: MINIGAME TỪ VỰNG ---
        function Stage3VocabGame({ onBackToResult }) {
            const [gamePhase, setGamePhase] = useState('learn'); // 'learn', 'play', 'finish'
            const [playList, setPlayList] = useState(VOCAB_DATA); // List từ đang chơi
            const [currentIndex, setCurrentIndex] = useState(0);
            const [options, setOptions] = useState([]);
            const [selectedOption, setSelectedOption] = useState(null);
            const [score, setScore] = useState(0);
            const [playingWord, setPlayingWord] = useState(null);
            
            // Array lưu các từ làm sai
            const [wrongVocabs, setWrongVocabs] = useState([]);

            const loadQuestion = () => {
                if (currentIndex >= playList.length) {
                    setGamePhase('finish');
                    return;
                }
                const currentVocab = playList[currentIndex];
                
                // Lấy 3 nghĩa sai ngẫu nhiên từ TỔNG DATA gốc để lúc nào cũng có đủ 3 options gây nhiễu
                const incorrectOptions = VOCAB_DATA
                    .filter(v => v.word !== currentVocab.word)
                    .sort(() => 0.5 - Math.random())
                    .slice(0, 3)
                    .map(v => v.meaning);
                
                const allOptions = shuffleArray([currentVocab.meaning, ...incorrectOptions]);
                setOptions(allOptions);
                setSelectedOption(null);
                
                // Trì hoãn một chút để UI render xong rồi mới phát âm thanh
                setTimeout(() => playWordAudio(currentVocab.word), 500);
            };

            useEffect(() => {
                if (gamePhase === 'play') {
                    loadQuestion();
                }
            }, [currentIndex, gamePhase, playList]);

            const playWordAudio = (word) => {
                setPlayingWord(word);
                const audioUrl = `https://dict.youdao.com/dictvoice?audio=${encodeURIComponent(word)}&type=2`;
                const audio = new Audio(audioUrl);
                
                audio.play().catch(err => {
                    if ('speechSynthesis' in window) {
                        window.speechSynthesis.cancel();
                        const utterance = new SpeechSynthesisUtterance(word);
                        utterance.lang = 'en-US';
                        utterance.rate = 0.9;
                        utterance.onend = () => setPlayingWord(null);
                        window.speechSynthesis.speak(utterance);
                    } else {
                        setPlayingWord(null);
                    }
                });
                audio.onended = () => setPlayingWord(null);
            };

            const handleSelect = (opt) => {
                if (selectedOption !== null) return; 
                setSelectedOption(opt);
                
                const currentVocab = playList[currentIndex];
                if (opt === currentVocab.meaning) {
                    setScore(prev => prev + 1);
                } else {
                    // Nếu chọn sai, thêm từ đó vào danh sách wrongVocabs (không add trùng)
                    if (!wrongVocabs.find(w => w.word === currentVocab.word)) {
                        setWrongVocabs(prev => [...prev, currentVocab]);
                    }
                }
            };

            const handleNext = () => {
                if (currentIndex + 1 >= playList.length) {
                    setGamePhase('finish');
                } else {
                    setCurrentIndex(prev => prev + 1);
                }
            };

            // Chơi lại toàn bộ 10 từ
            const handleRestartAll = () => {
                setPlayList(VOCAB_DATA);
                setWrongVocabs([]); // reset sai
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play'); 
            };

            // Chỉ chơi lại những câu đã sai
            const handleReplayWrong = () => {
                setPlayList(wrongVocabs);
                setWrongVocabs([]); // reset để bắt lỗi lại cho lượt đánh này
                setCurrentIndex(0);
                setScore(0);
                setGamePhase('play');
            };

            if (gamePhase === 'learn') {
                return (
                    <div className="max-w-4xl mx-auto mt-8 px-4 pb-12">
                        <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                            <div className="bg-blue-600 p-6 text-white text-center">
                                <h2 className="text-2xl font-bold flex items-center justify-center">
                                    <BookOpen className="mr-2" />
                                    DANH SÁCH TỪ VỰNG QUAN TRỌNG
                                </h2>
                                <p className="mt-2 opacity-90">Hãy nghe và ghi nhớ các từ vựng này trước khi bước vào thử thách nhé!</p>
                            </div>
                            <div className="p-6 md:p-8">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    {VOCAB_DATA.map((item, idx) => (
                                        <div key={idx} className={`flex items-center p-4 rounded-xl border transition-colors ${playingWord === item.word ? 'border-blue-400 bg-blue-50' : 'border-gray-200 bg-gray-50 hover:bg-blue-50'}`}>
                                            <button 
                                                onClick={() => playWordAudio(item.word)}
                                                className={`flex-shrink-0 w-12 h-12 rounded-full flex items-center justify-center mr-4 transition-all ${playingWord === item.word ? 'bg-blue-500 text-white shadow-md scale-110' : 'bg-blue-100 text-blue-600 hover:bg-blue-200'}`}
                                            >
                                                <Volume2 size={24} />
                                            </button>
                                            <div>
                                                <p className="font-bold text-lg text-gray-800">{item.word}</p>
                                                <p className="text-gray-600 text-sm">{item.meaning}</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="mt-10 text-center">
                                    <button 
                                        onClick={() => {
                                            setPlayList(VOCAB_DATA);
                                            setCurrentIndex(0);
                                            setScore(0);
                                            setWrongVocabs([]);
                                            setGamePhase('play');
                                        }}
                                        className="bg-purple-600 hover:bg-purple-700 text-white font-bold py-4 px-10 rounded-full shadow-lg transition-transform hover:scale-105 inline-flex items-center text-lg"
                                    >
                                        <Gamepad2 className="mr-2" size={28} /> Đã Nhớ! Bắt Đầu Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            }

            if (gamePhase === 'finish') {
                return (
                    <div className="min-h-[70vh] flex flex-col items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-2xl shadow-xl max-w-md w-full text-center border-t-8 border-purple-500">
                            <Award size={64} className="text-yellow-400 mx-auto mb-4" />
                            <h2 className="text-3xl font-black text-gray-800 mb-2">Hoàn Thành!</h2>
                            <p className="text-gray-600 mb-6">Bạn đã đối mặt với {playList.length} thử thách từ vựng.</p>
                            
                            <div className="text-5xl font-black text-purple-600 mb-8">
                                {score} <span className="text-2xl text-gray-400">/ {playList.length}</span>
                            </div>

                            <div className="space-y-3">
                                {wrongVocabs.length > 0 && (
                                    <button 
                                        onClick={handleReplayWrong}
                                        className="w-full py-3 bg-red-500 hover:bg-red-600 text-white font-bold rounded-xl transition flex items-center justify-center animate-pulse shadow-md"
                                    >
                                        <RefreshCw size={20} className="mr-2" /> Chơi Lại {wrongVocabs.length} Câu Sai
                                    </button>
                                )}
                                <button 
                                    onClick={handleRestartAll}
                                    className="w-full py-3 bg-purple-100 hover:bg-purple-200 text-purple-800 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <RefreshCw size={20} className="mr-2" /> Chơi Lại Toàn Bộ Từ Đầu
                                </button>
                                <button 
                                    onClick={() => setGamePhase('learn')}
                                    className="w-full py-3 bg-blue-100 hover:bg-blue-200 text-blue-700 font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <BookOpen size={20} className="mr-2" /> Xem Lại Từ Vựng
                                </button>
                                <button 
                                    onClick={onBackToResult}
                                    className="w-full py-3 bg-gray-800 hover:bg-gray-900 text-white font-bold rounded-xl transition flex items-center justify-center"
                                >
                                    <FileText size={20} className="mr-2" /> Trở Về Bài Test
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            const currentVocab = playList[currentIndex];
            if (!currentVocab) return null; // Safety check

            return (
                <div className="max-w-3xl mx-auto mt-8 px-4 pb-12">
                    <div className="bg-white rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                        {/* Header của Minigame */}
                        <div className="bg-purple-600 p-4 text-white flex justify-between items-center">
                            <div className="font-bold flex items-center">
                                <Gamepad2 className="mr-2" />
                                {playList.length < 10 ? 'LUYỆN TẬP CÂU SAI' : 'THỬ THÁCH NGHE TỪ VỰNG'}
                            </div>
                            <div className="bg-purple-800 px-3 py-1 rounded-full text-sm font-bold shadow-inner">
                                Câu {currentIndex + 1} / {playList.length}
                            </div>
                        </div>

                        <div className="p-6 md:p-10 text-center">
                            <p className="text-gray-600 mb-6 font-medium">Lắng nghe kỹ và chọn nghĩa tiếng Việt chính xác nhất cho cụm từ bạn vừa nghe thấy:</p>
                            
                            {/* Nút phát loa */}
                            <button 
                                onClick={() => playWordAudio(currentVocab.word)}
                                className={`mx-auto w-24 h-24 rounded-full flex items-center justify-center transition-all shadow-lg mb-8 ${playingWord === currentVocab.word ? 'bg-purple-200 text-purple-600 scale-95 ring-4 ring-purple-300' : 'bg-purple-100 text-purple-500 hover:bg-purple-200 hover:scale-105'}`}
                            >
                                <Volume2 size={48} />
                            </button>

                            {/* Khu vực hiển thị từ tiếng Anh (chỉ hiện sau khi đã chọn đáp án) */}
                            <div className="h-12 mb-6">
                                {selectedOption !== null && (
                                    <div className="animate-fade-in inline-block bg-yellow-100 border border-yellow-300 text-yellow-800 px-6 py-2 rounded-xl text-xl font-bold tracking-wide shadow-sm">
                                        {currentVocab.word}
                                    </div>
                                )}
                            </div>

                            {/* Các lựa chọn đáp án */}
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {options.map((opt, idx) => {
                                    let btnClass = "p-4 rounded-xl border-2 font-bold text-left transition-all ";
                                    
                                    if (selectedOption === null) {
                                        btnClass += "border-gray-200 text-gray-700 hover:border-purple-300 hover:bg-purple-50";
                                    } else {
                                        if (opt === currentVocab.meaning) {
                                            btnClass += "border-green-500 bg-green-100 text-green-800"; // Đáp án đúng luôn hiện xanh
                                        } else if (opt === selectedOption && selectedOption !== currentVocab.meaning) {
                                            btnClass += "border-red-500 bg-red-100 text-red-800"; // Bấm sai thì hiện đỏ
                                        } else {
                                            btnClass += "border-gray-100 text-gray-400 opacity-50"; // Các ô khác mờ đi
                                        }
                                    }

                                    return (
                                        <button 
                                            key={idx}
                                            onClick={() => handleSelect(opt)}
                                            className={btnClass}
                                            disabled={selectedOption !== null}
                                        >
                                            {opt}
                                            {selectedOption !== null && opt === currentVocab.meaning && <CheckCircle className="inline float-right text-green-600" size={20} />}
                                            {selectedOption !== null && opt === selectedOption && selectedOption !== currentVocab.meaning && <XCircle className="inline float-right text-red-600" size={20} />}
                                        </button>
                                    );
                                })}
                            </div>

                            {/* Nút Next */}
                            <div className="mt-8 h-12">
                                {selectedOption !== null && (
                                    <button 
                                        onClick={handleNext}
                                        className="bg-gray-800 hover:bg-black text-white font-bold py-3 px-8 rounded-full shadow-md transition-transform hover:scale-105 animate-fade-in"
                                    >
                                        Câu Tiếp Theo &rarr;
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        // --- MAIN APP ---
        function App() {
            const [stage, setStage] = useState(1); // 1: Test, 2: Result, 3: Vocab Game
            const [answers, setAnswers] = useState({});
            const [isSubmitted, setIsSubmitted] = useState(false);
            const [timeLeft, setTimeLeft] = useState(TEST_DATA.duration);

            useEffect(() => {
                if (isSubmitted) return;
                if (timeLeft <= 0) {
                    setIsSubmitted(true);
                    setStage(2);
                    return;
                }
                const timer = setInterval(() => setTimeLeft(prev => prev - 1), 1000);
                return () => clearInterval(timer);
            }, [timeLeft, isSubmitted]);

            const handleSubmit = () => {
                setIsSubmitted(true);
                setStage(2);
                window.scrollTo(0, 0);
            };

            const formatTime = (seconds) => {
                const m = Math.floor(seconds / 60).toString().padStart(2, '0');
                const s = (seconds % 60).toString().padStart(2, '0');
                return `${m}:${s}`;
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
                    {/* Header cố định */}
                    <header className="bg-white shadow-md sticky top-0 z-50 overflow-x-auto">
                        <div className="max-w-6xl mx-auto px-4 py-3 flex flex-row justify-between items-center gap-4 min-w-[700px]">
                            {/* Tiêu đề bên trái */}
                            <div className="font-black text-xl md:text-2xl text-blue-800 uppercase tracking-wide whitespace-nowrap flex-1 text-left">
                                VSTEP LISTENING TEST 04
                            </div>
                            
                            {/* Đồng hồ ở giữa */}
                            <div className="flex-1 flex justify-center">
                                <div className={`flex items-center space-x-2 font-mono text-xl px-4 py-1.5 rounded-md font-bold whitespace-nowrap ${timeLeft < 300 && !isSubmitted ? 'bg-red-100 text-red-600 animate-pulse' : 'bg-gray-100 text-gray-700'}`}>
                                    <Clock size={20} />
                                    <span>{formatTime(timeLeft)}</span>
                                </div>
                            </div>

                            {/* Navigation Tabs ở rìa phải */}
                            <div className="flex-1 flex justify-end">
                                <div className="flex bg-gray-100 p-1 rounded-lg whitespace-nowrap">
                                    <button 
                                        onClick={() => setStage(1)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 1 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'}`}
                                    >
                                        Làm Bài
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(2)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors ${stage === 2 ? 'bg-white text-blue-700 shadow-sm' : 'text-gray-500 hover:text-blue-600'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        Kết Quả
                                    </button>
                                    <button 
                                        onClick={() => isSubmitted && setStage(3)}
                                        className={`px-4 py-1.5 rounded-md text-sm font-bold transition-colors flex items-center ${stage === 3 ? 'bg-purple-500 text-white shadow-sm' : 'text-purple-600 hover:bg-purple-100'} ${!isSubmitted ? 'opacity-40 cursor-not-allowed' : ''}`}
                                        disabled={!isSubmitted}
                                    >
                                        <Gamepad2 size={16} className="mr-1" /> Minigame
                                    </button>
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="h-auto min-h-[calc(100vh-64px)] pb-10">
                        {stage === 1 && <Stage1Test answers={answers} setAnswers={setAnswers} onSubmit={handleSubmit} />}
                        {stage === 2 && <Stage2Result answers={answers} onGoToGame={() => setStage(3)} />}
                        {stage === 3 && <Stage3VocabGame onBackToResult={() => setStage(2)} />}
                    </main>

                    <style dangerouslySetInnerHTML={{__html: `
                        @keyframes fadeIn {
                            from { opacity: 0; transform: translateY(10px); }
                            to { opacity: 1; transform: translateY(0); }
                        }
                        .animate-fade-in {
                            animation: fadeIn 0.3s ease-out forwards;
                        }
                    `}} />
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
